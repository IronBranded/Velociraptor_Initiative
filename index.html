<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velociraptor DFIR — Interactive Guide</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e8830a'/><text x='16' y='22' font-family='monospace' font-size='16' font-weight='700' fill='white' text-anchor='middle'>VR</text></svg>">
<style>
/* ── Reset & Tokens ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--sidebar:#1a1d2e;--sidebar-hover:rgba(255,255,255,.06);
  --card:#ffffff;--border:#e2e4ec;--text:#1c2033;--muted:#6b7399;
  --orange:#e8830a;--orange2:#f5960f;--teal:#1aab8a;--teal2:#15c4a2;
  --navy:#1a1d2e;--row0:#fff;--row1:#f9fafb;
  --code-bg:#f0f2f8;--code-text:#1a1d2e;--code-border:#c8ccdc;
  --input:#fff;--input-border:#ccd0e0;
  --tag-bg:#e8f4f0;--tag-text:#0f7a5f;
  --ok:#1e8a5a;--warn:#c06000;--heading:#1a1d2e;
  --accent-bg:#fff8ee;--scrollbar:#d0d3e0;
  --sb-text:#b8bdd4;--sb-active:#fff;--sb-section:rgba(255,255,255,.3);
  --red:#c04040;--blue:#3a7fd4;
  font-size:13px;
}
.dark{
  --bg:#12141f;--card:#1c1f31;--border:#272b42;--text:#d4d8f0;--muted:#7880a8;
  --row0:#1c1f31;--row1:#20243a;--code-bg:#0d0f1c;--code-text:#b8e0d0;
  --code-border:#222644;--input:#161928;--input-border:#313659;
  --tag-bg:#0d2d24;--tag-text:#3dd4aa;--ok:#3dd4aa;--warn:#e8a844;
  --accent-bg:#1a1408;--heading:#e8dfc0;--scrollbar:#2a2e4a;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);transition:background .2s,color .2s}

/* ── Scrollbars ───────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* ── Layout ───────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
#sidebar.collapsed{width:52px;min-width:52px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Sidebar ──────────────────────────────────────── */
.sb-logo{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;gap:10px;overflow:hidden}
.sb-logo-icon{width:30px;height:30px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;letter-spacing:-1px}
.sb-logo-text{overflow:hidden;white-space:nowrap;transition:opacity .15s}
.sb-logo-title{color:#fff;font-size:14px;font-weight:600}
.sb-logo-sub{color:rgba(255,255,255,.38);font-size:10px;margin-top:1px}
#sidebar.collapsed .sb-logo-text{opacity:0;width:0}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.sb-section{color:var(--sb-section);font-size:10px;font-weight:600;letter-spacing:.8px;padding:10px 16px 3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .sb-section{opacity:0}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;color:var(--sb-text);font-size:12px;border-left:2px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;user-select:none}
.sb-item:hover{background:var(--sidebar-hover);color:#fff}
.sb-item.active{background:rgba(232,131,10,.14);color:#fff;border-left-color:var(--orange)}
.sb-icon{width:16px;height:16px;flex-shrink:0;opacity:.65;transition:opacity .15s}
.sb-item:hover .sb-icon,.sb-item.active .sb-icon{opacity:1}
.sb-label{overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .sb-label{opacity:0;width:0}
.sb-bottom{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;overflow:hidden}
.theme-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.theme-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.collapse-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);border-radius:5px;padding:4px 8px;font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:inherit}
.collapse-btn:hover{background:rgba(255,255,255,.16);color:#fff}
#sidebar.collapsed .theme-btn{display:none}

/* ── Topbar ───────────────────────────────────────── */
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:background .2s,border-color .2s}
.topbar-left{display:flex;flex-direction:column}
.topbar-title{font-size:15px;font-weight:600;color:var(--heading);line-height:1.2}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;border-radius:10px;font-size:10px;font-weight:600;padding:2px 8px;line-height:1.6}
.badge-ok{background:rgba(26,171,138,.15);color:var(--ok)}
.badge-warn{background:rgba(200,100,0,.13);color:var(--warn)}
.badge-info{background:rgba(26,83,200,.12);color:#3a7fd4}
.badge-orange{background:rgba(232,131,10,.15);color:var(--orange)}
.badge-red{background:rgba(200,40,40,.12);color:#c04040}

/* ── Content Area ────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:18px 22px;background:var(--bg);transition:background .2s}
.pane{display:none;animation:fadeIn .15s ease}
.pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Cards ───────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;transition:background .2s,border-color .2s}
.card-title{font-size:13px;font-weight:600;color:var(--heading);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ct{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.ct-o{background:rgba(232,131,10,.18);color:var(--orange)}
.ct-t{background:rgba(26,171,138,.18);color:var(--teal)}
.ct-b{background:rgba(26,83,200,.18);color:#4a8fff}
.ct-r{background:rgba(200,40,40,.18);color:#c04040}
.ct-g{background:rgba(26,171,60,.18);color:#1aab3c}
.ct-p{background:rgba(130,50,200,.18);color:#9b59e8}

/* ── Grids ───────────────────────────────────────── */
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── Metrics ─────────────────────────────────────── */
.metric{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:background .2s}
.m-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.m-value{font-size:24px;font-weight:700;color:var(--heading);line-height:1}
.m-sub{font-size:10px;color:var(--ok);margin-top:4px}
.m-sub.w{color:var(--warn)}

/* ── Tables ──────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:7px;border:1px solid var(--border)}
table.vt{width:100%;border-collapse:collapse;font-size:12px}
table.vt th{background:var(--navy);color:rgba(255,255,255,.78);font-weight:600;font-size:10px;letter-spacing:.4px;text-transform:uppercase;padding:8px 10px;text-align:left;white-space:nowrap}
table.vt td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
table.vt tr:last-child td{border-bottom:none}
table.vt tr:nth-child(odd) td{background:var(--row0)}
table.vt tr:nth-child(even) td{background:var(--row1)}
table.vt tr:hover td{background:rgba(26,171,138,.06)}
code{font-family:Consolas,'Courier New',monospace;font-size:11px;background:var(--code-bg);color:var(--teal);padding:1px 5px;border-radius:3px;border:1px solid var(--code-border)}

/* ── Code Blocks ─────────────────────────────────── */
.cb{background:var(--code-bg);border:1px solid var(--code-border);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;padding:12px 14px;font-family:Consolas,'Courier New',monospace;font-size:12px;color:var(--code-text);line-height:1.75;white-space:pre;overflow-x:auto;margin:8px 0;position:relative;transition:background .2s}
.kw{color:var(--orange);font-weight:600}
.fn{color:var(--teal)}
.str{color:#5c9}
.cmt{color:var(--muted);font-style:italic}
.copy-btn{position:absolute;top:6px;right:8px;background:rgba(128,128,128,.15);border:1px solid rgba(128,128,128,.25);color:var(--muted);border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s;z-index:2}
.copy-btn:hover{background:var(--orange);border-color:var(--orange);color:#fff}
.copy-btn.copied{background:var(--teal);border-color:var(--teal);color:#fff}

/* ── Pills / Tags ────────────────────────────────── */
.pill{display:inline-flex;align-items:center;border-radius:4px;font-size:10px;font-weight:600;padding:2px 7px;margin:2px}
.p-t{background:var(--tag-bg);color:var(--tag-text)}
.p-o{background:rgba(232,131,10,.14);color:var(--orange)}
.p-b{background:rgba(26,83,200,.11);color:#3a7fd4}
.p-r{background:rgba(200,40,40,.11);color:#c04040}
.p-g{background:rgba(26,171,60,.1);color:#1aab3c}
.p-p{background:rgba(130,50,200,.1);color:#9b59e8}

/* ── Info Banner ─────────────────────────────────── */
.banner{background:var(--accent-bg);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.6}
.banner strong{color:var(--orange)}
.banner-teal{background:rgba(26,171,138,.08);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.6}
.banner-teal strong{color:var(--teal)}
.banner-red{background:rgba(200,40,40,.07);border-left:3px solid #c04040;border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.6}
.banner-red strong{color:#c04040}

/* ── Tabs ────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:2px;overflow-x:auto;flex-shrink:0}
.tab{padding:7px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab:hover:not(.active){color:var(--text)}
.sp{display:none}.sp.active{display:block;animation:fadeIn .12s ease}

/* ── Accordions ──────────────────────────────────── */
.acc{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:8px}
.acc-h{padding:10px 14px;background:var(--row1);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:12px;color:var(--heading);user-select:none;transition:background .15s}
.acc-h:hover{background:var(--row0)}
.acc-arr{color:var(--orange);transition:transform .2s;font-size:14px}
.acc-b{padding:12px 14px;font-size:12px;color:var(--text);line-height:1.7;display:none;border-top:1px solid var(--border)}
.acc-b.open{display:block}

/* ── Step Flow ───────────────────────────────────── */
.flow{display:flex;flex-wrap:wrap;gap:0;margin:10px 0 14px}
.step{background:var(--row1);border:1px solid var(--border);flex:1;min-width:80px;padding:9px 10px;font-size:11px;position:relative;text-align:center;transition:background .15s}
.step:not(:last-child)::after{content:'›';position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--orange);font-size:16px;font-weight:700;z-index:1;pointer-events:none}
.step:first-child{border-radius:6px 0 0 6px}
.step:last-child{border-radius:0 6px 6px 0}
.step-n{display:block;font-size:15px;font-weight:700;color:var(--orange);line-height:1.2}
.step-l{display:block;color:var(--muted);font-size:10px;margin-top:2px}

/* ── VQL Demo ────────────────────────────────────── */
.vql-demo{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;transition:background .2s}
.vql-hdr{background:var(--navy);padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.vql-dots{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.vql-name{color:rgba(255,255,255,.5);font-size:11px;font-family:Consolas,monospace}
.run-btn{background:var(--orange);color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.run-btn:hover{background:var(--orange2);transform:scale(1.03)}
.run-btn.done{background:var(--teal)}
.vql-body{padding:12px 14px}
.vql-result{margin-top:10px;border-radius:6px;overflow:hidden;border:1px solid var(--border);display:none}
.vql-result.shown{display:block;animation:fadeIn .2s ease}

/* ── Artifact Cards ──────────────────────────────── */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:8px}
.art-card{background:var(--row1);border:1px solid var(--border);border-radius:7px;padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.art-card:hover{border-color:var(--teal);background:var(--row0)}
.art-name{font-size:11px;font-weight:600;color:var(--heading);margin-bottom:3px;word-break:break-all;font-family:Consolas,monospace}
.art-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:5px}

/* ── Client List ─────────────────────────────────── */
.client-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;transition:background .1s;cursor:default}
.client-row:last-child{border-bottom:none}
.client-row:hover{background:var(--row1)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cdot.on{background:#22c55e}
.cdot.away{background:#f59e0b}
.cdot.off{background:#6b7399}
.c-name{font-weight:600;color:var(--heading);flex:1}
.c-meta{color:var(--muted);font-size:11px}

/* ── DFIR Fundamentals specific styles ──────────── */
.artifact-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:background .2s}
.artifact-card:hover{border-color:var(--orange);box-shadow:0 2px 10px rgba(232,131,10,.08)}
.artifact-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.artifact-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.artifact-name-block{flex:1}
.artifact-title{font-weight:700;font-size:13px;color:var(--heading);font-family:Consolas,monospace}
.artifact-subtitle{font-size:10px;color:var(--muted);margin-top:1px}
.artifact-body{font-size:12px;color:var(--text);line-height:1.65}
.artifact-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

.evidence-box{background:var(--row1);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin:6px 0}
.evidence-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.evidence-value{font-size:12px;color:var(--text);line-height:1.6}

.proc-tree{font-family:Consolas,monospace;font-size:11px;background:var(--code-bg);border:1px solid var(--code-border);border-radius:6px;padding:10px 14px;line-height:2;color:var(--code-text)}
.proc-normal{color:var(--teal)}
.proc-warn{color:var(--warn);font-weight:600}
.proc-bad{color:#c04040;font-weight:700}
.proc-indent{color:var(--muted)}

.timeline-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border-bottom:none}
.tl-time{font-family:Consolas,monospace;font-size:11px;color:var(--muted);white-space:nowrap;min-width:80px}
.tl-dot{width:10px;height:10px;border-radius:50%;margin-top:3px;flex-shrink:0}
.tl-content{flex:1;font-size:12px;color:var(--text);line-height:1.5}
.tl-event{font-weight:600;color:var(--heading)}
.tl-detail{font-size:11px;color:var(--muted);margin-top:2px}

.lifecycle-phase{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.lifecycle-phase::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.lp-prep::before{background:#4a8fff}
.lp-id::before{background:var(--orange)}
.lp-contain::before{background:#c04040}
.lp-erad::before{background:#9b59e8}
.lp-recover::before{background:var(--teal)}
.lp-lessons::before{background:#1aab3c}
.lp-title{font-weight:700;font-size:12px;margin-bottom:4px}
.lp-velo{font-size:10px;color:var(--teal);font-weight:600;margin-top:6px}

.insight-box{background:rgba(232,131,10,.06);border:1px solid rgba(232,131,10,.2);border-radius:6px;padding:10px 12px;margin:8px 0}
.insight-box .ib-label{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;margin-bottom:3px}
.insight-box .ib-text{font-size:12px;color:var(--text);line-height:1.6}

.forensic-value{display:inline-flex;align-items:center;gap:4px;background:rgba(26,171,138,.1);border:1px solid rgba(26,171,138,.2);border-radius:4px;padding:2px 8px;font-size:10px;font-weight:600;color:var(--teal);margin:2px}

/* ── Typography helpers ──────────────────────────── */
.h2{font-size:14px;font-weight:600;color:var(--heading);margin:16px 0 8px}
.h3{font-size:12px;font-weight:600;color:var(--orange);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
.p{color:var(--text);font-size:12px;line-height:1.65;margin-bottom:8px}
ul.vl{padding-left:16px;color:var(--text);font-size:12px;line-height:1.85}
ul.vl li{margin-bottom:1px}
.sep{height:1px;background:var(--border);margin:14px 0}
.mono{font-family:Consolas,monospace;font-size:11px}

/* ── Search ──────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;background:var(--input);border:1px solid var(--input-border);border-radius:6px;font-size:12px;color:var(--text);font-family:inherit;transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--teal)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}

/* ── Notebook mockup ─────────────────────────────── */
.nb-cell{background:var(--row1);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}
.nb-cell-hdr{padding:5px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.nb-vql-hdr{background:rgba(26,171,138,.1);color:var(--teal);border-bottom:1px solid var(--border)}
.nb-md-hdr{background:rgba(232,131,10,.08);color:var(--orange);border-bottom:1px solid var(--border)}
.nb-cell-body{padding:10px 12px;font-size:12px;line-height:1.65}

/* ── Architecture boxes ──────────────────────────── */
.arch-box{flex:1;min-width:100px;border-radius:8px;padding:12px;text-align:center}
.arch-box .ab-t{font-weight:600;font-size:12px;margin-bottom:4px}
.arch-box .ab-s{font-size:10px;color:var(--muted);line-height:1.4}
.arch-arrow{display:flex;align-items:center;color:var(--orange);font-size:20px;padding:0 2px;flex-shrink:0}

/* ── Filter bar ──────────────────────────────────── */

    <div class="cb" style="margin-top:10px"><span class="cmt">-- Access raw NTFS to see hidden/locked files and Alternate Data Streams</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/**"</span>, accessor=<span class="str">"ntfs"</span>)
<span class="kw">WHERE</span> FullPath <span class="kw">=~</span> <span class="str">":Zone.Identifier"</span>  <span class="cmt">-- files downloaded from the internet</span>
<button class="copy-btn">Copy</button></div>
  </div>
</div>

<!-- ── TAB 3: Artifact Deep Dive ── -->
<div id="ft-artifacts" class="sp">
  <div class="banner"><strong>Know your artifacts cold.</strong> The table below is your rapid-reference for every major Windows forensic artifact — what it proves, where it lives, and which Velociraptor artifact collects it. Based on the SANS FOR500/FOR508 Windows Forensic Analysis curriculum.</div>

  <div class="h3">Evidence of Execution</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Artifact</th><th>Location</th><th>What It Proves</th><th>Proves Execution?</th><th>Velociraptor</th></tr>
    <tr>
      <td><strong>Prefetch</strong></td>
      <td><code>C:\Windows\Prefetch\*.pf</code></td>
      <td>Binary ran, last 8 run times, run count, files touched during execution</td>

    <tr>

      <td><code>Windows.Forensics.Amcache</code></td>
    </tr>
    <tr>
      <td><strong>ShimCache</strong></td>
      <td><code>SYSTEM\CurrentControlSet\Control\Session Manager\AppCompatCache</code></td>

      <td>Raw registry VQL via <code>raw_reg</code> accessor</td>

    <tr>
      <td><strong>SRUM</strong></td>
      <td><code>C:\Windows\System32\sru\SRUDB.dat</code></td>

    </tr>

      <td><strong>Event 4688</strong></td>

    </tr>
    <tr>
      <td><strong>PowerShell 4104</strong></td>

  <div class="h3">Evidence of Persistence</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Mechanism</th><th>Location</th><th>Event Evidence</th><th>Velociraptor</th></tr>
    <tr><td>Registry Run Keys</td><td><code>HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run</code></td><td>Created silently. Look for unusual paths or encoded commands.</td><td><code>Windows.Sys.StartupItems</code></td></tr>
    <tr><td>Scheduled Tasks</td><td><code>C:\Windows\System32\Tasks\</code> + XML definitions</td><td>Event 4698 (task created), 4702 (modified), 4699 (deleted)</td><td><code>Windows.System.ScheduledTasks</code></td></tr>

    <tr><td>WMI Subscriptions</td><td>WMI repository: <code>C:\Windows\System32\wbem\Repository\</code></td><td>Fileless persistence. Executes on triggers. No files on disk.</td><td>WMI query via VQL <code>wmi()</code> plugin</td></tr>
    <tr><td>DLL Hijacking</td><td>Application directories with writable DLL search paths</td><td>Process loading unexpected DLL path visible in Amcache/Prefetch</td><td>DLL path inspection via <code>glob()</code> + hash</td></tr>

  <div class="tbl-wrap"><table class="vt">
    <tr><th>Event ID</th><th>Log</th><th>Meaning & IR Value</th></tr>
    <tr><td><strong>4624</strong></td><td>Security.evtx</td><td>Successful logon. Check <em>LogonType</em>: Type 3=Network (share/PSExec), Type 10=RemoteInteractive (RDP), Type 2=Interactive (console). Source IP reveals lateral movement origin.</td></tr>
    <tr><td><strong>4625</strong></td><td>Security.evtx</td><td>Failed logon. High volume from same source = brute force. Different accounts = credential stuffing. Check SubStatus code for reason.</td></tr>
    <tr><td><strong>4648</strong></td><td>Security.evtx</td><td>Logon with explicit credentials (RunAs, Pass-the-Hash). Logs both the source account and the target account used — critical for PtH detection.</td></tr>
    <tr><td><strong>4672</strong></td><td>Security.evtx</td><td>Special privileges assigned to new logon. Indicates admin-level access. Follow every 4624 with a 4672 from same Logon ID.</td></tr>
    <tr><td><strong>4776</strong></td><td>Security.evtx</td><td>NTLM authentication attempt. Source computer name tells you where credential relay originated.</td></tr>
    <tr><td><strong>4698/7045</strong></td><td>Security/System.evtx</td><td>Scheduled task / service created. One of the highest-fidelity persistence detections. Correlate with the creating user's logon session.</td></tr>
    <tr><td><strong>1102</strong></td><td>Security.evtx</td><td>Audit log cleared. Near-certain evidence of attacker anti-forensics. The <em>clearance time</em> becomes your lower bound for when the attacker had admin access.</td></tr>
    <tr><td><strong>4103/4104</strong></td><td>PowerShell/Operational</td><td>Module logging / Script block logging. 4104 is gold — captures fully de-obfuscated PowerShell code. Enable via Group Policy: Computer Config → Admin Templates → Windows Components → Windows PowerShell.</td></tr>
  </table></div>
</div>

<!-- ── TAB 4: Normal vs Evil Processes ── -->
<div id="ft-processes" class="sp">
  <div class="banner"><strong>Find Evil — Know Normal (SANS FOR508 methodology).</strong> Knowing exactly what a legitimate Windows process looks like — its parent, path, user context, and instance count — lets you immediately spot imposters, typosquatting, and process injection. This table is based on the SANS Hunt Evil poster by Rob Lee and Mike Pilkington.</div>

  <div class="h3">The Windows Process Tree — What's Normal</div>
  <div class="proc-tree">System (PID 4)
  └─ <span class="proc-normal">smss.exe</span>               <span class="proc-indent">Session Manager · %SystemRoot%\System32\smss.exe · ONE instance · Parent: System</span>
      ├─ <span class="proc-normal">csrss.exe</span>            <span class="proc-indent">Client/Server Runtime · ONE per session (0 and 1 minimum)</span>
      └─ <span class="proc-normal">wininit.exe</span>          <span class="proc-indent">Windows Init · ONE instance · Session 0</span>
          ├─ <span class="proc-normal">services.exe</span>     <span class="proc-indent">Service Control Manager · ONE instance · Parent: wininit.exe</span>
          │   └─ <span class="proc-normal">svchost.exe</span>  <span class="proc-indent">Generic Service Host · MANY instances · Always has -k parameter</span>
          ├─ <span class="proc-normal">lsass.exe</span>        <span class="proc-indent">Local Security Authority · ONE instance · No children (normally)</span>
          └─ <span class="proc-normal">lsaiso.exe</span>       <span class="proc-indent">LSA Isolated (Credential Guard) · ZERO or ONE</span>

<span class="proc-normal">winlogon.exe</span>                <span class="proc-indent">Interactive Logon Handler · ONE per session · Parent: smss.exe (exits)</span>
  └─ <span class="proc-normal">explorer.exe</span>          <span class="proc-indent">Shell · ONE per logged-on user · %SystemRoot%\explorer.exe (NOT System32)</span></div>

  <div class="h3">High-Value Process Anomalies to Hunt</div>
  <div class="g2" style="margin-top:8px">
    <div class="artifact-card" style="border-left:3px solid #c04040">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(200,40,40,.1)">🚨</div>
        <div class="artifact-name-block">
          <div class="artifact-title">lsass.exe with child processes</div>
          <div class="artifact-subtitle">Credential Dumping Indicator</div>
        </div>
      </div>
      <div class="artifact-body">Legitimate lsass.exe almost never spawns child processes. If you see lsass.exe as a parent, <strong>immediately investigate</strong> — this is a near-certain indicator of credential dumping tools like Mimikatz or living-off-the-land LSASS access.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Ppid IN (SELECT Pid FROM pslist() WHERE Name =~ "lsass")</code></div></div>
      </div>
    </div>
    <div class="artifact-card" style="border-left:3px solid #c04040">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(200,40,40,.1)">🚨</div>
        <div class="artifact-name-block">
          <div class="artifact-title">svchost.exe without -k parameter</div>
          <div class="artifact-subtitle">Malware Masquerading</div>
        </div>
      </div>
      <div class="artifact-body">Every legitimate svchost.exe has a <code>-k</code> flag in its command line identifying the service group (e.g., <code>-k netsvcs</code>, <code>-k LocalService</code>). A svchost.exe without <code>-k</code>, running from a non-standard path, or with an unusual parent is malware.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Name =~ "svchost" AND NOT CommandLine =~ "-k"</code></div></div>
      </div>
    </div>
    <div class="artifact-card" style="border-left:3px solid var(--warn)">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(200,100,0,.1)">⚠</div>
        <div class="artifact-name-block">
          <div class="artifact-title">explorer.exe spawning cmd/powershell</div>
          <div class="artifact-subtitle">User-Initiated Execution</div>
        </div>
      </div>
      <div class="artifact-body">While not always malicious, explorer.exe directly spawning cmd.exe or powershell.exe with suspicious arguments is a major phishing/macro indicator. Legitimate software rarely does this directly from the shell.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Ppid IN (SELECT Pid FROM pslist() WHERE Name =~ "explorer") AND Name =~ "cmd|powershell|wscript|cscript"</code></div></div>
      </div>
    </div>
    <div class="artifact-card" style="border-left:3px solid var(--warn)">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(200,100,0,.1)">⚠</div>
        <div class="artifact-name-block">
          <div class="artifact-title">Office apps spawning processes</div>
          <div class="artifact-subtitle">Malicious Document / Macro Execution</div>
        </div>
      </div>
      <div class="artifact-body">winword.exe, excel.exe, or powerpnt.exe spawning cmd.exe, powershell.exe, wscript.exe, or mshta.exe is a near-certain indicator of a malicious macro executing a payload.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Ppid IN (SELECT Pid FROM pslist() WHERE Name =~ "winword|excel|powerpnt") AND Name =~ "cmd|powershell|wscript|mshta"</code></div></div>
      </div>
    </div>
    <div class="artifact-card" style="border-left:3px solid #c04040">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(200,40,40,.1)">🚨</div>
        <div class="artifact-name-block">
          <div class="artifact-title">Process running from unusual paths</div>
          <div class="artifact-subtitle">Living-off-the-Land / Dropper</div>
        </div>
      </div>
      <div class="artifact-body">Malware frequently runs from Temp folders, AppData, or the Recycle Bin. Legitimate Windows binaries live in System32, SysWOW64, or Program Files. Any system binary (cmd.exe, regsvr32.exe) running from a temp path is highly suspicious.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Exe =~ "(?i)(temp|appdata|recycle|downloads)" AND NOT Name =~ "chrome|firefox|edge"</code></div></div>
      </div>
    </div>
    <div class="artifact-card" style="border-left:3px solid var(--teal)">
      <div class="artifact-header">
        <div class="artifact-icon" style="background:rgba(26,171,138,.1)">🔍</div>
        <div class="artifact-name-block">
          <div class="artifact-title">explorer.exe in wrong path</div>
          <div class="artifact-subtitle">Typosquatting / Process Spoofing</div>
        </div>
      </div>
      <div class="artifact-body">Legitimate explorer.exe lives in <code>%SystemRoot%\explorer.exe</code> (C:\Windows\), <strong>not</strong> in System32. A process named explorer.exe running from System32 or any other path is malware using a trusted name.
      <div class="insight-box" style="margin-top:6px"><div class="ib-label">VQL Hunt</div><div class="ib-text"><code>SELECT * FROM pslist() WHERE Name =~ "explorer" AND NOT Exe =~ "(?i)C:\\\\Windows\\\\explorer.exe"</code></div></div>
      </div>
    </div>
  </div>
</div>

<!-- ── TAB 5: Lateral Movement ── -->
<div id="ft-lateral" class="sp">
  <div class="banner"><strong>Lateral movement is inescapable.</strong> Every attacker — from script kiddie to nation state — must move from their initial foothold to their target. Every technique leaves traces across multiple artifact types. Your job is to correlate them.</div>

  <div class="h2">Lateral Movement Techniques & Evidence Mapping</div>
  <div class="g2">
    <div class="card" style="border-top:3px solid #c04040">
      <div class="card-title"><span class="ct ct-r">🖥</span> Remote Desktop Protocol (RDP)</div>
      <div class="p">RDP is the most common initial access and lateral movement vector. Every RDP session leaves evidence on both the source and destination system.</div>
      <div class="h3">Destination System</div>
      <div class="tbl-wrap"><table class="vt">
        <tr><th>Log</th><th>Event IDs</th><th>Evidence</th></tr>
        <tr><td>Security</td><td>4624 Type 10</td><td>Successful RDP logon + source IP</td></tr>
        <tr><td>Security</td><td>4625</td><td>Failed RDP logon attempts</td></tr>
        <tr><td>Security</td><td>4778/4779</td><td>Session reconnect/disconnect</td></tr>
        <tr><td>TermSvc-RemoteConnectionMgr</td><td>1149</td><td>RDP auth successful (Win7+)</td></tr>
        <tr><td>TermSvc-LocalSessionMgr</td><td>21, 22</td><td>RDP successful logon with username</td></tr>
        <tr><td>TermSvc-LocalSessionMgr</td><td>23</td><td>RDP logoff with username</td></tr>
        <tr><td>RdpCoreTS\Operational</td><td>98, 131</td><td>Network connection established (131 has source IP)</td></tr>
      </table></div>
      <div class="h3" style="margin-top:10px">Source System</div>
      <div class="tbl-wrap"><table class="vt">
        <tr><th>Artifact</th><th>Evidence</th></tr>
        <tr><td>NTUSER.DAT registry</td><td>MRU of RDP destinations</td></tr>
        <tr><td>JumpLists (mstsc-appid)</td><td>Connection history with timestamps</td></tr>
        <tr><td>BAM/DAM</td><td>Last time mstsc.exe was run</td></tr>
        <tr><td>TerminalServices-RDPClient</td><td>Event 1024 (hostname) / 1102 (IP)</td></tr>
        <tr><td>Bitmap Cache</td><td>C:\Users\...\AppData\Local\Microsoft\Terminal Server Client\Cache\</td></tr>
      </table></div>
    </div>

    <div class="card" style="border-top:3px solid var(--orange)">
      <div class="card-title"><span class="ct ct-o">🔑</span> Pass-the-Hash / Lateral Tool Transfer</div>
      <div class="p">Attackers reuse NTLM hashes to authenticate without the plaintext password. PSExec, WMI, and SMB share access all leave cross-artifact trails.</div>
      <div class="h3">Evidence Chain</div>
      <div class="tbl-wrap"><table class="vt">
        <tr><th>Artifact</th><th>Evidence</th></tr>
        <tr><td>Event 4624 Type 3</td><td>Network logon (SMB/WMI). Source IP is the attacker's machine.</td></tr>
        <tr><td>Event 4648</td><td>Explicit credential logon — logs both source and alternate account used</td></tr>
        <tr><td>Event 4776</td><td>NTLM authentication — records source hostname</td></tr>
        <tr><td>Event 5140</td><td>Network share accessed (C$, ADMIN$, IPC$)</td></tr>
        <tr><td>Event 7045</td><td>New service installed on destination — PSExec creates PSEXESVC</td></tr>
        <tr><td>ShimCache / Prefetch</td><td>psexec.exe / paexec.exe on both source and destination</td></tr>
        <tr><td>SRUM</td><td>Historical network bytes showing large file transfer to/from attacker IP</td></tr>
      </table></div>
      <div class="cb" style="margin-top:10px;font-size:11px"><span class="cmt">-- Hunt for PSExec-like service creation followed by deletion</span>
<span class="kw">SELECT</span> System.TimeCreated, EventData.ServiceName,
       EventData.ImagePath, EventData.AccountName
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"System.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">7045</span>
  <span class="kw">AND</span> EventData.ServiceName <span class="kw">=~</span> <span class="str">"psexe|remcom|paexec"</span>
<button class="copy-btn">Copy</button></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="ct ct-b">🔗</span> WMI Lateral Movement</div>
    <div class="p">Windows Management Instrumentation (WMI) is heavily abused for lateral movement and persistence. It runs as system, leaves minimal footprint, and is present on every Windows system.</div>
    <div class="g2">
      <div>
        <div class="h3">WMI Execution Indicators</div>
        <ul class="vl">
          <li>WmiPrvSE.exe spawning unusual child processes</li>
          <li>Event 4688: Process creation with parent WmiPrvSE.exe</li>
          <li>WMI subscriptions in the WMI repository (persistent)</li>
          <li>Microsoft-Windows-WMI-Activity/Operational Event 5857/5860</li>
        </ul>
      </div>
      <div class="cb" style="font-size:11px"><span class="cmt">-- Hunt WMI persistence subscriptions</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">wmi</span>(
  query=<span class="str">"SELECT * FROM __EventFilter"</span>)

<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">wmi</span>(
  query=<span class="str">"SELECT * FROM __EventConsumer"</span>)
<button class="copy-btn">Copy</button></div>
    </div>
  </div>
</div>

<!-- ── TAB 6: Timestamps & MACB ── -->
<div id="ft-timestamps" class="sp">
  <div class="banner"><strong>Timestamps lie — unless you understand them.</strong> MACB timestamps (Modified, Accessed, Changed/$SI, Birth) tell a story, but that story is highly dependent on the OS version and the exact file operation performed. This section explains what Velociraptor's MFT data actually means.</div>

  <div class="h2">MACB Timestamps Explained</div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="ct ct-b">🕐</span> The Four NTFS Timestamps</div>
      <div class="tbl-wrap"><table class="vt">
        <tr><th>Stamp</th><th>Full Name</th><th>Updated When</th></tr>
        <tr><td><span class="pill p-o">M</span></td><td>$SI Modified</td><td>File data content is written/changed</td></tr>
        <tr><td><span class="pill p-b">A</span></td><td>$SI Accessed</td><td>File is read or executed (often disabled on Win10+)</td></tr>
        <tr><td><span class="pill p-t">C</span></td><td>$SI Changed</td><td>MFT entry metadata changes (permissions, rename, owner)</td></tr>
        <tr><td><span class="pill p-r">B</span></td><td>$FN Birth</td><td>File is created on this volume (copied = creation time of copy)</td></tr>
      </table></div>
      <div class="p" style="margin-top:10px">NTFS stores timestamps in two places: the <code>$STANDARD_INFORMATION</code> attribute (visible to tools/API) and the <code>$FILE_NAME</code> attribute (harder to modify, requires kernel access). Timestomping tools change <code>$SI</code> but often miss <code>$FN</code> — a discrepancy between them is a timestomping indicator.</div>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct ct-r">⚠</span> Timestomping Detection</div>
      <div class="p">Timestomping is the attacker practice of modifying file timestamps to hide activity or blend in with legitimate files. Velociraptor's MFT parser exposes both <code>$SI</code> and <code>$FN</code> timestamps, enabling detection.</div>
      <div class="insight-box"><div class="ib-label">Detection Rule</div><div class="ib-text">If <code>$SI_Modified</code> is <em>earlier</em> than <code>$FN_Modified</code>, the file has been timestomped. The <code>$FN</code> timestamp requires kernel-level access to change and is rarely altered by commodity tools.</div></div>
      <div class="cb" style="font-size:11px"><span class="cmt">-- Detect timestomping via $SI vs $FN discrepancy</span>
<span class="kw">SELECT</span> FullPath, SI_Mtime, FN_Mtime,
  SI_Mtime - FN_Mtime <span class="kw">AS</span> TimeDiff
<span class="kw">FROM</span> <span class="fn">parse_mft</span>()
<span class="kw">WHERE</span> SI_Mtime &lt; FN_Mtime
  <span class="kw">AND</span> FullPath <span class="kw">=~</span> <span class="str">"\.exe$"</span>
<button class="copy-btn">Copy</button></div>
    </div>
  </div>

  <div class="h2">Critical Timestamp Rules (SANS FOR500)</div>
  <div class="card">
    <div class="tbl-wrap"><table class="vt">
      <tr><th>File Operation</th><th>$SI Modified</th><th>$SI Accessed</th><th>$SI Changed</th><th>$SI Birth (Creation)</th><th>Forensic Note</th></tr>
      <tr><td><strong>File Created</strong></td><td>Creation time</td><td>Creation time</td><td>Creation time</td><td>Creation time</td><td>All four match on new file creation</td></tr>
      <tr><td><strong>File Copied (new)</strong></td><td>Inherited from original</td><td>Copy time</td><td>Copy time</td><td>Copy time</td><td>Birth = time of copy. Modified stays from source → reveals attacker staging</td></tr>
      <tr><td><strong>File Modified</strong></td><td>Modification time</td><td>Modification time</td><td>Modification time</td><td>No change</td><td>Birth unchanged → file was created before this modification</td></tr>
      <tr><td><strong>File Renamed</strong></td><td>No change</td><td>No change</td><td>Rename time</td><td>No change</td><td>Changed time shows rename even if other timestamps are backdated</td></tr>
      <tr><td><strong>Volume File Move (CLI)</strong></td><td>Inherited</td><td>Move time</td><td>Inherited</td><td>Move time</td><td>Birth = move time when using command line move across volumes</td></tr>
    </table></div>
    <div class="insight-box" style="margin-top:10px"><div class="ib-label">💡 Key Investigative Rule</div><div class="ib-text">If a file's <strong>Modified time is earlier than its Birth (Creation) time</strong>, the file was copied from another location. The Modified time reflects when the source file was last written; the Birth time reflects when it arrived on this volume. This is extremely common with staged malware — the binary was compiled weeks ago but only copied here today.</div></div>
  </div>
</div>
`;}

  <button class="tab active" data-target="at1">Structure</button>
  <button class="tab" data-target="at2">Types</button>
  <button class="tab" data-target="at3">Catalog</button>
  <button class="tab" data-target="at4">Writing Tips</button>
</div>
<div id="at1" class="sp active">
  <div class="banner"><strong>Artifacts</strong> are the primary unit of shareable, parameterized VQL in Velociraptor. They give complex queries a human-readable name, documentation, configurable parameters, and optional preconditions.</div>
  <div class="cb"><span class="kw">name:</span> <span class="str">Custom.Windows.SuspiciousExes</span>
<span class="kw">description:</span> <span class="str">Find small unsigned executables in System32.</span>
<span class="kw">author:</span> <span class="str">SOC Team</span>
<span class="kw">type:</span> <span class="str">CLIENT</span>
<span class="kw">parameters:</span>
  - <span class="kw">name:</span> <span class="str">MaxSize</span>
    <span class="kw">default:</span> <span class="str">"10000"</span>
    <span class="kw">description:</span> <span class="str">Max file size in bytes</span>
    <span class="kw">type:</span> <span class="str">int</span>
<span class="kw">precondition:</span> <span class="str">SELECT OS From info() where OS = 'windows'</span>
<span class="kw">sources:</span>
  - <span class="kw">name:</span> <span class="str">SuspiciousExes</span>
    <span class="kw">query:</span> |
      <span class="kw">SELECT</span> FullPath, Size, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256
      <span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/System32/*.exe"</span>)
      <span class="kw">WHERE</span> Size &lt; MaxSize
<button class="copy-btn">Copy</button></div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Field</th><th>Required</th><th>Description</th></tr>
    <tr><td><code>name</code></td><td><span class="badge badge-ok">Yes</span></td><td>Unique dot-namespaced ID, e.g. Windows.Forensics.Prefetch</td></tr>
    <tr><td><code>description</code></td><td><span class="badge badge-warn">Rec.</span></td><td>Human-readable explanation shown in GUI</td></tr>
    <tr><td><code>author</code></td><td>No</td><td>Artifact author attribution</td></tr>
    <tr><td><code>type</code></td><td><span class="badge badge-warn">Rec.</span></td><td>CLIENT, SERVER, CLIENT_EVENT, SERVER_EVENT, NOTEBOOK</td></tr>
    <tr><td><code>parameters</code></td><td>No</td><td>Inputs with name, default, type (int/bool/string/yara/regex/csv)</td></tr>
    <tr><td><code>sources</code></td><td><span class="badge badge-ok">Yes</span></td><td>Named query blocks — each produces a separate result table</td></tr>
    <tr><td><code>precondition</code></td><td>No</td><td>VQL expression — artifact skips if this returns no rows</td></tr>
    <tr><td><code>tools</code></td><td>No</td><td>External binaries Velociraptor fetches, caches, and distributes</td></tr>
    <tr><td><code>resources</code></td><td>No</td><td>cpu_limit, max_rows, timeout, max_upload_bytes</td></tr>
    <tr><td><code>export</code></td><td>No</td><td>VQL functions/constants exported for other artifacts to import</td></tr>
  </table></div>
</div>
<div id="at2" class="sp">
  <div class="g2">
    <div class="card" style="border-left:3px solid var(--teal)">
      <div class="card-title">CLIENT</div>
      <div class="p">Runs on an endpoint when triggered by a collection or hunt. Results stream to the server. Most artifacts are this type.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid var(--orange)">
      <div class="card-title">CLIENT_EVENT</div>
      <div class="p">Runs continuously on the endpoint, streaming events in real time. Persists until removed. Used for detection, monitoring, and alerting.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT_EVENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid #4a8fff">
      <div class="card-title">SERVER</div>
      <div class="p">Runs on the Velociraptor server. Used for post-processing hunt results, enrichment, sending notifications, and server-side automation.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER</span></div>
    </div>
    <div class="card" style="border-left:3px solid #c04040">
      <div class="card-title">SERVER_EVENT</div>
      <div class="p">Continuous server-side monitoring. Can watch CLIENT_EVENT streams and trigger automated responses — webhooks, SOAR, notifications.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER_EVENT</span></div>
    </div>
  </div>
</div>
<div id="at3" class="sp">
  <div class="filter-bar" id="artFilterBar">
    <button class="fbtn active" onclick="filterArts('all',this)">All</button>
    <button class="fbtn" onclick="filterArts('windows',this)">Windows</button>
    <button class="fbtn" onclick="filterArts('linux',this)">Linux</button>
    <button class="fbtn" onclick="filterArts('detection',this)">Detection</button>
    <button class="fbtn" onclick="filterArts('forensics',this)">Forensics</button>
  </div>
  <div class="art-grid" id="artGrid"></div>
</div>
<div id="at4" class="sp">
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Naming conventions</span><span class="acc-arr">›</span></div><div class="acc-b">Use dot-namespaced names: <code>OS.Category.Sub</code>. Built-ins follow this convention: <code>Windows.Forensics.Prefetch</code>, <code>Linux.Sys.Pslist</code>, <code>Generic.Detection.Yara</code>. Custom artifacts should start with your org name to avoid conflicts with future built-ins: <code>Acme.Detection.Beacon</code>, <code>Corp.IR.Triage</code>.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Parameter types</span><span class="acc-arr">›</span></div><div class="acc-b">Available parameter types: <code>string</code>, <code>int</code>, <code>bool</code>, <code>timestamp</code>, <code>choices</code>, <code>csv</code>, <code>json</code>, <code>yara</code>, <code>regex</code>, <code>upload</code>. Always provide sensible defaults so analysts can run without configuring everything. The <code>yara</code> and <code>regex</code> types give analysts a multiline editor in the GUI.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Resource limits</span><span class="acc-arr">›</span></div><div class="acc-b">Add a <code>resources</code> block to prevent runaway artifacts from degrading endpoint performance. Key fields: <code>cpu_limit: 50</code> (percent), <code>max_rows: 100000</code>, <code>timeout: 300</code> (seconds), <code>max_upload_bytes: 1000000000</code>. These are enforced by the client-side VQL engine.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Multiple sources</span><span class="acc-arr">›</span></div><div class="acc-b">Artifacts support multiple named <code>sources</code>, each producing a separate result table shown as tabs in the GUI. Use this to collect related but distinct data in one artifact — e.g. one source for processes, another for network connections, and a third for startup items.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Importing and exporting</span><span class="acc-arr">›</span></div><div class="acc-b">Use the <code>export</code> field to expose VQL functions and constants that other artifacts can <code>import</code>. This enables composability and prevents code duplication across your artifact library.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Artifact Exchange</span><span class="acc-arr">›</span></div><div class="acc-b">The <a href="https://docs.velociraptor.app/exchange/" target="_blank" style="color:var(--teal)">Artifact Exchange</a> hosts hundreds of community-contributed artifacts. Import them directly in the GUI under <em>View Artifacts → Add Artifact → Import from Exchange</em>. Review the VQL before deploying in production.</div></div>
</div>`;}

function paneHunting(){return`

<div class="flow">
  <div class="step"><span class="step-n">1</span><span class="step-l">Select Artifact</span></div>

  <div class="step"><span class="step-n">3</span><span class="step-l">Target Clients</span></div>
  <div class="step"><span class="step-n">4</span><span class="step-l">Launch Hunt</span></div>
  <div class="step"><span class="step-n">5</span><span class="step-l">Monitor Progress</span></div>
  <div class="step"><span class="step-n">6</span><span class="step-l">Triage Results</span></div>
</div>
<div class="g2">

    <div class="tbl-wrap"><table class="vt">
      <tr><th>Target</th><th>Description</th></tr>
      <tr><td>All Clients</td><td>Every currently enrolled endpoint</td></tr>
      <tr><td>By Label</td><td>Tagged groups: "Servers", "Finance", "Tier1"</td></tr>
      <tr><td>By OS</td><td>Windows / Linux / macOS separately</td></tr>
      <tr><td>By Condition</td><td>VQL expression evaluated against client info</td></tr>
      <tr><td>By Client ID list</td><td>Explicit list of client IDs</td></tr>

  </div>

    <ul class="vl">
      <li>Per-client results in the GUI Clients tab</li>
      <li>Download full results as CSV</li>
      <li>Download full results as JSONL</li>
      <li>Post-process with a SERVER artifact in a Notebook</li>
      <li>Stream to Splunk / Elastic / SIEM via API</li>
      <li>Trigger automated follow-up via SERVER_EVENT</li>
    </ul>
  </div>
</div>
<div class="card">
  <div class="card-title"><span class="ct ct-r">◎</span> IOC-to-Hunt in Under 5 Minutes</div>
  <div class="flow">
    <div class="step"><span class="step-n" style="font-size:10px">Advisory</span><span class="step-l">Receive IOC</span></div>
    <div class="step"><span class="step-n" style="font-size:10px">Artifact</span><span class="step-l">Write or find</span></div>
    <div class="step"><span class="step-n" style="font-size:10px">Test</span><span class="step-l">Single client</span></div>

    <div class="step"><span class="step-n" style="font-size:10px">Triage</span><span class="step-l">Positive hits</span></div>

  </div>
</div>
<div class="h3">YARA Hunt — Cobalt Strike Beacon</div>
<div class="cb"><span class="kw">LET</span> YaraRule = <span class="str">'''
rule CobaltStrikeBeacon {
  strings:
    $x1 = { FC 48 83 E4 F0 }
    $x2 = "ReflectiveLoader" ascii
  condition: any of them
}
'''</span>

<span class="kw">SELECT</span> FullPath, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256, Rule
<span class="kw">FROM</span> <span class="fn">yara</span>(rules=YaraRule, files=<span class="str">"C:/Windows/**/*.dll"</span>)
<button class="copy-btn">Copy</button></div>`;}

function paneForensics(){return`
<div id="for-tabs" class="tab-bar">
  <button class="tab active" data-target="ft1">Filesystem</button>
  <button class="tab" data-target="ft2">Execution Evidence</button>

</div>

    <tr><td>Windows.Forensics.ShimCache</td><td>AppCompatCache execution list</td><td>SYSTEM hive, ControlSet</td></tr>
    <tr><td>Windows.Forensics.SRUM</td><td>Historical process and network activity</td><td>C:\Windows\System32\sru\</td></tr>
    <tr><td>Windows.Forensics.Bam</td><td>Background Activity Monitor (last run time)</td><td>SYSTEM hive, Services\bam</td></tr>

    <tr><td>Windows.EventLogs.EvtxHunter</td><td>Event ID 4688 process creation</td><td>Security.evtx</td></tr>
  </table></div>
</div>
<div id="ft3" class="sp">
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Event ID</th><th>Channel</th><th>Meaning</th></tr>

function paneMonitoring(){return`
<div class="banner"><strong>CLIENT_EVENT artifacts</strong> run continuously on enrolled endpoints and stream events to the server as they occur. They persist until explicitly removed or updated.</div>
<div class="g2">
  <div class="card">
    <div class="card-title"><span class="ct ct-t">◉</span> Core Monitoring Artifacts</div>
    <div class="tbl-wrap"><table class="vt">
      <tr><th>Artifact</th><th>Detects</th></tr>
      <tr><td>Windows.Events.ProcessCreation</td><td>Every new process + full command line</td></tr>
      <tr><td>Windows.Events.ServiceCreation</td><td>New Windows services (persistence)</td></tr>
      <tr><td>Windows.Events.DNSQueries</td><td>DNS lookups via ETW (no network tap needed)</td></tr>
      <tr><td>Windows.Events.NetworkSummary</td><td>New outbound connections</td></tr>
      <tr><td>Windows.Events.ScheduledTasks</td><td>Task creation, modification, deletion</td></tr>
      <tr><td>Windows.Sigma.Base</td><td>Sigma rule matches on streaming event logs</td></tr>
      <tr><td>Linux.Events.Execve</td><td>Process execution via eBPF or audit daemon</td></tr>
    </table></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="ct ct-o">▲</span> Server-Side Alerting (SERVER_EVENT)</div>
    <div class="p">Watch incoming client event streams and trigger automated actions:</div>
    <div class="cb" style="font-size:11px"><span class="kw">LET</span> hits = <span class="kw">SELECT</span> * <span class="kw">FROM</span>
  <span class="fn">watch_monitoring</span>(
    artifact=<span class="str">'Windows.Events.ProcessCreation'</span>)
  <span class="kw">WHERE</span> CommandLine <span class="kw">=~</span> <span class="str">"mimikatz|lsass|sekurlsa"</span>

<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">foreach</span>(row=hits,
  query={ <span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">http_client</span>(
    url=SlackWebhookURL,
    data=dict(text=format(
      format=<span class="str">"ALERT: %v on %v"</span>,
      args=[CommandLine, ClientId]))
  )}
)
<button class="copy-btn">Copy</button></div>
  </div>
</div>`;}

function paneOffline(){return`
<div class="banner"><strong>Offline collectors</strong> are pre-built Velociraptor binaries that collect artifacts locally to a ZIP file — no server connection required at collection time.</div>
<div class="g2">
  <div class="card">
    <div class="card-title"><span class="ct ct-t">◆</span> Use Cases</div>
    <ul class="vl">
      <li>Air-gapped or network-isolated environments</li>
      <li>Partner or vendor-managed devices</li>

/* ── Global Search ── */
window.openSearch = function(){
  document.getElementById('gsearch-overlay').classList.add('open');
  document.getElementById('gsearch-input').focus();
  document.getElementById('gsearch-results').innerHTML = '<div class="gs-empty">Start typing to search the guide…</div>';
  document.getElementById('gsearch-input').value = '';
};
window.closeSearch = function(e){
  if(e.target.id === 'gsearch-overlay') document.getElementById('gsearch-overlay').classList.remove('open');
};
window.doSearch = function(q){
  const results = document.getElementById('gsearch-results');
  if(!q.trim()){results.innerHTML='<div class="gs-empty">Start typing to search the guide…</div>';return;}
  const terms = q.toLowerCase().split(/\s+/);
  const matches = SEARCH_INDEX.filter(item => {
    const hay = (item.title + ' ' + item.text).toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  if(!matches.length){results.innerHTML='<div class="gs-empty">No results found.</div>';return;}
  const highlight = (str) => {
    let h = str;
    terms.forEach(t => { h = h.replace(new RegExp('('+t+')', 'gi'), '<em>$1</em>'); });
    return h;
  };
  results.innerHTML = matches.slice(0,12).map(m => `
    <div class="gs-result" onclick="goTo('${m.id}');document.getElementById('gsearch-overlay').classList.remove('open')">
      <div class="gs-title">${highlight(m.title)}</div>
      <div class="gs-match">${TITLES[m.id] || m.id} section</div>
    </div>`).join('');
};
window.searchKeyNav = function(e){
  if(e.key==='Escape') document.getElementById('gsearch-overlay').classList.remove('open');
};
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='k'){e.preventDefault();openSearch();}
});

function goTo(id){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.getElementById('tbTitle').textContent = TITLES[id]||id;
  document.getElementById('tbSub').textContent = SUBS[id]||'';
  const c = document.getElementById('content');
  c.innerHTML = `<div class="pane active">${(PANES[id]||(() => '<p class="p">Coming soon.</p>'))()}</div>`;
  c.scrollTop = 0;
  // Bind tabs
  c.querySelectorAll('.tab-bar button.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const bar = tab.closest('.tab-bar');
      bar.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.target;
      const pane = c.querySelector('.pane.active');
      pane.querySelectorAll('.sp').forEach(sp=>sp.classList.toggle('active',sp.id===target));
    });
  });
  if(id==='artifacts') setTimeout(renderArtGrid,0);
}

  const filtered = cat==='all' ? ARTS : ARTS.filter(a=>a.c===cat);

}

/* ── Copy-to-clipboard for .copy-btn ── */
document.addEventListener('click', e => {
  if(!e.target.classList.contains('copy-btn')) return;
  const cb = e.target.closest('.cb') || e.target.closest('.vql-body .cb');
  if(!cb) return;
  // Get text, excluding other copy-btn text and VQL result tables
  const clone = cb.cloneNode(true);
  clone.querySelectorAll('.copy-btn').forEach(b => b.remove());
  const text = clone.innerText.trim();
  navigator.clipboard.writeText(text).then(() => {
    const orig = e.target.textContent;
    e.target.textContent = '✓ Copied';
    e.target.classList.add('copied');
    setTimeout(() => { e.target.textContent = 'Copy'; e.target.classList.remove('copied'); }, 1800);
  }).catch(() => {
    e.target.textContent = 'Error';
    setTimeout(() => { e.target.textContent = 'Copy'; }, 1500);
  });
});
