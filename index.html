      </div>
      <button class="run-btn" onclick="runVQL(this,'ex1')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Pid, Ppid, Name, CommandLine, CreateTime
<span class="kw">FROM</span> <span class="fn">pslist</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"powershell"</span></div>
      <div class="vql-result" id="ex1"><table class="vt">
        <tr><th>Pid</th><th>Ppid</th><th>Name</th><th>CommandLine</th><th>CreateTime</th></tr>
        <tr><td>5512</td><td>3120</td><td>powershell.exe</td><td>powershell -enc JAB...</td><td>2025-03-24 09:12</td></tr>
        <tr><td>7840</td><td>880</td><td>powershell.exe</td><td>powershell.exe -ep bypass -c IEX</td><td>2025-03-24 11:45</td></tr>
      </table></div>
    </div>
  </div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Hash small exes in System32</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'ex2')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> FullPath, Size, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256, Mtime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/System32/*.exe"</span>)
<span class="kw">WHERE</span> Size &lt; <span class="str">10000</span>
<span class="kw">ORDER BY</span> Size</div>
      <div class="vql-result" id="ex2"><table class="vt">
        <tr><th>FullPath</th><th>Size</th><th>SHA256</th><th>Mtime</th></tr>
        <tr><td>C:\Windows\System32\reg.exe</td><td>6144</td><td>a3c2a...</td><td>2023-10-11</td></tr>
        <tr><td>C:\Windows\System32\suspect.exe</td><td>4096</td><td>00000...</td><td>2025-03-22</td></tr>
      </table></div>
    </div>
  </div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Security log — logon events (4624)</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'ex3')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> System.TimeCreated, EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP, EventData.LogonType
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span> <span class="kw">LIMIT</span> <span class="str">5</span></div>
      <div class="vql-result" id="ex3"><table class="vt">
        <tr><th>TimeCreated</th><th>User</th><th>SourceIP</th><th>LogonType</th></tr>
        <tr><td>2025-03-24 08:01</td><td>jsmith</td><td>10.0.0.14</td><td>3 (Network)</td></tr>
        <tr><td>2025-03-24 09:23</td><td>badactor</td><td><strong style="color:#c04040">185.220.101.x</strong></td><td>10 (RemoteInteractive)</td></tr>
      </table></div>
    </div>
  </div>
</div>
<div id="vt4" class="sp">
  <div class="h3">LET — Named Sub-queries</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Define a reusable result set</span>
<span class="kw">LET</span> suspicious = <span class="kw">SELECT</span> Pid, Name, CommandLine
  <span class="kw">FROM</span> <span class="fn">pslist</span>() <span class="kw">WHERE</span> CommandLine <span class="kw">=~</span> <span class="str">"mimikatz|beacon|cobalt"</span>

<span class="kw">SELECT</span> * <span class="kw">FROM</span> suspicious <span class="kw">WHERE</span> Pid > <span class="str">1000</span></div>
  <div class="h3">foreach — Iterate Over Rows</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- For each suspicious process, list its network connections</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid <span class="kw">FROM</span> suspicious },
  query={ <span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">netstat</span>() <span class="kw">WHERE</span> Pid = Pid }
)</div>
  <div class="h3">Accessors — Filesystem Abstraction Layer</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Accessor</th><th>Description</th></tr>
    <tr><td><code>file</code></td><td>Default OS filesystem — subject to OS buffering and ACLs</td></tr>
    <tr><td><code>ntfs</code></td><td>Low-level NTFS: bypasses OS cache, exposes ADS, $MFT, $LogFile</td></tr>
    <tr><td><code>raw_reg</code></td><td>Direct registry hive parsing without registry API</td></tr>
    <tr><td><code>zip</code></td><td>Browse inside ZIP, EVTX, or other container files</td></tr>
    <tr><td><code>s3</code></td><td>AWS S3 bucket access for cloud artifact collection</td></tr>
    <tr><td><code>smb</code></td><td>Remote SMB share access</td></tr>
  </table></div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">glob</span>(
  globs=<span class="str">"/**/*.exe"</span>,
  accessor=<span class="str">"ntfs"</span>  <span class="cmt">-- bypass OS, see hidden and locked files</span>
)</div>
</div>`;}

function paneArtifacts(){return`
<div id="art-tabs" class="tab-bar">
  <button class="tab active" data-target="at1">Structure</button>
  <button class="tab" data-target="at2">Types</button>
  <button class="tab" data-target="at3">Catalog</button>
  <button class="tab" data-target="at4">Writing Tips</button>
</div>
<div id="at1" class="sp active">
  <div class="banner"><strong>Artifacts</strong> are the primary unit of shareable, parameterized VQL in Velociraptor. They give complex queries a human-readable name, documentation, configurable parameters, and optional preconditions.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="kw">name:</span> <span class="str">Custom.Windows.SuspiciousExes</span>
<span class="kw">description:</span> <span class="str">Find small unsigned executables in System32.</span>
<span class="kw">author:</span> <span class="str">SOC Team</span>
<span class="kw">type:</span> <span class="str">CLIENT</span>
<span class="kw">parameters:</span>
  - <span class="kw">name:</span> <span class="str">MaxSize</span>
    <span class="kw">default:</span> <span class="str">"10000"</span>
    <span class="kw">description:</span> <span class="str">Max file size in bytes</span>
    <span class="kw">type:</span> <span class="str">int</span>
<span class="kw">precondition:</span> <span class="str">SELECT OS From info() where OS = 'windows'</span>
<span class="kw">sources:</span>
  - <span class="kw">name:</span> <span class="str">SuspiciousExes</span>
    <span class="kw">query:</span> |
      <span class="kw">SELECT</span> FullPath, Size, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256
      <span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/System32/*.exe"</span>)
      <span class="kw">WHERE</span> Size &lt; MaxSize</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Field</th><th>Required</th><th>Description</th></tr>
    <tr><td><code>name</code></td><td><span class="badge badge-ok">Yes</span></td><td>Unique dot-namespaced ID, e.g. Windows.Forensics.Prefetch</td></tr>
    <tr><td><code>description</code></td><td><span class="badge badge-warn">Rec.</span></td><td>Human-readable explanation shown in GUI</td></tr>
    <tr><td><code>author</code></td><td>No</td><td>Artifact author attribution</td></tr>
    <tr><td><code>type</code></td><td><span class="badge badge-warn">Rec.</span></td><td>CLIENT, SERVER, CLIENT_EVENT, SERVER_EVENT, NOTEBOOK</td></tr>
    <tr><td><code>parameters</code></td><td>No</td><td>Inputs with name, default, type (int/bool/string/yara/regex/csv)</td></tr>
    <tr><td><code>sources</code></td><td><span class="badge badge-ok">Yes</span></td><td>Named query blocks — each produces a separate result table</td></tr>
    <tr><td><code>precondition</code></td><td>No</td><td>VQL expression — artifact skips if this returns no rows</td></tr>
    <tr><td><code>tools</code></td><td>No</td><td>External binaries Velociraptor fetches, caches, and distributes</td></tr>
    <tr><td><code>resources</code></td><td>No</td><td>cpu_limit, max_rows, timeout, max_upload_bytes</td></tr>
    <tr><td><code>export</code></td><td>No</td><td>VQL functions/constants exported for other artifacts to import</td></tr>
  </table></div>
</div>
<div id="at2" class="sp">
  <div class="g2">
    <div class="card" style="border-left:3px solid var(--teal)">
      <div class="card-title">CLIENT</div>
      <div class="p">Runs on an endpoint when triggered by a collection or hunt. Results stream to the server. Most artifacts are this type.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid var(--orange)">
      <div class="card-title">CLIENT_EVENT</div>
      <div class="p">Runs continuously on the endpoint, streaming events in real time. Persists until removed. Used for detection, monitoring, and alerting.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT_EVENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid #4a8fff">
      <div class="card-title">SERVER</div>
      <div class="p">Runs on the Velociraptor server. Used for post-processing hunt results, enrichment, sending notifications, and server-side automation.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER</span></div>
    </div>
    <div class="card" style="border-left:3px solid #c04040">
      <div class="card-title">SERVER_EVENT</div>
      <div class="p">Continuous server-side monitoring. Can watch CLIENT_EVENT streams and trigger automated responses — webhooks, SOAR, notifications.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER_EVENT</span></div>
    </div>
  </div>
</div>
<div id="at3" class="sp">
  <div class="filter-bar" id="artFilterBar">
    <button class="fbtn active" onclick="filterArts('all',this)">All</button>
    <button class="fbtn" onclick="filterArts('windows',this)">Windows</button>
    <button class="fbtn" onclick="filterArts('linux',this)">Linux</button>
    <button class="fbtn" onclick="filterArts('detection',this)">Detection</button>
    <button class="fbtn" onclick="filterArts('forensics',this)">Forensics</button>
  </div>
  <div class="art-grid" id="artGrid"></div>
</div>
<div id="at4" class="sp">
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Naming conventions</span><span class="acc-arr">›</span></div><div class="acc-b">Use dot-namespaced names: <code>OS.Category.Sub</code>. Built-ins follow this convention: <code>Windows.Forensics.Prefetch</code>, <code>Linux.Sys.Pslist</code>, <code>Generic.Detection.Yara</code>. Custom artifacts should start with your org name to avoid conflicts with future built-ins: <code>Acme.Detection.Beacon</code>, <code>Corp.IR.Triage</code>.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Parameter types</span><span class="acc-arr">›</span></div><div class="acc-b">Available parameter types: <code>string</code>, <code>int</code>, <code>bool</code>, <code>timestamp</code>, <code>choices</code>, <code>csv</code>, <code>json</code>, <code>yara</code>, <code>regex</code>, <code>upload</code>. Always provide sensible defaults so analysts can run without configuring everything. The <code>yara</code> and <code>regex</code> types give analysts a multiline editor in the GUI.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Resource limits</span><span class="acc-arr">›</span></div><div class="acc-b">Add a <code>resources</code> block to prevent runaway artifacts from degrading endpoint performance. Key fields: <code>cpu_limit: 50</code> (percent), <code>max_rows: 100000</code>, <code>timeout: 300</code> (seconds), <code>max_upload_bytes: 1000000000</code>. These are enforced by the client-side VQL engine.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Multiple sources</span><span class="acc-arr">›</span></div><div class="acc-b">Artifacts support multiple named <code>sources</code>, each producing a separate result table shown as tabs in the GUI. Use this to collect related but distinct data in one artifact — e.g. one source for processes, another for network connections, and a third for startup items.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Importing and exporting</span><span class="acc-arr">›</span></div><div class="acc-b">Use the <code>export</code> field to expose VQL functions and constants that other artifacts can <code>import</code>. This enables composability and prevents code duplication across your artifact library. Import with: <code>import: - path: Custom.Helpers.Shared</code> in the importing artifact.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Artifact Exchange</span><span class="acc-arr">›</span></div><div class="acc-b">The <a href="https://docs.velociraptor.app/exchange/" target="_blank" style="color:var(--teal)">Artifact Exchange</a> hosts hundreds of community-contributed artifacts. Import them directly in the GUI under <em>View Artifacts → Add Artifact → Import from Exchange</em>. Review the VQL before deploying in production.</div></div>
</div>`;}

function panePlaybookRansomware(){return`
<div class="banner-red"><strong>Scenario:</strong> It's 02:14. The NOC calls — users on the finance floor are getting ransom notes. File shares are down. You have 15 minutes to make your first critical decisions. This playbook walks you through every step, with the exact Velociraptor commands to run at each stage.</div>

<div id="rw-tabs" class="tab-bar">
  <button class="tab active" data-target="rw1">Phase 1 — Scope & Isolate</button>
  <button class="tab" data-target="rw2">Phase 2 — Initial Access</button>
  <button class="tab" data-target="rw3">Phase 3 — Hunt the Encryptor</button>
  <button class="tab" data-target="rw4">Phase 4 — Lateral Movement</button>
  <button class="tab" data-target="rw5">Phase 5 — Exfiltration</button>
  <button class="tab" data-target="rw6">Artifact Checklist</button>
</div>

<!-- PHASE 1 -->
<div id="rw1" class="sp active">
  <div class="h2">Phase 1 — Scope the Incident & Isolate Actively Encrypting Hosts</div>
  <div class="banner"><strong>Your immediate priority:</strong> Stop the spread. But don't blindly shut down — hosts that are still running contain volatile evidence (RAM, active connections, running processes) that will be lost on power-off. Isolate via Velociraptor first, collect live evidence, then decide on shutdown.</div>

  <div class="h3">Step 1 — Find All Hosts with Ransom Notes</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Hunt — Find ransom note files across the fleet</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw1a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="cmt">-- Launch as a HUNT across all Windows clients</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime, Ctime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=[
  <span class="str">"C:/**/*DECRYPT*"</span>,
  <span class="str">"C:/**/*README*"</span>,
  <span class="str">"C:/**/*RANSOM*"</span>,
  <span class="str">"C:/**/*HOW_TO_RESTORE*"</span>,
  <span class="str">"C:/**/*RESTORE_FILES*"</span>
], accessor=<span class="str">"ntfs"</span>)
<span class="kw">WHERE</span> Mtime > <span class="str">"2025-03-24T00:00:00Z"</span>  <span class="cmt">-- today only</span>
<span class="kw">LIMIT</span> 500</div>
      <div class="vql-result" id="rw1a"><table class="vt">
        <tr><th>FullPath</th><th>Size</th><th>Mtime</th></tr>
        <tr><td style="color:#c04040">C:\Users\jsmith\Desktop\DECRYPT_MY_FILES.txt</td><td>2,048</td><td style="color:#c04040">2025-03-24 02:11</td></tr>
        <tr><td style="color:#c04040">C:\Finance\Q1_Reports\DECRYPT_MY_FILES.txt</td><td>2,048</td><td style="color:#c04040">2025-03-24 02:11</td></tr>
        <tr><td style="color:#c04040">\\FILESERVER01\Shares\HR\DECRYPT_MY_FILES.txt</td><td>2,048</td><td style="color:#c04040">2025-03-24 02:12</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 2 — Identify Actively Encrypting Processes (Live Hosts)</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">On each hit host — find high-I/O processes writing encrypted files</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw1b')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="cmt">-- Run on affected hosts: find processes with high write I/O</span>
<span class="kw">SELECT</span> Pid, Name, Exe, CommandLine, Username,
       IoCounters.WriteTransferCount <span class="kw">AS</span> BytesWritten,
       IoCounters.WriteOperationCount <span class="kw">AS</span> WriteOps
<span class="kw">FROM</span> <span class="fn">pslist</span>()
<span class="kw">WHERE</span> IoCounters.WriteTransferCount > <span class="str">10000000</span>  <span class="cmt">-- &gt;10MB written</span>
  <span class="kw">AND</span> Name !~ <span class="str">"System|MsMpEng|SearchIndexer|svchost"</span>
<span class="kw">ORDER BY</span> IoCounters.WriteTransferCount <span class="kw">DESC</span></div>
      <div class="vql-result" id="rw1b"><table class="vt">
        <tr><th>Pid</th><th>Name</th><th>Exe</th><th>BytesWritten</th><th>WriteOps</th></tr>
        <tr><td style="color:#c04040"><strong>7821</strong></td><td style="color:#c04040"><strong>svchost32.exe</strong></td><td style="color:#c04040">C:\Users\jsmith\AppData\Local\Temp\svchost32.exe</td><td style="color:#c04040">847,329,280</td><td style="color:#c04040">124,847</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 3 — Isolate the Host Without Cutting the Velociraptor Channel</div>
  <div class="banner-teal"><strong>Velociraptor quarantine</strong> blocks all network traffic except the Velociraptor server connection — you maintain full investigative access while stopping lateral spread. This is critical: never just pull the network cable before collecting evidence.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- GUI: Clients → [Client] → Actions → Quarantine Host</span>
<span class="cmt">-- OR via VQL on the server (SERVER artifact):</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">Artifact.Windows.Remediation.Quarantine</span>(
  ClientId=<span class="str">"C.abc123"</span>,
  AddDNSServer=<span class="str">"false"</span>
)</div>

  <div class="h3">Step 4 — Snapshot Live Volatile Evidence Before Any Restart</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Collect all critical live artifacts in one shot on affected hosts</span>
<span class="cmt">-- Run this as a COLLECTION on each identified host immediately</span>
<span class="fn">Artifacts to collect in order:</span>
1. Windows.System.Pslist          <span class="cmt">-- running processes + parent chain</span>
2. Windows.Network.Netstat        <span class="cmt">-- current connections (C2?)</span>
3. Windows.Sys.StartupItems       <span class="cmt">-- persistence check</span>
4. Windows.System.ScheduledTasks  <span class="cmt">-- scheduled task persistence</span>
5. Windows.System.Services        <span class="cmt">-- service-based persistence</span>
6. Windows.KapeFiles.Targets      <span class="cmt">-- collect key forensic files</span></div>
</div>

<!-- PHASE 2 -->
<div id="rw2" class="sp">
  <div class="h2">Phase 2 — Find the Initial Access Vector</div>
  <div class="banner"><strong>This is the hardest question to answer</strong> — and the most important. Without knowing how they got in, you cannot prevent re-entry. Work backward from the earliest execution evidence to find patient zero.</div>

  <div class="h3">Step 1 — Find the Oldest Malicious Execution (Patient Zero)</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Earliest executions from suspicious paths (Prefetch)</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw2a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Name, LastRunTime, RunCount, PrefetchHash
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Prefetch</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"temp|appdata|public|perflogs|recycle|downloads"</span>
<span class="kw">ORDER BY</span> LastRunTime <span class="kw">ASC</span>
<span class="kw">LIMIT</span> 50</div>
      <div class="vql-result" id="rw2a"><table class="vt">
        <tr><th>Name</th><th>LastRunTime</th><th>RunCount</th></tr>
        <tr><td style="color:#c04040">SVCHOST32.EXE-A4B23C.pf</td><td style="color:#c04040">2025-03-21 22:14:07</td><td>8</td></tr>
        <tr><td style="color:var(--warn)">PSEXEC.EXE-F8231A.pf</td><td style="color:var(--warn)">2025-03-21 22:44:33</td><td>3</td></tr>
        <tr><td style="color:var(--warn)">ADFIND.EXE-2D3AF1.pf</td><td style="color:var(--warn)">2025-03-22 01:12:19</td><td>5</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 2 — Check RDP Logons Before the Incident Window</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">RDP logons in the 72 hours before encryption (Event 4624 Type 10)</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw2b')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP,
       EventData.LogonType <span class="kw">AS</span> Type
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span>
  <span class="kw">AND</span> EventData.LogonType = <span class="str">"10"</span>  <span class="cmt">-- RemoteInteractive = RDP</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-21T00:00:00Z"</span>
  <span class="kw">AND</span> EventData.IpAddress !~ <span class="str">"^10\.|^192\.168\.|^172\."</span>  <span class="cmt">-- external IPs only</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>
      <div class="vql-result" id="rw2b"><table class="vt">
        <tr><th>Time</th><th>User</th><th>SourceIP</th><th>Type</th></tr>
        <tr><td style="color:#c04040">2025-03-21 22:09:41</td><td style="color:#c04040"><strong>Administrator</strong></td><td style="color:#c04040"><strong>45.142.212.100</strong></td><td>10</td></tr>
        <tr><td>2025-03-21 22:10:14</td><td>Administrator</td><td>45.142.212.100</td><td>10</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 3 — Correlate Failed Logons Before Success (Brute Force Evidence)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Count failed logons per source IP in the 24h before the successful RDP</span>
<span class="kw">SELECT</span> EventData.IpAddress <span class="kw">AS</span> SourceIP,
       count() <span class="kw">AS</span> FailCount
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4625</span>  <span class="cmt">-- failed logon</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-20T22:00:00Z"</span>
  <span class="kw">AND</span> System.TimeCreated &lt; <span class="str">"2025-03-21T22:09:00Z"</span>
<span class="kw">GROUP BY</span> EventData.IpAddress
<span class="kw">ORDER BY</span> FailCount <span class="kw">DESC</span></div>

  <div class="h3">Initial Access Verdict Framework</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Evidence Found</th><th>Likely Vector</th><th>Next Steps</th></tr>
    <tr><td>Burst of Event 4625 from external IP then 4624 Type 10</td><td>RDP Brute Force</td><td>Check if RDP was exposed to internet; verify MFA status; change all passwords</td></tr>
    <tr><td>Prefetch for browser/email app shortly before first malicious execution</td><td>Phishing / Maldoc</td><td>Recover the email; find what attachment was opened; check Zone.Identifier ADS for download origin</td></tr>
    <tr><td>IIS/web server parent spawning cmd/powershell</td><td>Web Exploitation (CVE)</td><td>Check IIS logs for exploit payload; identify vulnerable component; check web shell writes</td></tr>
    <tr><td>First malicious exe appears on multiple hosts simultaneously</td><td>Supply Chain / GPO abuse</td><td>Investigate AD; check GPO modifications; check software deployment logs</td></tr>
    <tr><td>VPN logon from unusual geography immediately before incident</td><td>Credential Stuffing / Purchased Access</td><td>Check IAB forums; review VPN MFA; audit all active VPN sessions</td></tr>
  </table></div>
</div>

<!-- PHASE 3 -->
<div id="rw3" class="sp">
  <div class="h2">Phase 3 — Hunt the Encryptor Binary</div>
  <div class="banner"><strong>Finding the encryptor binary</strong> gives you: a hash to submit to VirusTotal, a path to reconstruct the delivery chain, and a YARA signature to hunt for it on other hosts before it executes.</div>

  <div class="h3">Step 1 — Hash the Encryptor from the Affected Host</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Hash suspicious executable at known path (from Prefetch finding)</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw3a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> FullPath, Size, Mtime, Ctime,
       hash(path=FullPath, accessor=<span class="str">"ntfs"</span>).MD5 <span class="kw">AS</span> MD5,
       hash(path=FullPath, accessor=<span class="str">"ntfs"</span>).SHA256 <span class="kw">AS</span> SHA256
<span class="kw">FROM</span> <span class="fn">stat</span>(filename=<span class="str">"C:/Users/jsmith/AppData/Local/Temp/svchost32.exe"</span>,
          accessor=<span class="str">"ntfs"</span>)</div>
      <div class="vql-result" id="rw3a"><table class="vt">
        <tr><th>FullPath</th><th>Size</th><th>SHA256</th><th>Mtime</th></tr>
        <tr><td>C:\Users\jsmith\AppData\...\svchost32.exe</td><td>1,458,176</td><td style="color:#c04040">a3f82b...d4e91c</td><td>2025-03-21 22:11</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 2 — Hunt the Same Hash Across the Entire Fleet</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Hunt: find any file matching this SHA256 on all endpoints</span>
<span class="cmt">-- Create this as a hunt artifact with the hash as a parameter</span>
<span class="kw">LET</span> TargetHash = <span class="str">"a3f82bd4e91c..."</span>  <span class="cmt">-- your encryptor's SHA256</span>

<span class="kw">SELECT</span> FullPath, Size, Mtime,
       hash(path=FullPath, accessor=<span class="str">"ntfs"</span>).SHA256 <span class="kw">AS</span> SHA256
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=[<span class="str">"C:/Users/**/*.exe"</span>, <span class="str">"C:/ProgramData/**/*.exe"</span>,
               <span class="str">"C:/Windows/Temp/**/*.exe"</span>], accessor=<span class="str">"ntfs"</span>)
<span class="kw">WHERE</span> hash(path=FullPath, accessor=<span class="str">"ntfs"</span>).SHA256 = TargetHash</div>

  <div class="h3">Step 3 — Build a YARA Rule and Hunt Unexecuted Copies</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Upload the binary first, extract unique byte patterns, then hunt:</span>
<span class="kw">LET</span> YaraRule = <span class="str">'''
rule RansomwareEncryptor_Mar2025 {
  meta:
    description = "Encryptor from 2025-03-24 incident - svchost32 lure"
    hash = "a3f82bd4e91c..."
  strings:
    $ransom_ext = ".LOCKED" ascii wide
    $note_name  = "DECRYPT_MY_FILES" ascii wide
    $mutex      = "Global\\RansomMutex2025" ascii wide
  condition:
    2 of them
}
'''</span>

<span class="cmt">-- Hunt across all endpoints — files AND process memory</span>
<span class="kw">SELECT</span> ClientId, FullPath, Rule, <span class="str">"file"</span> <span class="kw">AS</span> ScanType
<span class="kw">FROM</span> <span class="fn">yara</span>(rules=YaraRule, files=<span class="str">"C:/**"</span>)
<span class="kw">UNION ALL</span>
<span class="kw">SELECT</span> ClientId, str(str=Pid) <span class="kw">AS</span> FullPath, Rule, <span class="str">"memory"</span> <span class="kw">AS</span> ScanType
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid <span class="kw">FROM</span> <span class="fn">pslist</span>() },
  query={ <span class="kw">SELECT</span> Pid, Rule <span class="kw">FROM</span> <span class="fn">yara</span>(rules=YaraRule, pid=Pid) }
)</div>

  <div class="h3">Step 4 — Find VSS Deletion (Ransomware Pre-Encryption Step)</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Hunt for vssadmin / bcdedit / wbadmin execution (shadow copy deletion)</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw3b')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Name, LastRunTime, RunCount
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Prefetch</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"vssadmin|bcdedit|wbadmin|wmic"</span>
<span class="kw">ORDER BY</span> LastRunTime <span class="kw">DESC</span></div>
      <div class="vql-result" id="rw3b"><table class="vt">
        <tr><th>Name</th><th>LastRunTime</th><th>RunCount</th></tr>
        <tr><td style="color:#c04040">VSSADMIN.EXE-...</td><td style="color:#c04040">2025-03-24 02:08:54</td><td style="color:#c04040">1</td></tr>
        <tr><td style="color:#c04040">BCDEDIT.EXE-...</td><td style="color:#c04040">2025-03-24 02:09:01</td><td style="color:#c04040">1</td></tr>
        <tr><td style="color:#c04040">WBADMIN.EXE-...</td><td style="color:#c04040">2025-03-24 02:09:03</td><td style="color:#c04040">1</td></tr>
      </table></div>
    </div>
  </div>
  <div class="banner-red"><strong>VSS deletion 3 minutes before encryption started</strong> is a classic ransomware pre-encryption sequence. Document the exact timestamps — this is key evidence of intent and will be used in the incident report and any legal/regulatory filing.</div>
</div>

<!-- PHASE 4 -->
<div id="rw4" class="sp">
  <div class="h2">Phase 4 — Scope Lateral Movement</div>
  <div class="banner"><strong>The most common mistake in ransomware response</strong> is remediating only the hosts with ransom notes, then reconnecting them — only to be re-encrypted 48 hours later because the initial foothold host was missed. Lateral movement scoping is non-negotiable.</div>

  <div class="h3">Step 1 — Find Every Host the Attacker Touched (Event 4624 Correlation)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Hunt all DCs and servers for logons from the compromised account or IP</span>
<span class="cmt">-- Run as a HUNT across all Windows Server-labeled clients</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP,
       EventData.LogonType
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span>
  <span class="kw">AND</span> (EventData.IpAddress = <span class="str">"10.0.0.42"</span>    <span class="cmt">-- patient zero IP</span>
    <span class="kw">OR</span> EventData.TargetUserName = <span class="str">"jsmith"</span>)  <span class="cmt">-- compromised account</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-21T22:00:00Z"</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>

  <div class="h3">Step 2 — Check SRUM for Data Movement Between Hosts</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- SRUM records bytes sent per application — find large internal transfers</span>
<span class="kw">SELECT</span> TimeStamp, ExeInfo <span class="kw">AS</span> Process,
       NetworkBytesReceived, NetworkBytesSent,
       UserId
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.SRUM</span>()
<span class="kw">WHERE</span> NetworkBytesSent > <span class="str">10000000</span>  <span class="cmt">-- sent more than 10MB</span>
  <span class="kw">AND</span> TimeStamp > <span class="str">"2025-03-21T20:00:00Z"</span>
<span class="kw">ORDER BY</span> NetworkBytesSent <span class="kw">DESC</span></div>

  <div class="h3">Step 3 — Hunt PsExec Artifacts (Service Key Files)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- PsExec drops key files in C:\Windows on the TARGET host</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime, Ctime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/PSEXEC-*.key"</span>, accessor=<span class="str">"ntfs"</span>)

<span class="cmt">-- Also check service creation events (Event 7045)</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time, EventData.ServiceName,
       EventData.ImagePath, EventData.AccountName
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/System.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">7045</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-21T22:00:00Z"</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>

  <div class="h3">Lateral Movement Scope Map</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Evidence</th><th>Confirms Movement To</th><th>Action</th></tr>
    <tr><td>Event 4624 (Type 3/10) on host X from patient-zero IP/account</td><td>Host X was accessed</td><td>Add host X to investigation scope; collect triage artifacts</td></tr>
    <tr><td>PsExec key file on host Y with timestamp in incident window</td><td>Attacker ran commands on host Y</td><td>Treat host Y as fully compromised; collect all execution artifacts</td></tr>
    <tr><td>PSEXESVC service in Event 7045 on host Z</td><td>PsExec used against host Z</td><td>Check what commands were run; look for dropped payloads</td></tr>
    <tr><td>Amcache/Prefetch for scanning tools on multiple hosts</td><td>Attacker performed network recon from multiple positions</td><td>Each host where scanning tools ran is a pivot point — check further</td></tr>
  </table></div>
</div>

<!-- PHASE 5 -->
<div id="rw5" class="sp">
  <div class="h2">Phase 5 — Determine if Data Was Exfiltrated</div>
  <div class="banner-red"><strong>Exfiltration changes everything.</strong> If data was stolen, you have regulatory notification obligations (GDPR: 72 hours, HIPAA: 60 days, etc.), potential class action exposure, and a Data Leak Site to monitor. Proving exfiltration — or proving it did NOT happen — is critical.</div>

  <div class="h3">Step 1 — SRUM Network Data Usage (Best Source for Exfil Evidence)</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">SRUM — Find processes that sent large volumes externally</span></div>
      <button class="run-btn" onclick="runVQL(this,'rw5a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> TimeStamp, ExeInfo <span class="kw">AS</span> Process,
       NetworkBytesSent / <span class="str">1048576</span> <span class="kw">AS</span> MB_Sent,
       NetworkBytesReceived / <span class="str">1048576</span> <span class="kw">AS</span> MB_Received,
       UserId
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.SRUM</span>()
<span class="kw">WHERE</span> MB_Sent > <span class="str">100</span>  <span class="cmt">-- sent more than 100MB</span>
  <span class="kw">AND</span> TimeStamp > <span class="str">"2025-03-21T00:00:00Z"</span>
  <span class="kw">AND</span> Process !~ <span class="str">"WindowsUpdate|OneDrive-corp|Teams|chrome"</span>
<span class="kw">ORDER BY</span> MB_Sent <span class="kw">DESC</span></div>
      <div class="vql-result" id="rw5a"><table class="vt">
        <tr><th>TimeStamp</th><th>Process</th><th>MB_Sent</th><th>MB_Received</th></tr>
        <tr><td style="color:#c04040">2025-03-23 01:44:12</td><td style="color:#c04040"><strong>rclone.exe</strong></td><td style="color:#c04040"><strong>47,832</strong></td><td>12</td></tr>
        <tr><td style="color:#c04040">2025-03-23 01:44:12</td><td style="color:#c04040"><strong>rclone.exe</strong></td><td style="color:#c04040"><strong>31,205</strong></td><td>8</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Step 2 — Find Rclone / WinSCP Config Files</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Rclone stores its config including credentials at:</span>
<span class="kw">SELECT</span> FullPath, Mtime, read_file(filename=FullPath) <span class="kw">AS</span> Contents
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=[
  <span class="str">"C:/Users/*/AppData/Roaming/rclone/rclone.conf"</span>,
  <span class="str">"C:/**/.config/rclone/rclone.conf"</span>,
  <span class="str">"C:/Users/*/AppData/Roaming/WinSCP.ini"</span>,
  <span class="str">"C:/**/*rclone*.conf"</span>
], accessor=<span class="str">"ntfs"</span>)</div>

  <div class="h3">Step 3 — DNS Queries for Cloud Storage / Paste Sites</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Windows.Events.DNSQueries captures DNS lookups via ETW</span>
<span class="cmt">-- If monitoring was enabled, hunt the stored events:</span>
<span class="kw">SELECT</span> Time, ProcessName, QueryName, Results
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Events.DNSQueries</span>()
<span class="kw">WHERE</span> QueryName <span class="kw">=~</span> <span class="str">"mega\.nz|anonfile|gofile|pixeldrain|storj|</span>
<span class="str">                     transfer\.sh|bashupload|file\.io|tmp\.sh|</span>
<span class="str">                     userscloud|zippyshare|mediafire|wetransfer"</span>
  <span class="kw">AND</span> Time > <span class="str">"2025-03-21T00:00:00Z"</span></div>
</div>

<!-- ARTIFACT CHECKLIST -->
<div id="rw6" class="sp">
  <div class="h2">Ransomware Investigation — Master Artifact Checklist</div>
  <div class="banner-teal"><strong>Use this checklist for every ransomware engagement.</strong> Each artifact is listed with its investigative purpose and priority. Collect in order — higher priority first while the host is still live.</div>

  <div class="tbl-wrap"><table class="vt">
    <tr><th>Priority</th><th>Velociraptor Artifact</th><th>Investigative Purpose</th><th>Phase</th></tr>
    <tr><td><span class="badge badge-red">P1 LIVE</span></td><td>Windows.System.Pslist</td><td>Identify actively running encryptor and its PID/parent chain</td><td>Scope</td></tr>
    <tr><td><span class="badge badge-red">P1 LIVE</span></td><td>Windows.Network.Netstat</td><td>Active C2 connections — capture before isolation</td><td>Scope</td></tr>
    <tr><td><span class="badge badge-red">P1 LIVE</span></td><td>Windows.KapeFiles.Targets</td><td>Bulk collection of all key forensic files in one shot</td><td>Scope</td></tr>
    <tr><td><span class="badge badge-orange">P2</span></td><td>Windows.Forensics.Prefetch</td><td>Prove execution, find oldest malicious binary, find recon tools</td><td>Initial Access</td></tr>
    <tr><td><span class="badge badge-orange">P2</span></td><td>Windows.Forensics.Amcache</td><td>SHA1 hash of encryptor for VirusTotal; deleted binary evidence</td><td>Initial Access</td></tr>
    <tr><td><span class="badge badge-orange">P2</span></td><td>Windows.Forensics.BAM</td><td>Full path + last run time of all executed binaries; harder to clean</td><td>Initial Access</td></tr>
    <tr><td><span class="badge badge-orange">P2</span></td><td>Windows.EventLogs.EvtxHunter</td><td>4624/4625 (RDP brute force), 4688 (process creation), 7045 (service install)</td><td>Initial Access / Lateral</td></tr>
    <tr><td><span class="badge badge-warn">P3</span></td><td>Windows.Forensics.SRUM</td><td>30-60 day history: exfil volumes per process, lateral movement data</td><td>Exfiltration / Lateral</td></tr>
    <tr><td><span class="badge badge-warn">P3</span></td><td>Windows.System.ScheduledTasks</td><td>Ransomware persistence; encoded PowerShell tasks</td><td>Persistence</td></tr>
    <tr><td><span class="badge badge-warn">P3</span></td><td>Windows.System.Services</td><td>Service-based persistence; PsExec service artifacts</td><td>Persistence / Lateral</td></tr>
    <tr><td><span class="badge badge-warn">P3</span></td><td>Windows.Sys.StartupItems</td><td>Registry run-key persistence</td><td>Persistence</td></tr>
    <tr><td><span class="badge badge-info">P4</span></td><td>Windows.Forensics.ShimCache</td><td>Evidence of tools that ran on servers (where Prefetch is off)</td><td>All phases on servers</td></tr>
    <tr><td><span class="badge badge-info">P4</span></td><td>Generic.Forensics.SQLiteHunter</td><td>Browser history — phishing URL, download of initial payload</td><td>Initial Access</td></tr>
    <tr><td><span class="badge badge-info">P4</span></td><td>Windows.Forensics.RecycleBin</td><td>Deleted tools the attacker tried to clean up</td><td>All phases</td></tr>
    <tr><td><span class="badge badge-info">P4</span></td><td>parse_mft() + parse_usn()</td><td>Timeline of all file creation/deletion including deleted encryptors</td><td>Full timeline</td></tr>
  </table></div>
</div>
`;}

/* ══ PLAYBOOK: LATERAL MOVEMENT ═══════════════════════════════ */
function panePlaybookLateral(){return`
<div class="banner-red"><strong>Scenario:</strong> A Sigma alert fires — an account that belongs to a help-desk technician is authenticating to your domain controller at 03:00 from a workstation the technician has never touched. No malware alert has fired. This is the beginning of a lateral movement investigation.</div>

<div id="lm-tabs" class="tab-bar">
  <button class="tab active" data-target="lm1">Credential Compromise</button>
  <button class="tab" data-target="lm2">Movement Mapping</button>
  <button class="tab" data-target="lm3">DC & AD Attacks</button>
  <button class="tab" data-target="lm4">Hunting at Scale</button>
</div>

<div id="lm1" class="sp active">
  <div class="h2">Step 1 — Establish Where the Credential Was Compromised</div>
  <div class="p">The attacker has a valid credential. Before chasing where they went, you must find where they got it. Was it phished? Dumped from LSASS? Keylogged? Stolen from a password manager?</div>

  <div class="h3">Find the Host Where the Account Last Authenticated Legitimately</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Find last known-good logon for the compromised account</span></div>
      <button class="run-btn" onclick="runVQL(this,'lm1a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="cmt">-- Hunt across all DCs — find every logon for this account in past 7 days</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP,
       EventData.WorkstationName <span class="kw">AS</span> Workstation,
       EventData.LogonType,
       EventData.AuthenticationPackageName <span class="kw">AS</span> AuthPkg
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span>
  <span class="kw">AND</span> EventData.TargetUserName = <span class="str">"helpdesk_bob"</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-17T00:00:00Z"</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>
      <div class="vql-result" id="lm1a"><table class="vt">
        <tr><th>Time</th><th>SourceIP</th><th>Workstation</th><th>LogonType</th><th>AuthPkg</th></tr>
        <tr><td>2025-03-22 08:45</td><td>10.0.0.55</td><td>HELPDESK-PC01</td><td>2 (Interactive)</td><td>Kerberos</td></tr>
        <tr><td>2025-03-22 09:12</td><td>10.0.0.55</td><td>HELPDESK-PC01</td><td>3 (Network)</td><td>Kerberos</td></tr>
        <tr><td style="color:#c04040">2025-03-24 03:00</td><td style="color:#c04040">10.0.0.42</td><td style="color:#c04040">WIN-WS042</td><td style="color:#c04040">3 (Network)</td><td style="color:#c04040">NTLM</td></tr>
      </table></div>
    </div>
  </div>
  <div class="banner-red"><strong>Red flags above:</strong> (1) The first attacker logon is from a DIFFERENT workstation than Bob's usual machine. (2) It uses NTLM instead of Kerberos — a strong indicator of Pass-the-Hash. (3) It's at 03:00 when Bob is asleep. Go investigate HELPDESK-PC01 — that's where the credential was stolen.</div>

  <div class="h3">Investigate the Source Host (HELPDESK-PC01) for Credential Theft</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- On HELPDESK-PC01: hunt for LSASS dump creation</span>
<span class="kw">SELECT</span> TimeStamp, Filename, Reason
<span class="kw">FROM</span> <span class="fn">parse_usn</span>(device=<span class="str">"\\\.\\C:"</span>)
<span class="kw">WHERE</span> Filename <span class="kw">=~</span> <span class="str">"lsass|.dmp|.DMP"</span>
  <span class="kw">AND</span> TimeStamp > <span class="str">"2025-03-22T08:00:00Z"</span>

<span class="cmt">-- Also check Prefetch for credential dumping tools</span>
<span class="kw">SELECT</span> Name, LastRunTime, RunCount
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Prefetch</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"procdump|mimikatz|pwdump|fgdump|wce|gsecdump|safetykatz"</span></div>

  <div class="h3">NTLM vs Kerberos — Why It Matters</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Auth Package</th><th>LogonType</th><th>Attacker Implication</th></tr>
    <tr><td>Kerberos</td><td>3 (Network)</td><td>Attacker likely has a cleartext password or valid TGT</td></tr>
    <tr><td>NTLM</td><td>3 (Network)</td><td><strong>Strong indicator of Pass-the-Hash</strong> — attacker has an NTLM hash, not necessarily the password</td></tr>
    <tr><td>Kerberos</td><td>10 (RemoteInteractive)</td><td>Standard RDP with valid password or ticket</td></tr>
    <tr><td>NTLM</td><td>10 (RemoteInteractive)</td><td>RDP with Pass-the-Hash (restricted admin mode) or older NTLM fallback</td></tr>
    <tr><td>Any</td><td>4648 Event ID</td><td>Explicit credentials used — attacker ran as a different account (RunAs pattern)</td></tr>
  </table></div>
</div>

<div id="lm2" class="sp">
  <div class="h2">Step 2 — Map Every Host the Attacker Visited</div>
  <div class="banner"><strong>Think like the attacker:</strong> they landed on WIN-WS042 with Bob's credentials, then pivoted. From there they may have RDP'd to a server, SMB'd to a file share, or WMI'd to a DC. You need to trace every hop.</div>

  <div class="h3">Build a Movement Timeline — All Source/Destination Pairs</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Hunt ALL Windows hosts: find any logon sourcing from WIN-WS042 (10.0.0.42)</span>
<span class="cmt">-- This tells you every host the attacker accessed FROM the beachhead</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP,
       EventData.LogonType,
       hostname() <span class="kw">AS</span> DestinationHost
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span>
  <span class="kw">AND</span> EventData.IpAddress = <span class="str">"10.0.0.42"</span>  <span class="cmt">-- beachhead IP</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-24T03:00:00Z"</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>

  <div class="h3">Find WinRM / PowerShell Remoting Sessions</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- wsmprovhost.exe is the PowerShell remoting host — its children are attacker commands</span>
<span class="kw">LET</span> procs = <span class="kw">SELECT</span> Pid, Ppid, Name, CommandLine, CreateTime <span class="kw">FROM</span> <span class="fn">pslist</span>()

<span class="kw">SELECT</span> child.Pid, child.Name, child.CommandLine, child.CreateTime
<span class="kw">FROM</span> procs child
<span class="kw">JOIN</span> procs parent <span class="kw">ON</span> child.Ppid = parent.Pid
<span class="kw">WHERE</span> parent.Name =~ <span class="str">"wsmprovhost"</span>

<span class="cmt">-- Also check Microsoft-Windows-WinRM/Operational event log</span>
<span class="kw">SELECT</span> System.TimeCreated, EventData.Param1 <span class="kw">AS</span> ComputerName
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Microsoft-Windows-WinRM%4Operational.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">91</span>  <span class="cmt">-- WinRM session created</span></div>

  <div class="h3">RDP Cache Bitmap Analysis (Where Did They RDP To?)</div>
  <div class="banner-teal"><strong>RDP cache bitmaps</strong> are fragments of the remote desktop screen stored on the SOURCE machine. Even if no logs exist on the destination, these bitmaps prove the connection occurred and may reveal the desktop of the remote host — including open documents, visible credentials, or application names.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Collect RDP cache files for offline analysis</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=[
  <span class="str">"C:/Users/*/AppData/Local/Microsoft/Terminal Server Client/Cache/*"</span>,
  <span class="str">"C:/Documents and Settings/*/Local Settings/Application Data/Microsoft/Terminal Server Client/Cache/*"</span>
], accessor=<span class="str">"ntfs"</span>)

<span class="cmt">-- Upload the cache files for bmc-tools offline parsing</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">upload</span>(file=FullPath)
<span class="kw">FROM</span> glob(globs=<span class="str">"C:/Users/*/AppData/Local/Microsoft/Terminal Server Client/Cache/*"</span>)</div>
</div>

<div id="lm3" class="sp">
  <div class="h2">Step 3 — Detect Domain Controller & Active Directory Attacks</div>
  <div class="banner-red"><strong>If the attacker reaches a Domain Controller, the entire domain is compromised.</strong> DCSync, Golden Ticket, NTDS.dit extraction, and AdminSDHolder abuse all originate from — or target — the DC. Hunt these specifically.</div>

  <div class="h3">DCSync Detection (Replication Rights Abuse)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- DCSync generates Event 4662 on the DC with specific access rights</span>
<span class="cmt">-- The attacker's account requests replication rights WITHOUT being a DC</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.SubjectUserName <span class="kw">AS</span> RequestingUser,
       EventData.ObjectName <span class="kw">AS</span> Object,
       EventData.Properties <span class="kw">AS</span> AccessRights
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4662</span>
  <span class="kw">AND</span> EventData.Properties <span class="kw">=~</span> <span class="str">"1131f6ad|1131f6aa|89e95b76"</span>  <span class="cmt">-- DS-Replication GUIDs</span>
  <span class="kw">AND</span> EventData.SubjectUserName !~ <span class="str">"\\$$"</span>  <span class="cmt">-- exclude machine accounts (real DCs)</span></div>

  <div class="h3">NTDS.dit Extraction — The Crown Jewels</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Hunt for NTDS.dit copies outside expected locations</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime, Ctime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/**/NTDS.dit"</span>, accessor=<span class="str">"ntfs"</span>)
<span class="kw">WHERE</span> FullPath !~ <span class="str">"C:/Windows/NTDS/NTDS.dit"</span>  <span class="cmt">-- any copy outside this path is suspicious</span>

<span class="cmt">-- Also check for VSS-based extraction (attacker copies from shadow)</span>
<span class="kw">SELECT</span> TimeStamp, Filename, Reason
<span class="kw">FROM</span> <span class="fn">parse_usn</span>(device=<span class="str">"\\\.\\C:"</span>)
<span class="kw">WHERE</span> Filename =~ <span class="str">"NTDS.dit|SYSTEM.bak|ntds.bak"</span>
  <span class="kw">AND</span> Reason =~ <span class="str">"CREATE|RENAME"</span></div>

  <div class="h3">Kerberoasting Detection</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Kerberoasting requests TGS tickets for service accounts</span>
<span class="cmt">-- Event 4769 with encryption type 0x17 (RC4 — weak, crackable offline)</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> ServiceAccount,
       EventData.ClientAddress <span class="kw">AS</span> RequestingIP,
       EventData.TicketEncryptionType <span class="kw">AS</span> EncType
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4769</span>
  <span class="kw">AND</span> EventData.TicketEncryptionType = <span class="str">"0x17"</span>  <span class="cmt">-- RC4 = Kerberoastable</span>
  <span class="kw">AND</span> EventData.TargetUserName !~ <span class="str">"\\$$"</span>  <span class="cmt">-- exclude machine accounts</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>
</div>

<div id="lm4" class="sp">
  <div class="h2">Step 4 — Hunt Lateral Movement Indicators at Fleet Scale</div>

  <div class="h3">Hunt 1: Anomalous NTLM Authentications (Pass-the-Hash Fleet-Wide)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Run as a HUNT — find NTLM Type 3 logons from workstations to servers</span>
<span class="cmt">-- (legitimate users typically use Kerberos from a workstation; NTLM is a red flag)</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP,
       EventData.WorkstationName,
       hostname() <span class="kw">AS</span> DestHost
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span>
  <span class="kw">AND</span> EventData.LogonType = <span class="str">"3"</span>
  <span class="kw">AND</span> EventData.AuthenticationPackageName = <span class="str">"NTLM"</span>
  <span class="kw">AND</span> EventData.TargetUserName !~ <span class="str">"\\$$|ANONYMOUS"</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-24T00:00:00Z"</span></div>

  <div class="h3">Hunt 2: New Accounts Created or Added to Admin Groups</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Attackers often create backdoor accounts for persistence</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time,
       System.EventID.Value <span class="kw">AS</span> EventID,
       EventData.TargetUserName <span class="kw">AS</span> Account,
       EventData.SubjectUserName <span class="kw">AS</span> CreatedBy,
       EventData.TargetSid <span class="kw">AS</span> SID
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value <span class="kw">IN</span> (<span class="str">4720</span>, <span class="str">4732</span>, <span class="str">4728</span>, <span class="str">4756</span>)
  <span class="cmt">-- 4720=account created, 4732/4728/4756=added to admin/global/universal group</span>
  <span class="kw">AND</span> System.TimeCreated > <span class="str">"2025-03-24T00:00:00Z"</span>
<span class="kw">ORDER BY</span> Time <span class="kw">ASC</span></div>

  <div class="h3">Hunt 3: Execution of Known Lateral Movement Tools</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Hunt for Prefetch evidence of tools used for lateral movement</span>
<span class="kw">SELECT</span> Name, LastRunTime, RunCount
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Prefetch</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"psexec|psexesvc|wmiexec|smbexec|wmic|winrs|</span>
<span class="str">              impacket|evil-winrm|bloodhound|sharphound|</span>
<span class="str">              adfind|ldifde|csvde|nltest|dsquery|net\.exe"</span>
<span class="kw">ORDER BY</span> LastRunTime <span class="kw">DESC</span></div>
</div>
`;}

/* ══ PLAYBOOK: MEMORY & MALWARE ═══════════════════════════════ */
function panePlaybookMemory(){return`
<div class="banner-violet"><strong>Scenario:</strong> A YARA hunt returns a hit — the <code>MsMpEng.exe</code> process on a workstation triggered a rule for Cobalt Strike. There's no malicious file on disk. The process looks legitimate. This is in-memory malware — the most sophisticated attacker tradecraft. Here's how to investigate it.</div>

<div id="mm-tabs" class="tab-bar">
  <button class="tab active" data-target="mm1">Identify Suspicious Processes</button>
  <button class="tab" data-target="mm2">Process Injection</button>
  <button class="tab" data-target="mm3">YARA Memory Hunt</button>
  <button class="tab" data-target="mm4">Memory Acquisition</button>
</div>

<div id="mm1" class="sp active">
  <div class="h2">Step 1 — Identify Suspicious Processes</div>
  <div class="banner"><strong>In-memory malware hides inside legitimate processes.</strong> The most common techniques are: process injection (shellcode injected into a running process), process hollowing (legitimate process started suspended, code replaced), and reflective DLL loading (DLL loaded into memory without touching disk).</div>

  <div class="h3">Hunt 1: Find Processes with Network Connections But No Disk Image</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Processes with outbound connections whose binary doesn't exist on disk</span></div>
      <button class="run-btn" onclick="runVQL(this,'mm1a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">LET</span> connections = <span class="kw">SELECT</span> Pid, FamilyString, Status,
  Laddr.IP <span class="kw">AS</span> LocalIP, Laddr.Port <span class="kw">AS</span> LocalPort,
  Raddr.IP <span class="kw">AS</span> RemoteIP, Raddr.Port <span class="kw">AS</span> RemotePort
<span class="kw">FROM</span> <span class="fn">netstat</span>()
<span class="kw">WHERE</span> Status = <span class="str">"ESTABLISHED"</span>
  <span class="kw">AND</span> Raddr.IP !~ <span class="str">"^10\.|^192\.168\.|^172\.|^127\."</span>  <span class="cmt">-- external connections</span>

<span class="kw">SELECT</span> p.Pid, p.Name, p.Exe, c.RemoteIP, c.RemotePort,
       stat(filename=p.Exe).Size <span class="kw">AS</span> FileExists
<span class="kw">FROM</span> <span class="fn">foreach</span>(row=connections,
  query={ <span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">pslist</span>() <span class="kw">WHERE</span> Pid = Pid })
<span class="kw">WHERE</span> FileExists = <span class="str">NULL</span>  <span class="cmt">-- binary doesn't exist on disk!</span></div>
      <div class="vql-result" id="mm1a"><table class="vt">
        <tr><th>Pid</th><th>Name</th><th>Exe</th><th>RemoteIP</th><th>RemotePort</th><th>FileExists</th></tr>
        <tr><td style="color:#c04040"><strong>4921</strong></td><td style="color:#c04040"><strong>MsMpEng.exe</strong></td><td style="color:var(--muted)">C:\ProgramData\Microsoft\Windows Defender\...\MsMpEng.exe</td><td style="color:#c04040"><strong>185.220.101.42</strong></td><td style="color:#c04040"><strong>443</strong></td><td style="color:#c04040">NULL</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Hunt 2: Find Processes with RWX Memory Regions (Shellcode Indicator)</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Memory regions that are Readable + Writable + Executable are highly suspicious</span>
<span class="cmt">-- Legitimate code is typically R+X only; shellcode needs W+X to write then execute</span>
<span class="kw">SELECT</span> Pid, Name,
       Vad.BaseAddress <span class="kw">AS</span> Address,
       Vad.RegionSize <span class="kw">AS</span> Size,
       Vad.Protection <span class="kw">AS</span> Perms,
       Vad.Type
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid, Name <span class="kw">FROM</span> <span class="fn">pslist</span>()
        <span class="kw">WHERE</span> Name !~ <span class="str">"chrome|firefox|java"</span> },  <span class="cmt">-- JIT compilers use RWX legitimately</span>
  query={ <span class="kw">SELECT</span> Pid, Name, * <span class="kw">FROM</span> <span class="fn">vad</span>(pid=Pid)
          <span class="kw">WHERE</span> Protection =~ <span class="str">"EXECUTE_READWRITE"</span> }
)</div>

  <div class="h3">Hunt 3: Loaded DLLs Not on Disk (Reflective Loading)</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">Find DLLs loaded in process memory that have no corresponding file on disk</span></div>
      <button class="run-btn" onclick="runVQL(this,'mm1b')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Pid, ProcessName, DllBase, DllPath
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid, Name <span class="kw">AS</span> ProcessName <span class="kw">FROM</span> <span class="fn">pslist</span>() },
  query={ <span class="kw">SELECT</span> Pid, ProcessName, DllBase, ModuleName <span class="kw">AS</span> DllPath
          <span class="kw">FROM</span> <span class="fn">modules</span>(pid=Pid)
          <span class="kw">WHERE</span> <span class="fn">stat</span>(filename=ModuleName).Size = <span class="str">NULL</span> }
)
<span class="kw">WHERE</span> DllPath != <span class="str">""</span></div>
      <div class="vql-result" id="mm1b"><table class="vt">
        <tr><th>Pid</th><th>ProcessName</th><th>DllBase</th><th>DllPath</th></tr>
        <tr><td style="color:#c04040">4921</td><td style="color:#c04040">MsMpEng.exe</td><td>0x7FF800000000</td><td style="color:#c04040">[memory only — no path]</td></tr>
      </table></div>
    </div>
  </div>
</div>

<div id="mm2" class="sp">
  <div class="h2">Step 2 — Identify the Injection Technique</div>

  <div class="h3">Process Hollowing Detection</div>
  <div class="p">Process hollowing starts a legitimate process in a suspended state, unmaps its code from memory, and replaces it with malicious code. The process looks legitimate but is running the attacker's payload.</div>
  <div class="banner-red"><strong>Key indicator:</strong> The executable path listed in the process table points to a legitimate binary (e.g., svchost.exe at the correct path), but the actual code in memory does not match what's on disk. The SHA256 of the in-memory image will differ from the file on disk.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Detect process hollowing: hash the executable IN MEMORY vs ON DISK</span>
<span class="cmt">-- A mismatch = the in-memory code has been replaced</span>
<span class="kw">LET</span> disk_hash = hash(path=Exe, accessor=<span class="str">"ntfs"</span>).SHA256
<span class="kw">LET</span> mem_hash  = hash(pid=Pid, accessor=<span class="str">"process"</span>).SHA256

<span class="kw">SELECT</span> Pid, Name, Exe, disk_hash, mem_hash,
       disk_hash = mem_hash <span class="kw">AS</span> Matches
<span class="kw">FROM</span> <span class="fn">pslist</span>()
<span class="kw">WHERE</span> Exe != <span class="str">""</span>
  <span class="kw">AND</span> disk_hash != mem_hash  <span class="cmt">-- THIS IS THE RED FLAG</span>
  <span class="kw">AND</span> Name !~ <span class="str">"System|Memory Compression"</span></div>

  <div class="h3">Thread Injection Detection</div>
  <div class="p">Classic injection: attacker allocates memory in the target process, writes shellcode, then creates a remote thread to execute it. The new thread's start address points to allocated memory, not a loaded module.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Look for threads with start addresses in anonymous (non-module) memory regions</span>
<span class="cmt">-- This is the hallmark of CreateRemoteThread-based injection</span>
<span class="kw">SELECT</span> Pid, Name, ThreadId, StartAddress, Module
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid, Name <span class="kw">FROM</span> <span class="fn">pslist</span>() },
  query={ <span class="kw">SELECT</span> Pid, Name, ThreadId, StartAddress,
                 get_mapped_file(pid=Pid, address=StartAddress) <span class="kw">AS</span> Module
          <span class="kw">FROM</span> <span class="fn">threads</span>(pid=Pid)
          <span class="kw">WHERE</span> Module = <span class="str">NULL</span> }  <span class="cmt">-- no module = anonymous memory = suspicious</span>
)</div>

  <div class="h3">Common Injection Techniques — Quick Reference</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Technique</th><th>How It Works</th><th>Key Indicator</th><th>Detection</th></tr>
    <tr><td>CreateRemoteThread</td><td>VirtualAllocEx → WriteProcessMemory → CreateRemoteThread</td><td>Thread start address in non-module memory</td><td>Thread start address analysis, YARA on memory region</td></tr>
    <tr><td>Process Hollowing</td><td>CreateProcess(SUSPENDED) → ZwUnmapViewOfSection → WriteProcessMemory → ResumeThread</td><td>Disk/memory image hash mismatch</td><td>Compare file hash vs memory image hash</td></tr>
    <tr><td>Reflective DLL Injection</td><td>Custom loader writes DLL directly into memory without calling LoadLibrary</td><td>DLL loaded in memory with no corresponding file on disk</td><td>Enumerate modules and check file existence</td></tr>
    <tr><td>Process Doppelgänging</td><td>Uses NTFS transactions to create a phantom file, maps it, then rolls back the transaction</td><td>Process backed by a deleted file (TxF artifact)</td><td>Advanced — requires TxF-aware memory analysis</td></tr>
    <tr><td>Shellcode via NtMapViewOfSection</td><td>Maps malicious section into target process without allocating with VirtualAllocEx</td><td>Mapped memory region with RWX permissions not backed by a file</td><td>VAD analysis for file-backed vs anonymous sections</td></tr>
  </table></div>
</div>

<div id="mm3" class="sp">
  <div class="h2">Step 3 — YARA Memory Hunting at Scale</div>
  <div class="banner-teal"><strong>YARA scanning process memory</strong> is the most reliable way to find in-memory implants — it doesn't matter how well the malware hides on disk. If the payload is executing in RAM, YARA can find it.</div>

  <div class="h3">Cobalt Strike Beacon — Memory Hunt</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px"><div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div><span class="vql-name">YARA hunt: Cobalt Strike beacon in all process memory fleet-wide</span></div>
      <button class="run-btn" onclick="runVQL(this,'mm3a')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">LET</span> CSBeaconYara = <span class="str">'''
rule CobaltStrikeBeacon {
  meta:
    description = "Cobalt Strike Beacon - common shellcode stub + config markers"
  strings:
    $stub1   = { FC 48 83 E4 F0 E8 }          // x64 shellcode stub
    $config1 = "%s (admin)" wide ascii
    $config2 = "ReflectiveLoader" ascii
    $pipe    = "\\\\.\\pipe\\" ascii wide
    $sleep   = { 68 ?? ?? 00 00 E8 }          // sleep timer push pattern
  condition:
    2 of them
}
'''</span>

<span class="cmt">-- Hunt ALL process memory across the fleet</span>
<span class="kw">SELECT</span> Pid, Name, Rule, Namespace, Tags,
       <span class="str">"Process Memory"</span> <span class="kw">AS</span> ScanType
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid, Name <span class="kw">FROM</span> <span class="fn">pslist</span>() },
  query={ <span class="kw">SELECT</span> Pid, Name, Rule, Namespace, Tags
          <span class="kw">FROM</span> <span class="fn">yara</span>(rules=CSBeaconYara, pid=Pid) }
)</div>
      <div class="vql-result" id="mm3a"><table class="vt">
        <tr><th>Pid</th><th>Name</th><th>Rule</th><th>ScanType</th></tr>
        <tr><td style="color:#c04040"><strong>4921</strong></td><td style="color:#c04040"><strong>MsMpEng.exe</strong></td><td style="color:#c04040">CobaltStrikeBeacon</td><td>Process Memory</td></tr>
      </table></div>
    </div>
  </div>

  <div class="h3">Generic Shellcode Patterns — Broad Hunt</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="kw">LET</span> ShellcodeYara = <span class="str">'''
rule SuspiciousShellcode {
  meta:
    description = "Generic shellcode patterns - review all hits"
  strings:
    $x64_stub   = { FC 48 83 E4 F0 }          // x64 shellcode alignment
    $x86_stub   = { FC E8 89 00 00 00 }        // classic x86 GetPC stub
    $rev_shell  = { 6A 11 6A 02 6A 01 }        // socket(PF_INET, SOCK_STREAM, IPPROTO_TCP)
    $meterpreter = "metsrv" ascii wide
    $sliver     = "GRPC" ascii wide
  condition:
    any of them
}
'''</span>

<span class="kw">SELECT</span> Pid, Name, Rule
<span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid, Name <span class="kw">FROM</span> <span class="fn">pslist</span>()
        <span class="kw">WHERE</span> Name !~ <span class="str">"chrome|firefox|node|java|python"</span> },
  query={ <span class="kw">SELECT</span> Pid, Name, Rule <span class="kw">FROM</span> <span class="fn">yara</span>(rules=ShellcodeYara, pid=Pid) }
)</div>
</div>

<div id="mm4" class="sp">
  <div class="h2">Step 4 — Memory Acquisition & Full Analysis</div>
  <div class="banner"><strong>When Velociraptor's in-line analysis isn't enough,</strong> you need a full memory image for offline analysis with Volatility 3 or MemProcFS. Acquiring memory should happen before isolation and before shutdown.</div>

  <div class="h3">Dump a Specific Process Memory Region</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Dump the full memory of the suspicious process for offline analysis</span>
<span class="cmt">-- The dump can be analyzed with Volatility or submitted to sandbox</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">upload</span>(
  file=<span class="fn">proc_dump</span>(pid=<span class="str">4921</span>)  <span class="cmt">-- PID of suspicious process</span>
)</div>

  <div class="h3">Full System Memory Acquisition via WinPmem</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt">-- Velociraptor can deploy WinPmem and acquire a full RAM image</span>
<span class="cmt">-- The image uploads directly to the Velociraptor server</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">Artifact.Windows.Memory.Acquisition</span>()</div>

  <div class="h3">Offline Analysis with Volatility 3</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="cmt"># After downloading the memory image from Velociraptor:</span>

<span class="cmt"># List all processes (including hidden ones not in pslist)</span>
python3 vol.py -f mem.img windows.psscan.PsScan

<span class="cmt"># Find injected code and anomalous memory regions</span>
python3 vol.py -f mem.img windows.malfind.Malfind

<span class="cmt"># List network connections from memory</span>
python3 vol.py -f mem.img windows.netscan.NetScan

<span class="cmt"># List loaded modules — compare to running pslist output</span>
python3 vol.py -f mem.img windows.dlllist.DllList --pid 4921

<span class="cmt"># YARA scan in Volatility</span>
python3 vol.py -f mem.img windows.vadyarascan.VadYaraScan --yara-file rules.yar

<span class="cmt"># Dump the suspicious process for static analysis</span>
python3 vol.py -f mem.img windows.pslist.PsList --pid 4921 --dump</div>

  <div class="h3">What Volatility malfind Looks For</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Indicator</th><th>Meaning</th><th>Action</th></tr>
    <tr><td>Memory region with PAGE_EXECUTE_READWRITE protection</td><td>Region is both writable and executable — shellcode staging area</td><td>Dump the region; run YARA on it; submit to sandbox</td></tr>
    <tr><td>Region starts with MZ header (PE magic bytes)</td><td>A PE file (EXE/DLL) is mapped into memory without going through the loader</td><td>Extract and analyze the PE — this is likely a reflectively loaded DLL</td></tr>
    <tr><td>Region not backed by any file on disk</td><td>Anonymous memory allocation — classic injection target</td><td>Dump and analyze; cross-reference start address with thread analysis</td></tr>
    <tr><td>Region backed by a deleted file</td><td>Binary executed and then deleted — fileless malware pattern</td><td>Extract from memory; hash; VirusTotal; check Amcache for SHA1</td></tr>
  </table></div>
</div>
`;}
