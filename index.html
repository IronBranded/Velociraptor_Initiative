function paneEnterprise(){return`
<div id="ent-tabs" class="tab-bar">
  <button class="tab active" data-target="et1">Intune / GPO Deploy</button>
  <button class="tab" data-target="et2">EDR Exclusions</button>
  <button class="tab" data-target="et3">Cloud Server Setup</button>
  <button class="tab" data-target="et4">Hardening</button>
  <button class="tab" data-target="et5">Multi-Org / MSSP</button>
  <button class="tab" data-target="et6">Uninstall & Cleanup</button>
</div>

<!-- INTUNE / GPO -->
<div id="et1" class="sp active">
  <div class="banner"><strong>Enterprise deployment</strong> means pushing a signed, configured Velociraptor client to thousands of endpoints silently, without end-user interaction, and without breaking existing security tooling.</div>

  <div class="h2">Deployment via Microsoft Intune (Recommended for Azure AD / M365)</div>
  <div class="h3">Step 1 — Build the MSI Package</div>
  <div class="cb"><span class="cmt"># On your Velociraptor server — generate a repacked MSI with embedded client config</span>
<span class="cmt"># First generate your server and client configs</span>
velociraptor config generate -i
<span class="cmt"># Creates: server.config.yaml and client.config.yaml</span>

<span class="cmt"># Repack the client binary with the config embedded</span>
velociraptor config repack --exe velociraptor-windows-amd64.exe \
  client.config.yaml velociraptor_client_signed.exe

<span class="cmt"># Or generate a proper MSI for Intune/SCCM deployment</span>
velociraptor config repack --msi velociraptor-windows-amd64.msi \
  client.config.yaml velociraptor_client.msi
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 2 — Deploy via Microsoft Intune</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Step</th><th>Intune Action</th><th>Notes</th></tr>
    <tr><td>1</td><td>Devices → Windows → Apps → Add → Line-of-business app</td><td>Upload your velociraptor_client.msi or .exe</td></tr>
    <tr><td>2</td><td>App Information: Set name, publisher, version</td><td>Use semantic versioning to track rollouts</td></tr>
    <tr><td>3</td><td>Program: Install cmd = <code>msiexec /i velociraptor_client.msi /quiet</code></td><td>Uninstall cmd = <code>msiexec /x velociraptor_client.msi /quiet</code></td></tr>
    <tr><td>4</td><td>Detection Rule: File exists — <code>C:\Program Files\Velociraptor\velociraptor.exe</code></td><td>Or check for service "velociraptor" in HKLM\SYSTEM\...\Services</td></tr>
    <tr><td>5</td><td>Assignments: Deploy to device group</td><td>Stage to pilot group first, then ring-based rollout</td></tr>
    <tr><td>6</td><td>Monitor: Device install status dashboard</td><td>Expect ~15–30 min for first check-in after install</td></tr>
  </table></div>

  <div class="h3">Step 3 — Deploy via Group Policy (On-Prem AD)</div>
  <div class="cb"><span class="cmt"># Copy MSI to a network share accessible by all computers</span>
\\dc01\NETLOGON\velociraptor\velociraptor_client.msi

<span class="cmt"># Group Policy: Computer Configuration → Software Settings → Software Installation</span>
<span class="cmt"># Add Package → browse to MSI → Assigned (installs at computer startup)</span>
<span class="cmt"># Target with WMI filter for OS version if needed</span>

<span class="cmt"># Alternatively, use GPO Startup Script (more control):</span>
<span class="cmt"># Computer Config → Windows Settings → Scripts → Startup</span>
<span class="cmt"># Script: install_velo.bat</span>
@echo off
if not exist "C:\Program Files\Velociraptor\velociraptor.exe" (
  msiexec /i \\dc01\NETLOGON\velociraptor\velociraptor_client.msi /quiet /norestart
)
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 4 — Deploy via SCCM / ConfigMgr</div>
  <div class="cb"><span class="cmt"># Create Application in SCCM</span>
<span class="cmt"># Software Library → Application Management → Applications → Create Application</span>
<span class="cmt"># Detection Method: Windows Installer, Product Code from MSI</span>
<span class="cmt"># Or: Registry key HKLM\SYSTEM\CurrentControlSet\Services\velociraptor</span>

<span class="cmt"># Silent install command</span>
msiexec.exe /i velociraptor_client.msi /quiet /norestart ALLUSERS=1

<span class="cmt"># Deploy to collection: All Windows Workstations</span>
<span class="cmt"># Purpose: Required (not Available) for automatic deployment</span>
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 5 — Verify Deployment</div>
  <div class="cb"><span class="cmt"># Verify service is running on an endpoint (Admin PowerShell)</span>
Get-Service -Name velociraptor

<span class="cmt"># Check client registered in Velociraptor GUI</span>
<span class="cmt"># Search bar: hostname:WIN-WS001 — should appear within 60 seconds of service start</span>

<span class="cmt"># VQL to find all clients NOT yet enrolled (run on server)</span>
<span class="kw">SELECT</span> ClientId, os_info.hostname <span class="kw">AS</span> Hostname, last_seen_at
<span class="kw">FROM</span> <span class="fn">clients</span>()
<span class="kw">ORDER BY</span> last_seen_at <span class="kw">DESC</span>
<button class="copy-btn">Copy</button></div>
</div>

<!-- EDR EXCLUSIONS -->
<div id="et2" class="sp">
  <div class="banner-red"><strong>Critical:</strong> Failing to add Velociraptor exclusions in your EDR/AV will result in quarantined binaries, blocked collections, and corrupted artifact results. This is the #1 cause of failed enterprise deployments. Configure exclusions BEFORE rollout.</div>

  <div class="h2">Why Exclusions Are Needed</div>
  <div class="p">Velociraptor performs behaviors that look identical to malware from an EDR's perspective: raw disk reads (bypassing the OS), direct registry hive access, process enumeration with low-level APIs, YARA scanning other processes, and network connections to unusual internal IPs. Without exclusions, your EDR will block collections mid-flight.</div>

  <div class="h3">Path-Based Exclusions (Apply to ALL Security Products)</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Path to Exclude</th><th>Why</th></tr>
    <tr><td><code>C:\Program Files\Velociraptor\velociraptor.exe</code></td><td>Main binary — will be flagged for raw disk access behaviors</td></tr>
    <tr><td><code>C:\Program Files\Velociraptor\</code> (folder)</td><td>Entire install directory — config files and tools cached here</td></tr>
    <tr><td><code>C:\Windows\Temp\velociraptor_*</code></td><td>Temporary working files during collections</td></tr>
    <tr><td><code>C:\Users\*\AppData\Local\Temp\velociraptor_*</code></td><td>Per-user temp artifacts during offline collection</td></tr>
    <tr><td>Velociraptor server IP:port (outbound)</td><td>Allow outbound TLS :8000 to server — classified as suspicious C2-like traffic</td></tr>
  </table></div>

  <div class="h3">Process-Based Exclusions</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Product</th><th>Exclusion Type</th><th>Value</th></tr>
    <tr><td>Microsoft Defender</td><td>Process exclusion</td><td><code>C:\Program Files\Velociraptor\velociraptor.exe</code></td></tr>
    <tr><td>CrowdStrike Falcon</td><td>Sensor exclusion (ML + behavioral)</td><td>Hash + path exclusion for velociraptor.exe; add IOA exclusion for raw disk access</td></tr>
    <tr><td>SentinelOne</td><td>Exclusion policy → Process</td><td>velociraptor.exe + path. Also exclude "Suspicious Process Access to LSASS" for credential collection artifacts</td></tr>
    <tr><td>Carbon Black</td><td>Allowlist via Policy</td><td>Application path: C:\Program Files\Velociraptor\ with "Allow all operations"</td></tr>
    <tr><td>Cortex XDR</td><td>Exceptions profile</td><td>Process exception + network exception for server IP</td></tr>
  </table></div>

Add-MpPreference -ExclusionProcess "velociraptor.exe"
Add-MpPreference -ExclusionPath "C:\Program Files\Velociraptor"
Add-MpPreference -ExclusionPath "C:\Windows\Temp\velociraptor_*"

<span class="cmt"># Verify exclusions are applied</span>
Get-MpPreference | Select-Object ExclusionProcess, ExclusionPath

<span class="cmt"># Via Intune: Endpoint Security → Antivirus → Create Policy</span>
<span class="cmt"># Microsoft Defender Antivirus Exclusions → Process Exclusions → velociraptor.exe</span>
<button class="copy-btn">Copy</button></div>

  <div class="h3">CrowdStrike Falcon Exclusions</div>
  <div class="cb"><span class="cmt"># CrowdStrike Falcon Console: Configuration → Prevention Policies</span>
<span class="cmt"># ML Exclusions → Add exclusion:</span>
<span class="cmt">#   Value: SHA256 hash of your velociraptor binary (from releases page)</span>
<span class="cmt">#   Type: SHA256</span>

<span class="cmt"># Configuration → IOA Exclusions → Add:</span>
<span class="cmt">#   Name: Velociraptor Raw Disk Read</span>
<span class="cmt">#   Rule Group: (your Windows prevention group)</span>
<span class="cmt">#   Image: *velociraptor*</span>

<!-- CLOUD SERVER SETUP -->
<div id="et3" class="sp">
  <div class="banner"><strong>Production Velociraptor servers</strong> should live in a cloud environment — accessible to remote clients, scalable, and protected by proper network controls. This section covers Azure setup (GCP is nearly identical).</div>

  <div class="h2">Azure VM Setup for Velociraptor Server</div>
  <div class="h3">Step 1 — Provision the VM</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Setting</th><th>Recommended Value</th><th>Notes</th></tr>
    <tr><td>VM Size</td><td>Standard_D4s_v3 (4 vCPU, 16GB)</td><td>Supports 5,000–8,000 clients. Scale up for more.</td></tr>
    <tr><td>OS</td><td>Ubuntu 22.04 LTS</td><td>Long-term support, well-tested with Velociraptor</td></tr>
    <tr><td>Disk</td><td>Premium SSD 512GB+</td><td>Data store grows with artifact collection volume</td></tr>
    <tr><td>Region</td><td>Closest to majority of clients</td><td>Reduces latency for client check-ins</td></tr>
    <tr><td>Authentication</td><td>SSH public key only</td><td>Disable password auth immediately</td></tr>
  </table></div>

  <div class="h3">Step 2 — Network Security Group (Azure NSG) Rules</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Direction</th><th>Port</th><th>Protocol</th><th>Source</th><th>Purpose</th></tr>
    <tr><td>Inbound</td><td>8000</td><td>TCP</td><td>Any (or client IP ranges)</td><td>Client-to-server mTLS communication</td></tr>
    <tr><td>Inbound</td><td>8889</td><td>TCP</td><td>Analyst IP only</td><td>GUI access — RESTRICT to known analyst IPs</td></tr>
    <tr><td>Inbound</td><td>8001</td><td>TCP</td><td>Analyst/SOAR IP only</td><td>gRPC API access</td></tr>
    <tr><td>Inbound</td><td>22</td><td>TCP</td><td>Analyst IP only</td><td>SSH management — Bastion host preferred</td></tr>
    <tr><td>Outbound</td><td>All</td><td>Any</td><td>Any</td><td>Allow outbound for updates and enrichment</td></tr>
  </table></div>
  <div class="banner-red"><strong>Never expose port 8889 (GUI) to the public internet.</strong> Use an Azure Bastion Host or SSH tunnel for GUI access. Use a VPN or IP allowlist for port 8000 if your client population allows it.</div>

  <div class="h3">Step 3 — Install and Configure Velociraptor on the Server VM</div>
  <div class="cb"><span class="cmt"># SSH into your Azure VM</span>
ssh -i ~/.ssh/azure_key azureuser@YOUR_VM_IP

<span class="cmt"># Download latest Velociraptor binary</span>
wget https://github.com/Velocidex/velociraptor/releases/latest/download/velociraptor-linux-amd64
chmod +x velociraptor-linux-amd64
sudo mv velociraptor-linux-amd64 /usr/local/bin/velociraptor

<span class="cmt"># Generate production config (interactive wizard)</span>
<span class="cmt"># Use your Azure VM's public IP or DNS name as the server address</span>
sudo velociraptor config generate -i

<span class="cmt"># Test: start the server manually first</span>
sudo velociraptor --config /etc/velociraptor/server.config.yaml frontend -v
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 4 — Install as a systemd Service</div>
  <div class="cb"><span class="cmt"># Create systemd service unit</span>
sudo tee /etc/systemd/system/velociraptor.service &lt;&lt;EOF
[Unit]
Description=Velociraptor DFIR Server
After=network.target

[Service]
Type=simple
User=velociraptor
Group=velociraptor
ExecStart=/usr/local/bin/velociraptor --config /etc/velociraptor/server.config.yaml frontend
Restart=always
RestartSec=10
LimitNOFILE=65536

[Install]
WantedBy=multi-user.target
EOF

<span class="cmt"># Create dedicated service user (least privilege)</span>
sudo useradd -r -s /bin/false velociraptor
sudo mkdir -p /var/lib/velociraptor /etc/velociraptor
sudo chown -R velociraptor:velociraptor /var/lib/velociraptor /etc/velociraptor

<span class="cmt"># Enable and start</span>
sudo systemctl daemon-reload
sudo systemctl enable velociraptor
sudo systemctl start velociraptor
sudo systemctl status velociraptor
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 5 — TLS Certificate (Let's Encrypt for Public DNS)</div>
  <div class="cb"><span class="cmt"># If using a domain name (recommended for production)</span>
<span class="cmt"># Velociraptor can use Let's Encrypt automatically</span>
<span class="cmt"># In config generate wizard: choose "Use Let's Encrypt"</span>
<span class="cmt"># Provide your domain name: velociraptor.corp.example.com</span>

<span class="cmt"># DNS: Create A record → velociraptor.corp.example.com → Azure VM Public IP</span>
<span class="cmt"># Port 443 must be open for Let's Encrypt ACME challenge</span>

<span class="cmt"># After setup, clients connect to: https://velociraptor.corp.example.com:8000</span>
<button class="copy-btn">Copy</button></div>
</div>

<!-- HARDENING -->
<div id="et4" class="sp">
  <div class="h2">Velociraptor Server Hardening Checklist</div>
  <div class="banner-teal"><strong>Your Velociraptor server holds the keys to your entire endpoint fleet.</strong> A compromised server means an attacker can execute arbitrary code on every enrolled endpoint. Harden it like a domain controller.</div>

  <div class="tbl-wrap"><table class="vt">
    <tr><th>Control</th><th>Implementation</th><th>Priority</th></tr>
    <tr><td>Restrict GUI access by IP</td><td>NSG/firewall rule: port 8889 to analyst IPs only. Prefer SSH tunnel or VPN.</td><td><span class="badge badge-red">Critical</span></td></tr>
    <tr><td>Secure server.config.yaml</td><td>This file contains the private CA. Permissions: 600, owner: velociraptor. Back up securely offline. Never commit to git.</td><td><span class="badge badge-red">Critical</span></td></tr>
    <tr><td>Enable 2FA on GUI</td><td>Settings → Users → enable TOTP for all admin accounts. Use Authenticator app.</td><td><span class="badge badge-ok">High</span></td></tr>
    <tr><td>Use dedicated service account</td><td>Run velociraptor service as non-root user with only necessary permissions.</td><td><span class="badge badge-ok">High</span></td></tr>
    <tr><td>Separate API credentials</td><td>Generate API key with minimal scope. Never use admin credentials for automation.</td><td><span class="badge badge-ok">High</span></td></tr>
    <tr><td>Enable audit logging</td><td>All user actions are logged. Configure log export to SIEM for server admin activity.</td><td><span class="badge badge-ok">High</span></td></tr>
    <tr><td>Rotate client certs on schedule</td><td>Generate new client configs annually or after staff turnover. Revoke old client certificates.</td><td><span class="badge badge-warn">Medium</span></td></tr>
    <tr><td>Backup data store</td><td>Back up /var/lib/velociraptor daily. Test restoration quarterly.</td><td><span class="badge badge-warn">Medium</span></td></tr>
    <tr><td>OS hardening</td><td>Disable SSH password auth, enable UFW, apply security patches, disable unused services.</td><td><span class="badge badge-ok">High</span></td></tr>
    <tr><td>Separate frontend from GUI</td><td>In large deployments: dedicated frontend VMs for clients, separate GUI-only VM for analysts.</td><td><span class="badge badge-info">Scale</span></td></tr>
  </table></div>

  <div class="h3">SSH Tunnel for GUI Access (No Public Exposure)</div>
  <div class="cb"><span class="cmt"># Access the GUI without exposing port 8889 publicly</span>
<span class="cmt"># On your analyst workstation:</span>
ssh -L 8889:localhost:8889 -N azureuser@YOUR_VM_IP

<span class="cmt"># Then browse to: https://localhost:8889</span>
<span class="cmt"># Traffic travels over SSH, port 8889 never exposed to internet</span>
<button class="copy-btn">Copy</button></div>
</div>

<!-- MULTI-ORG / MSSP -->
<div id="et5" class="sp">
  <div class="banner"><strong>Multi-tenancy (Orgs)</strong> lets you run one Velociraptor server that serves multiple client organizations with complete data isolation — each org sees only their own clients, hunts, and results. Essential for MSSP deployments.</div>

  <div class="h2">Creating and Managing Organizations</div>

  --org acme
<button class="copy-btn">Copy</button></div>

<span class="cmt"># An admin can see all orgs; an org user sees only their org</span>
<button class="copy-btn">Copy</button></div>

  <div class="h2">MSSP Architecture Pattern</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Component</th><th>Configuration</th></tr>
    <tr><td>Single Velociraptor Server</td><td>One server handles all clients across all orgs. Data stored in separate directories per org.</td></tr>
    <tr><td>Per-Org Analyst Accounts</td><td>Investigator role scoped to one org. Cannot see other orgs' data or clients.</td></tr>
    <tr><td>MSSP Admin Account</td><td>Administrator role with all-org visibility. Used for infrastructure management only.</td></tr>

<!-- UNINSTALL & CLEANUP -->
<div id="et6" class="sp">
  <div class="banner-teal"><strong>Forensically sound removal</strong> matters. When decommissioning Velociraptor, removing exclusions incorrectly or leaving config files behind can cause security gaps or EDR alert storms. Follow this procedure carefully.</div>

  <div class="h2">Client Uninstall — Windows (Forensically Sound)</div>
  <div class="h3">Step 1 — Record Final State Before Removal</div>
  <div class="cb"><span class="cmt"># Before uninstalling, collect a final baseline from the client</span>
<span class="cmt"># In Velociraptor GUI: trigger a final collection on the endpoint</span>
<span class="cmt"># Recommended: Windows.System.Pslist, Windows.Sys.StartupItems, Windows.System.Services</span>
<span class="cmt"># This documents the endpoint state at time of decommission</span>
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 2 — Remove the Windows Client Service</div>
  <div class="cb"><span class="cmt"># Method 1: Using Velociraptor binary (cleanest)</span>
velociraptor.exe --config client.config.yaml service remove

<span class="cmt"># Method 2: Via sc.exe if binary is unavailable</span>
sc.exe stop velociraptor
sc.exe delete velociraptor

<span class="cmt"># Method 3: PowerShell</span>
Stop-Service -Name velociraptor -Force
Remove-Service -Name velociraptor

<span class="cmt"># Verify service is gone</span>
Get-Service -Name velociraptor
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 3 — Remove Files and Config</div>
  <div class="cb"><span class="cmt"># Remove the installation directory (Admin PowerShell)</span>
Remove-Item -Recurse -Force "C:\Program Files\Velociraptor"

<span class="cmt"># Remove client config if stored separately</span>
Remove-Item -Force "C:\Windows\System32\velociraptor.config.yaml"

<span class="cmt"># Remove any Winlogon or registry artifacts</span>
Remove-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Services\velociraptor" -ErrorAction SilentlyContinue
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 4 — Remove EDR / AV Exclusions (CRITICAL)</div>
  <div class="cb"><span class="cmt"># Remove Defender exclusions after client is fully removed</span>
<span class="cmt"># Removing BEFORE uninstall will trigger EDR alerts during the removal process</span>
Remove-MpPreference -ExclusionProcess "velociraptor.exe"
Remove-MpPreference -ExclusionPath "C:\Program Files\Velociraptor"

<span class="cmt"># For CrowdStrike/SentinelOne/other: remove via the EDR console</span>
<span class="cmt"># Configuration → Exclusions → find velociraptor entries → delete</span>
<button class="copy-btn">Copy</button></div>

  <div class="h3">Step 5 — Decommission from Server</div>
  <div class="cb"><span class="cmt"># In Velociraptor GUI: find the client → Client Information → Delete Client</span>
<span class="cmt"># This removes all collected artifacts, flow history, and the client record</span>

<span class="cmt"># Via VQL on the server (admin only):</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">client_delete</span>(client_id=<span class="str">"C.abc123"</span>, really_do_it=<span class="str">TRUE</span>)
<button class="copy-btn">Copy</button></div>

  <div class="h2">Linux Client Uninstall</div>
  <div class="cb"><span class="cmt"># Stop and disable the systemd service</span>
sudo systemctl stop velociraptor_client
sudo systemctl disable velociraptor_client

<span class="cmt"># Remove the service unit file</span>
sudo rm /etc/systemd/system/velociraptor_client.service
sudo systemctl daemon-reload

<span class="cmt"># Remove binary and config</span>
sudo rm /usr/local/bin/velociraptor
sudo rm /etc/velociraptor/client.config.yaml
sudo rmdir /etc/velociraptor 2>/dev/null || true

<span class="cmt"># Verify removal</span>
systemctl status velociraptor_client
which velociraptor
<button class="copy-btn">Copy</button></div>
</div>
`;}

function paneVQL(){return`
<div id="vql-tabs" class="tab-bar">
  <button class="tab active" data-target="vt1">Syntax Basics</button>
  <button class="tab" data-target="vt2">Plugins</button>
  <button class="tab" data-target="vt3">Live Examples</button>
  <button class="tab" data-target="vt4">Advanced VQL</button>
</div>
<div id="vt1" class="sp active">
  <div class="banner"><strong>VQL</strong> is a SQL-like query language purpose-built for DFIR. Queries run on the endpoint (or server) and return rows of forensic data from <em>plugins</em>.</div>
  <div class="cb"><span class="kw">SELECT</span> col1, col2       <span class="cmt">-- fields to return (* for all)</span>
<span class="kw">FROM</span>   <span class="fn">plugin_name</span>(arg=<span class="str">'value'</span>)  <span class="cmt">-- data source plugin</span>
<span class="kw">WHERE</span>  condition         <span class="cmt">-- filter rows</span>
<span class="kw">ORDER BY</span> col1 <span class="kw">DESC</span>     <span class="cmt">-- sort results</span>
<span class="kw">LIMIT</span>  100              <span class="cmt">-- cap row count</span>
<button class="copy-btn">Copy</button></div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Clause / Operator</th><th>Purpose</th><th>Example</th></tr>
    <tr><td><code>SELECT</code></td><td>Choose output columns</td><td>SELECT Name, Pid</td></tr>
    <tr><td><code>FROM</code></td><td>Name the plugin or artifact</td><td>FROM pslist()</td></tr>
    <tr><td><code>WHERE</code></td><td>Filter rows</td><td>WHERE Pid &gt; 1000</td></tr>
    <tr><td><code>LET</code></td><td>Define a named sub-query or variable</td><td>LET x = SELECT ...</td></tr>
    <tr><td><code>GROUP BY</code></td><td>Aggregate rows</td><td>GROUP BY Name</td></tr>
    <tr><td><code>ORDER BY</code></td><td>Sort results</td><td>ORDER BY Mtime DESC</td></tr>
    <tr><td><code>LIMIT</code></td><td>Cap row count</td><td>LIMIT 100</td></tr>
    <tr><td><code>=~</code></td><td>Regex match (case-insensitive)</td><td>Name =~ "svc"</td></tr>
    <tr><td><code>!~</code></td><td>Regex NOT match</td><td>Name !~ "system"</td></tr>
    <tr><td><code>AS</code></td><td>Alias a column</td><td>hash(...).MD5 AS MD5</td></tr>
    <tr><td><code>foreach()</code></td><td>Iterate sub-queries over rows</td><td>SELECT * FROM foreach(...)</td></tr>
  </table></div>
</div>
<div id="vt2" class="sp">
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Plugin</th><th>Category</th><th>Description</th></tr>
    <tr><td><code>pslist()</code></td><td><span class="pill p-o">Process</span></td><td>Running processes: PID, PPID, name, cmdline, create time</td></tr>
    <tr><td><code>netstat()</code></td><td><span class="pill p-o">Network</span></td><td>Network connections and listening ports with owning PID</td></tr>
    <tr><td><code>glob(globs=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>Wildcard file search — supports **, *, ? patterns</td></tr>
    <tr><td><code>stat(filename=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>File metadata: size, timestamps, permissions, owner</td></tr>
    <tr><td><code>read_file(filename=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>Read file contents as string or bytes</td></tr>
    <tr><td><code>hash(path=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>Compute MD5 / SHA1 / SHA256 of a file</td></tr>
    <tr><td><code>parse_evtx(filename=...)</code></td><td><span class="pill p-b">Event Logs</span></td><td>Parse Windows .evtx event log files</td></tr>
    <tr><td><code>parse_mft()</code></td><td><span class="pill p-b">NTFS</span></td><td>Parse NTFS MFT — full filesystem timeline including deleted</td></tr>
    <tr><td><code>parse_usn(device=...)</code></td><td><span class="pill p-b">NTFS</span></td><td>Parse USN Change Journal for file activity history</td></tr>
    <tr><td><code>yara(rules=..., files=...)</code></td><td><span class="pill p-r">Detection</span></td><td>Scan files or process memory with YARA rules</td></tr>
    <tr><td><code>sigma(rules=...)</code></td><td><span class="pill p-r">Detection</span></td><td>Apply Sigma detection rules to log data</td></tr>
    <tr><td><code>wmi(query=...)</code></td><td><span class="pill p-o">Windows</span></td><td>Execute WMI queries on Windows</td></tr>
    <tr><td><code>environ()</code></td><td><span class="pill p-o">System</span></td><td>Environment variables for current or target process</td></tr>
    <tr><td><code>upload(file=...)</code></td><td><span class="pill p-t">Collection</span></td><td>Upload file from client to server data store</td></tr>
    <tr><td><code>http_client(url=...)</code></td><td><span class="pill p-b">Network</span></td><td>HTTP requests from VQL (webhooks, enrichment, SOAR)</td></tr>
    <tr><td><code>watch_monitoring(...)</code></td><td><span class="pill p-r">Events</span></td><td>Subscribe to CLIENT_EVENT artifact streams server-side</td></tr>
  </table></div>
</div>
<div id="vt3" class="sp">
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Find PowerShell processes</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'ex1')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Pid, Ppid, Name, CommandLine, CreateTime
<span class="kw">FROM</span> <span class="fn">pslist</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"powershell"</span>
<button class="copy-btn">Copy</button></div>
      <div class="vql-result" id="ex1"><table class="vt">
        <tr><th>Pid</th><th>Ppid</th><th>Name</th><th>CommandLine</th><th>CreateTime</th></tr>
        <tr><td>5512</td><td>3120</td><td>powershell.exe</td><td>powershell -enc JAB...</td><td>2025-03-24 09:12</td></tr>
        <tr><td>7840</td><td>880</td><td>powershell.exe</td><td>powershell.exe -ep bypass -c IEX</td><td>2025-03-24 11:45</td></tr>
      </table></div>
    </div>
  </div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Hash small exes in System32</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'ex2')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> FullPath, Size, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256, Mtime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/System32/*.exe"</span>)
<span class="kw">WHERE</span> Size &lt; <span class="str">10000</span>
<span class="kw">ORDER BY</span> Size
<button class="copy-btn">Copy</button></div>
      <div class="vql-result" id="ex2"><table class="vt">
        <tr><th>FullPath</th><th>Size</th><th>SHA256</th><th>Mtime</th></tr>
        <tr><td>C:\Windows\System32\reg.exe</td><td>6144</td><td>a3c2a...</td><td>2023-10-11</td></tr>
        <tr><td>C:\Windows\System32\suspect.exe</td><td>4096</td><td>00000...</td><td>2025-03-22</td></tr>
      </table></div>
    </div>
  </div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Security log — logon events (4624)</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'ex3')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> System.TimeCreated, EventData.TargetUserName <span class="kw">AS</span> User,
       EventData.IpAddress <span class="kw">AS</span> SourceIP, EventData.LogonType
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4624</span> <span class="kw">LIMIT</span> <span class="str">5</span>
<button class="copy-btn">Copy</button></div>
      <div class="vql-result" id="ex3"><table class="vt">
        <tr><th>TimeCreated</th><th>User</th><th>SourceIP</th><th>LogonType</th></tr>
        <tr><td>2025-03-24 08:01</td><td>jsmith</td><td>10.0.0.14</td><td>3 (Network)</td></tr>
        <tr><td>2025-03-24 09:23</td><td>badactor</td><td><strong style="color:#c04040">185.220.101.x</strong></td><td>10 (RemoteInteractive)</td></tr>
      </table></div>
    </div>
  </div>
</div>
<div id="vt4" class="sp">
  <div class="h3">LET — Named Sub-queries</div>
  <div class="cb"><span class="cmt">-- Define a reusable result set</span>
<span class="kw">LET</span> suspicious = <span class="kw">SELECT</span> Pid, Name, CommandLine
  <span class="kw">FROM</span> <span class="fn">pslist</span>() <span class="kw">WHERE</span> CommandLine <span class="kw">=~</span> <span class="str">"mimikatz|beacon|cobalt"</span>

<span class="kw">SELECT</span> * <span class="kw">FROM</span> suspicious <span class="kw">WHERE</span> Pid > <span class="str">1000</span>
<button class="copy-btn">Copy</button></div>
  <div class="h3">foreach — Iterate Over Rows</div>
  <div class="cb"><span class="cmt">-- For each suspicious process, list its network connections</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid <span class="kw">FROM</span> suspicious },
  query={ <span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">netstat</span>() <span class="kw">WHERE</span> Pid = Pid }
)
<button class="copy-btn">Copy</button></div>
  <div class="h3">Accessors — Filesystem Abstraction Layer</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Accessor</th><th>Description</th></tr>
    <tr><td><code>file</code></td><td>Default OS filesystem — subject to OS buffering and ACLs</td></tr>
    <tr><td><code>ntfs</code></td><td>Low-level NTFS: bypasses OS cache, exposes ADS, $MFT, $LogFile</td></tr>
    <tr><td><code>raw_reg</code></td><td>Direct registry hive parsing without registry API</td></tr>
    <tr><td><code>zip</code></td><td>Browse inside ZIP, EVTX, or other container files</td></tr>
    <tr><td><code>s3</code></td><td>AWS S3 bucket access for cloud artifact collection</td></tr>
    <tr><td><code>smb</code></td><td>Remote SMB share access</td></tr>
  </table></div>
  <div class="cb"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">glob</span>(
  globs=<span class="str">"/**/*.exe"</span>,
  accessor=<span class="str">"ntfs"</span>  <span class="cmt">-- bypass OS, see hidden and locked files</span>
)
<button class="copy-btn">Copy</button></div>
</div>`;}

function paneArtifacts(){return`
<div id="art-tabs" class="tab-bar">
  <button class="tab active" data-target="at1">Structure</button>
  <button class="tab" data-target="at2">Types</button>
  <button class="tab" data-target="at3">Catalog</button>
  <button class="tab" data-target="at4">Writing Tips</button>
</div>
<div id="at1" class="sp active">
  <div class="banner"><strong>Artifacts</strong> are the primary unit of shareable, parameterized VQL in Velociraptor. They give complex queries a human-readable name, documentation, configurable parameters, and optional preconditions.</div>
  <div class="cb"><span class="kw">name:</span> <span class="str">Custom.Windows.SuspiciousExes</span>
<span class="kw">description:</span> <span class="str">Find small unsigned executables in System32.</span>
<span class="kw">author:</span> <span class="str">SOC Team</span>
<span class="kw">type:</span> <span class="str">CLIENT</span>
<span class="kw">parameters:</span>
  - <span class="kw">name:</span> <span class="str">MaxSize</span>
    <span class="kw">default:</span> <span class="str">"10000"</span>
    <span class="kw">description:</span> <span class="str">Max file size in bytes</span>
    <span class="kw">type:</span> <span class="str">int</span>
<span class="kw">precondition:</span> <span class="str">SELECT OS From info() where OS = 'windows'</span>
<span class="kw">sources:</span>
  - <span class="kw">name:</span> <span class="str">SuspiciousExes</span>
    <span class="kw">query:</span> |
      <span class="kw">SELECT</span> FullPath, Size, hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256
      <span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Windows/System32/*.exe"</span>)
      <span class="kw">WHERE</span> Size &lt; MaxSize
<button class="copy-btn">Copy</button></div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Field</th><th>Required</th><th>Description</th></tr>
    <tr><td><code>name</code></td><td><span class="badge badge-ok">Yes</span></td><td>Unique dot-namespaced ID, e.g. Windows.Forensics.Prefetch</td></tr>
    <tr><td><code>description</code></td><td><span class="badge badge-warn">Rec.</span></td><td>Human-readable explanation shown in GUI</td></tr>
    <tr><td><code>author</code></td><td>No</td><td>Artifact author attribution</td></tr>
    <tr><td><code>type</code></td><td><span class="badge badge-warn">Rec.</span></td><td>CLIENT, SERVER, CLIENT_EVENT, SERVER_EVENT, NOTEBOOK</td></tr>
    <tr><td><code>parameters</code></td><td>No</td><td>Inputs with name, default, type (int/bool/string/yara/regex/csv)</td></tr>
    <tr><td><code>sources</code></td><td><span class="badge badge-ok">Yes</span></td><td>Named query blocks — each produces a separate result table</td></tr>
    <tr><td><code>precondition</code></td><td>No</td><td>VQL expression — artifact skips if this returns no rows</td></tr>
    <tr><td><code>tools</code></td><td>No</td><td>External binaries Velociraptor fetches, caches, and distributes</td></tr>
    <tr><td><code>resources</code></td><td>No</td><td>cpu_limit, max_rows, timeout, max_upload_bytes</td></tr>
    <tr><td><code>export</code></td><td>No</td><td>VQL functions/constants exported for other artifacts to import</td></tr>
  </table></div>
</div>
<div id="at2" class="sp">
  <div class="g2">
    <div class="card" style="border-left:3px solid var(--teal)">
      <div class="card-title">CLIENT</div>
      <div class="p">Runs on an endpoint when triggered by a collection or hunt. Results stream to the server. Most artifacts are this type.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid var(--orange)">
      <div class="card-title">CLIENT_EVENT</div>
      <div class="p">Runs continuously on the endpoint, streaming events in real time. Persists until removed. Used for detection, monitoring, and alerting.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">CLIENT_EVENT</span></div>
    </div>
    <div class="card" style="border-left:3px solid #4a8fff">
      <div class="card-title">SERVER</div>
      <div class="p">Runs on the Velociraptor server. Used for post-processing hunt results, enrichment, sending notifications, and server-side automation.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER</span></div>
    </div>
    <div class="card" style="border-left:3px solid #c04040">
      <div class="card-title">SERVER_EVENT</div>
      <div class="p">Continuous server-side monitoring. Can watch CLIENT_EVENT streams and trigger automated responses — webhooks, SOAR, notifications.</div>
      <div class="cb" style="font-size:11px"><span class="kw">type:</span> <span class="str">SERVER_EVENT</span></div>
    </div>
  </div>
</div>
<div id="at3" class="sp">
  <div class="filter-bar" id="artFilterBar">
    <button class="fbtn active" onclick="filterArts('all',this)">All</button>
    <button class="fbtn" onclick="filterArts('windows',this)">Windows</button>
    <button class="fbtn" onclick="filterArts('linux',this)">Linux</button>
    <button class="fbtn" onclick="filterArts('detection',this)">Detection</button>
    <button class="fbtn" onclick="filterArts('forensics',this)">Forensics</button>
  </div>
  <div class="art-grid" id="artGrid"></div>
</div>
<div id="at4" class="sp">
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Naming conventions</span><span class="acc-arr">›</span></div><div class="acc-b">Use dot-namespaced names: <code>OS.Category.Sub</code>. Built-ins follow this convention: <code>Windows.Forensics.Prefetch</code>, <code>Linux.Sys.Pslist</code>, <code>Generic.Detection.Yara</code>. Custom artifacts should start with your org name to avoid conflicts with future built-ins: <code>Acme.Detection.Beacon</code>, <code>Corp.IR.Triage</code>.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Parameter types</span><span class="acc-arr">›</span></div><div class="acc-b">Available parameter types: <code>string</code>, <code>int</code>, <code>bool</code>, <code>timestamp</code>, <code>choices</code>, <code>csv</code>, <code>json</code>, <code>yara</code>, <code>regex</code>, <code>upload</code>. Always provide sensible defaults so analysts can run without configuring everything. The <code>yara</code> and <code>regex</code> types give analysts a multiline editor in the GUI.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Resource limits</span><span class="acc-arr">›</span></div><div class="acc-b">Add a <code>resources</code> block to prevent runaway artifacts from degrading endpoint performance. Key fields: <code>cpu_limit: 50</code> (percent), <code>max_rows: 100000</code>, <code>timeout: 300</code> (seconds), <code>max_upload_bytes: 1000000000</code>. These are enforced by the client-side VQL engine.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Multiple sources</span><span class="acc-arr">›</span></div><div class="acc-b">Artifacts support multiple named <code>sources</code>, each producing a separate result table shown as tabs in the GUI. Use this to collect related but distinct data in one artifact — e.g. one source for processes, another for network connections, and a third for startup items.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Importing and exporting</span><span class="acc-arr">›</span></div><div class="acc-b">Use the <code>export</code> field to expose VQL functions and constants that other artifacts can <code>import</code>. This enables composability and prevents code duplication across your artifact library.</div></div>
  <div class="acc"><div class="acc-h" onclick="toggleAcc(this)"><span>Artifact Exchange</span><span class="acc-arr">›</span></div><div class="acc-b">The <a href="https://docs.velociraptor.app/exchange/" target="_blank" style="color:var(--teal)">Artifact Exchange</a> hosts hundreds of community-contributed artifacts. Import them directly in the GUI under <em>View Artifacts → Add Artifact → Import from Exchange</em>. Review the VQL before deploying in production.</div></div>
</div>`;}

/* ── Global Search ── */
window.openSearch = function(){
  document.getElementById('gsearch-overlay').classList.add('open');
  document.getElementById('gsearch-input').focus();
  document.getElementById('gsearch-results').innerHTML = '<div class="gs-empty">Start typing to search the guide…</div>';
  document.getElementById('gsearch-input').value = '';
};
window.closeSearch = function(e){
  if(e.target.id === 'gsearch-overlay') document.getElementById('gsearch-overlay').classList.remove('open');
};
window.doSearch = function(q){
  const results = document.getElementById('gsearch-results');
  if(!q.trim()){results.innerHTML='<div class="gs-empty">Start typing to search the guide…</div>';return;}
  const terms = q.toLowerCase().split(/\s+/);
  const matches = SEARCH_INDEX.filter(item => {
    const hay = (item.title + ' ' + item.text).toLowerCase();
    return terms.every(t => hay.includes(t));
  });
  if(!matches.length){results.innerHTML='<div class="gs-empty">No results found.</div>';return;}
  const highlight = (str) => {
    let h = str;
    terms.forEach(t => { h = h.replace(new RegExp('('+t+')', 'gi'), '<em>$1</em>'); });
    return h;
  };
  results.innerHTML = matches.slice(0,12).map(m => `
    <div class="gs-result" onclick="goTo('${m.id}');document.getElementById('gsearch-overlay').classList.remove('open')">
      <div class="gs-title">${highlight(m.title)}</div>
      <div class="gs-match">${TITLES[m.id] || m.id} section</div>
    </div>`).join('');
};
window.searchKeyNav = function(e){
  if(e.key==='Escape') document.getElementById('gsearch-overlay').classList.remove('open');
};
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='k'){e.preventDefault();openSearch();}
});

function goTo(id){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.getElementById('tbTitle').textContent = TITLES[id]||id;
  document.getElementById('tbSub').textContent = SUBS[id]||'';
  const c = document.getElementById('content');
  c.innerHTML = `<div class="pane active">${(PANES[id]||(() => '<p class="p">Coming soon.</p>'))()}</div>`;
  c.scrollTop = 0;
  // Bind tabs
  c.querySelectorAll('.tab-bar button.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const bar = tab.closest('.tab-bar');
      bar.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.target;
      const pane = c.querySelector('.pane.active');
      pane.querySelectorAll('.sp').forEach(sp=>sp.classList.toggle('active',sp.id===target));
    });
  });
  if(id==='artifacts') setTimeout(renderArtGrid,0);
}

function renderArtGrid(cat='all'){
  const g = document.getElementById('artGrid');
  if(!g)return;
  const filtered = cat==='all' ? ARTS : ARTS.filter(a=>a.c===cat);
  g.innerHTML = filtered.map(a=>`
    <div class="art-card">
      <div class="art-name">${a.n}</div>
      <div class="art-desc">${a.d}</div>
      <div>${a.t.map(t=>`<span class="pill p-t">${t}</span>`).join('')}</div>
    </div>`).join('');
}

window.filterArts = function(cat,btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b===btn));
  renderArtGrid(cat);
};

window.runVQL = function(btn,id){
  const r = document.getElementById(id);
  if(r){r.classList.add('shown');btn.textContent='✓ Done';btn.classList.add('done');}
};

window.toggleAcc = function(h){
  const body = h.nextElementSibling;
  const arr = h.querySelector('.acc-arr');
  body.classList.toggle('open');
  if(arr) arr.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : '';
};

/* ── Copy-to-clipboard for .copy-btn ── */
document.addEventListener('click', e => {
  if(!e.target.classList.contains('copy-btn')) return;
  const cb = e.target.closest('.cb') || e.target.closest('.vql-body .cb');
  if(!cb) return;
  // Get text, excluding other copy-btn text and VQL result tables
  const clone = cb.cloneNode(true);
  clone.querySelectorAll('.copy-btn').forEach(b => b.remove());
  const text = clone.innerText.trim();
  navigator.clipboard.writeText(text).then(() => {
    const orig = e.target.textContent;
    e.target.textContent = '✓ Copied';
    e.target.classList.add('copied');
    setTimeout(() => { e.target.textContent = 'Copy'; e.target.classList.remove('copied'); }, 1800);
  }).catch(() => {
    e.target.textContent = 'Error';
    setTimeout(() => { e.target.textContent = 'Copy'; }, 1500);
  });
});

}
