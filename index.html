<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velociraptor DFIR — Interactive Guide</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e8830a'/><text x='16' y='22' font-family='monospace' font-size='16' font-weight='700' fill='white' text-anchor='middle'>VR</text></svg>">
<style>
/* ── Reset & Tokens ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--sidebar:#1a1d2e;--sidebar-hover:rgba(255,255,255,.06);
  --card:#ffffff;--border:#e2e4ec;--text:#1c2033;--muted:#6b7399;
  --orange:#e8830a;--orange2:#f5960f;--teal:#1aab8a;--teal2:#15c4a2;
  --navy:#1a1d2e;--row0:#fff;--row1:#f9fafb;
  --code-bg:#f0f2f8;--code-text:#1a1d2e;--code-border:#c8ccdc;
  --input:#fff;--input-border:#ccd0e0;
  --tag-bg:#e8f4f0;--tag-text:#0f7a5f;
  --ok:#1e8a5a;--warn:#c06000;--heading:#1a1d2e;
  --accent-bg:#fff8ee;--scrollbar:#d0d3e0;
  --sb-text:#b8bdd4;--sb-active:#fff;--sb-section:rgba(255,255,255,.3);
  font-size:13px;
}
.dark{
  --bg:#12141f;--card:#1c1f31;--border:#272b42;--text:#d4d8f0;--muted:#7880a8;
  --row0:#1c1f31;--row1:#20243a;--code-bg:#0d0f1c;--code-text:#b8e0d0;
  --code-border:#222644;--input:#161928;--input-border:#313659;
  --tag-bg:#0d2d24;--tag-text:#3dd4aa;--ok:#3dd4aa;--warn:#e8a844;
  --accent-bg:#1a1408;--heading:#e8dfc0;--scrollbar:#2a2e4a;
}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);transition:background .2s,color .2s}

/* ── Scrollbars ───────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}

/* ── Layout ───────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;min-width:220px;background:var(--navy);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
#sidebar.collapsed{width:52px;min-width:52px}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Sidebar ──────────────────────────────────────── */
.sb-logo{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;gap:10px;overflow:hidden}
.sb-logo-icon{width:30px;height:30px;background:var(--orange);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;letter-spacing:-1px}
.sb-logo-text{overflow:hidden;white-space:nowrap;transition:opacity .15s}
.sb-logo-title{color:#fff;font-size:14px;font-weight:600}
.sb-logo-sub{color:rgba(255,255,255,.38);font-size:10px;margin-top:1px}
#sidebar.collapsed .sb-logo-text{opacity:0;width:0}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.sb-section{color:var(--sb-section);font-size:10px;font-weight:600;letter-spacing:.8px;padding:10px 16px 3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .sb-section{opacity:0}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;color:var(--sb-text);font-size:12px;border-left:2px solid transparent;transition:all .15s;white-space:nowrap;overflow:hidden;user-select:none}
.sb-item:hover{background:var(--sidebar-hover);color:#fff}
.sb-item.active{background:rgba(232,131,10,.14);color:#fff;border-left-color:var(--orange)}
.sb-icon{width:16px;height:16px;flex-shrink:0;opacity:.65;transition:opacity .15s}
.sb-item:hover .sb-icon,.sb-item.active .sb-icon{opacity:1}
.sb-label{overflow:hidden;transition:opacity .15s}
#sidebar.collapsed .sb-label{opacity:0;width:0}
.sb-bottom{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;overflow:hidden}
.theme-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.75);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit}
.theme-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.collapse-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);border-radius:5px;padding:4px 8px;font-size:12px;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:inherit}
.collapse-btn:hover{background:rgba(255,255,255,.16);color:#fff}
#sidebar.collapsed .theme-btn{display:none}

/* ── Topbar ───────────────────────────────────────── */
#topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;transition:background .2s,border-color .2s}
.topbar-left{display:flex;flex-direction:column}
.topbar-title{font-size:15px;font-weight:600;color:var(--heading);line-height:1.2}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;border-radius:10px;font-size:10px;font-weight:600;padding:2px 8px;line-height:1.6}
.badge-ok{background:rgba(26,171,138,.15);color:var(--ok)}
.badge-warn{background:rgba(200,100,0,.13);color:var(--warn)}
.badge-info{background:rgba(26,83,200,.12);color:#3a7fd4}
.badge-orange{background:rgba(232,131,10,.15);color:var(--orange)}
.badge-red{background:rgba(200,40,40,.12);color:#c04040}

/* ── Content Area ────────────────────────────────── */
#content{flex:1;overflow-y:auto;padding:18px 22px;background:var(--bg);transition:background .2s}
.pane{display:none;animation:fadeIn .15s ease}
.pane.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Cards ───────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;transition:background .2s,border-color .2s}
.card-title{font-size:13px;font-weight:600;color:var(--heading);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.ct{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.ct-o{background:rgba(232,131,10,.18);color:var(--orange)}
.ct-t{background:rgba(26,171,138,.18);color:var(--teal)}
.ct-b{background:rgba(26,83,200,.18);color:#4a8fff}
.ct-r{background:rgba(200,40,40,.18);color:#c04040}
.ct-g{background:rgba(26,171,60,.18);color:#1aab3c}

/* ── Grids ───────────────────────────────────────── */
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr}}

/* ── Metrics ─────────────────────────────────────── */
.metric{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;transition:background .2s}
.m-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.m-value{font-size:24px;font-weight:700;color:var(--heading);line-height:1}
.m-sub{font-size:10px;color:var(--ok);margin-top:4px}
.m-sub.w{color:var(--warn)}

/* ── Tables ──────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;border-radius:7px;border:1px solid var(--border)}
table.vt{width:100%;border-collapse:collapse;font-size:12px}
table.vt th{background:var(--navy);color:rgba(255,255,255,.78);font-weight:600;font-size:10px;letter-spacing:.4px;text-transform:uppercase;padding:8px 10px;text-align:left;white-space:nowrap}
table.vt td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top}
table.vt tr:last-child td{border-bottom:none}
table.vt tr:nth-child(odd) td{background:var(--row0)}
table.vt tr:nth-child(even) td{background:var(--row1)}
table.vt tr:hover td{background:rgba(26,171,138,.06)}
code{font-family:Consolas,'Courier New',monospace;font-size:11px;background:var(--code-bg);color:var(--teal);padding:1px 5px;border-radius:3px;border:1px solid var(--code-border)}

/* ── Code Blocks ─────────────────────────────────── */
.cb{background:var(--code-bg);border:1px solid var(--code-border);border-left:3px solid var(--teal);border-radius:0 6px 6px 0;padding:12px 14px;font-family:Consolas,'Courier New',monospace;font-size:12px;color:var(--code-text);line-height:1.75;white-space:pre;overflow-x:auto;margin:8px 0;position:relative;transition:background .2s}
.kw{color:var(--orange);font-weight:600}
.fn{color:var(--teal)}
.str{color:#5c9}
.cmt{color:var(--muted);font-style:italic}
.copy-btn{position:absolute;top:6px;right:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .15s}
.copy-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* ── Pills / Tags ────────────────────────────────── */
.pill{display:inline-flex;align-items:center;border-radius:4px;font-size:10px;font-weight:600;padding:2px 7px;margin:2px}
.p-t{background:var(--tag-bg);color:var(--tag-text)}
.p-o{background:rgba(232,131,10,.14);color:var(--orange)}
.p-b{background:rgba(26,83,200,.11);color:#3a7fd4}
.p-r{background:rgba(200,40,40,.11);color:#c04040}
.p-g{background:rgba(26,171,60,.1);color:#1aab3c}

/* ── Info Banner ─────────────────────────────────── */
.banner{background:var(--accent-bg);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--text);margin-bottom:14px;line-height:1.6}
.banner strong{color:var(--orange)}

/* ── Tabs ────────────────────────────────────────── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px;gap:2px;overflow-x:auto;flex-shrink:0}
.tab{padding:7px 14px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab:hover:not(.active){color:var(--text)}
.sp{display:none}.sp.active{display:block;animation:fadeIn .12s ease}

/* ── Accordions ──────────────────────────────────── */
.acc{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-bottom:8px}
.acc-h{padding:10px 14px;background:var(--row1);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:12px;color:var(--heading);user-select:none;transition:background .15s}
.acc-h:hover{background:var(--row0)}
.acc-arr{color:var(--orange);transition:transform .2s;font-size:14px}
.acc-b{padding:12px 14px;font-size:12px;color:var(--text);line-height:1.7;display:none;border-top:1px solid var(--border)}
.acc-b.open{display:block}

/* ── Step Flow ───────────────────────────────────── */
.flow{display:flex;flex-wrap:wrap;gap:0;margin:10px 0 14px}
.step{background:var(--row1);border:1px solid var(--border);flex:1;min-width:80px;padding:9px 10px;font-size:11px;position:relative;text-align:center;transition:background .15s}
.step:not(:last-child)::after{content:'›';position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--orange);font-size:16px;font-weight:700;z-index:1;pointer-events:none}
.step:first-child{border-radius:6px 0 0 6px}
.step:last-child{border-radius:0 6px 6px 0}
.step-n{display:block;font-size:15px;font-weight:700;color:var(--orange);line-height:1.2}
.step-l{display:block;color:var(--muted);font-size:10px;margin-top:2px}

/* ── VQL Demo ────────────────────────────────────── */
.vql-demo{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;transition:background .2s}
.vql-hdr{background:var(--navy);padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.vql-dots{display:flex;gap:5px}
.dot{width:10px;height:10px;border-radius:50%}
.vql-name{color:rgba(255,255,255,.5);font-size:11px;font-family:Consolas,monospace}
.run-btn{background:var(--orange);color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.run-btn:hover{background:var(--orange2);transform:scale(1.03)}
.run-btn.done{background:var(--teal)}
.vql-body{padding:12px 14px}
.vql-result{margin-top:10px;border-radius:6px;overflow:hidden;border:1px solid var(--border);display:none}
.vql-result.shown{display:block;animation:fadeIn .2s ease}

/* ── Artifact Cards ──────────────────────────────── */
.art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-top:8px}
.art-card{background:var(--row1);border:1px solid var(--border);border-radius:7px;padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
.art-card:hover{border-color:var(--teal);background:var(--row0)}
.art-name{font-size:11px;font-weight:600;color:var(--heading);margin-bottom:3px;word-break:break-all;font-family:Consolas,monospace}
.art-desc{font-size:10px;color:var(--muted);line-height:1.4;margin-bottom:5px}

/* ── Client List ─────────────────────────────────── */
.client-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:12px;transition:background .1s;cursor:default}
.client-row:last-child{border-bottom:none}
.client-row:hover{background:var(--row1)}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cdot.on{background:#22c55e}
.cdot.away{background:#f59e0b}
.cdot.off{background:#6b7399}
.c-name{font-weight:600;color:var(--heading);flex:1}
.c-meta{color:var(--muted);font-size:11px}

/* ── Typography helpers ──────────────────────────── */
.h2{font-size:14px;font-weight:600;color:var(--heading);margin:16px 0 8px}
.h3{font-size:12px;font-weight:600;color:var(--orange);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.4px}
.p{color:var(--text);font-size:12px;line-height:1.65;margin-bottom:8px}
ul.vl{padding-left:16px;color:var(--text);font-size:12px;line-height:1.85}
ul.vl li{margin-bottom:1px}
.sep{height:1px;background:var(--border);margin:14px 0}
.mono{font-family:Consolas,monospace;font-size:11px}

/* ── Search ──────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;background:var(--input);border:1px solid var(--input-border);border-radius:6px;font-size:12px;color:var(--text);font-family:inherit;transition:border-color .15s}
.search-wrap input:focus{outline:none;border-color:var(--teal)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}

/* ── Notebook mockup ─────────────────────────────── */
.nb-cell{background:var(--row1);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden}
.nb-cell-hdr{padding:5px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.nb-vql-hdr{background:rgba(26,171,138,.1);color:var(--teal);border-bottom:1px solid var(--border)}
.nb-md-hdr{background:rgba(232,131,10,.08);color:var(--orange);border-bottom:1px solid var(--border)}
.nb-cell-body{padding:10px 12px;font-size:12px;line-height:1.65}

/* ── Architecture boxes ──────────────────────────── */
.arch-box{flex:1;min-width:100px;border-radius:8px;padding:12px;text-align:center}
.arch-box .ab-t{font-weight:600;font-size:12px;margin-bottom:4px}
.arch-box .ab-s{font-size:10px;color:var(--muted);line-height:1.4}
.arch-arrow{display:flex;align-items:center;color:var(--orange);font-size:20px;padding:0 2px;flex-shrink:0}

/* ── Filter bar ──────────────────────────────────── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{background:var(--row1);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn:hover{border-color:var(--teal);color:var(--teal)}
.fbtn.active{background:rgba(26,171,138,.12);border-color:var(--teal);color:var(--teal)}
</style>
</head>
<body>
<div id="app">

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">VR</div>
    <div class="sb-logo-text">
      <div class="sb-logo-title">Velociraptor</div>
      <div class="sb-logo-sub">Digging Deeper</div>
    </div>
  </div>
  <div class="sb-nav" id="sbNav"></div>
  <div class="sb-bottom">
    <button class="theme-btn" id="themeBtn">☀ Light</button>
    <button class="collapse-btn" id="collapseBtn" title="Toggle sidebar">‹</button>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="tbTitle">Overview</div>
      <div class="topbar-sub" id="tbSub">Velociraptor DFIR Platform — Interactive Guide</div>
    </div>
    <div class="topbar-badges">
      <span class="badge badge-ok">v0.73.x</span>
      <span class="badge badge-info">Open Source</span>
      <span class="badge badge-orange">AGPL v3</span>
      <a href="https://github.com/Velocidex/velociraptor" target="_blank" style="text-decoration:none"><span class="badge badge-warn">★ GitHub</span></a>
    </div>
  </div>
  <div id="content"></div>
</div>
</div>

<script>
/* ── State ── */
let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let sidebarCollapsed = false;

/* ── Nav config ── */
const NAV = [
  {id:'overview',label:'Overview',icon:'◎',section:'Platform'},
  {id:'quickstart',label:'Quick Start',icon:'▶'},
  {id:'architecture',label:'Architecture',icon:'⬡'},
  {id:'vql',label:'VQL Language',icon:'⌗',section:'Core Concepts'},
  {id:'artifacts',label:'Artifacts',icon:'◈'},
  {id:'clients',label:'Client Management',icon:'◉',section:'Operations'},
  {id:'hunting',label:'Hunts & Hunting',icon:'◎'},
  {id:'forensics',label:'Forensic Analysis',icon:'⬟'},
  {id:'monitoring',label:'Live Monitoring',icon:'▣'},
  {id:'offline',label:'Offline Collectors',icon:'⬡'},
  {id:'notebooks',label:'Notebooks',icon:'▤'},
  {id:'api',label:'Server API',icon:'⇄'},
  {id:'reference',label:'Quick Reference',icon:'☰',section:'Reference'},
];

const TITLES = {overview:'Overview',quickstart:'Quick Start',architecture:'Architecture',vql:'VQL Language',artifacts:'Artifacts',clients:'Client Management',hunting:'Hunts & Hunting',forensics:'Forensic Analysis',monitoring:'Live Monitoring',offline:'Offline Collectors',notebooks:'Notebooks',api:'Server API & Automation',reference:'Quick Reference'};
const SUBS = {overview:'Platform capabilities, deployment modes, and key facts',quickstart:'Download, instant GUI, and first VQL query',architecture:'Components, security model, scaling, and data flow',vql:'Syntax, plugins, functions, accessors, and examples',artifacts:'YAML structure, types, catalog, and writing tips',clients:'Searching, labeling, collecting, and managing endpoints',hunting:'Fleet-wide artifact collection and IOC hunting workflow',forensics:'Filesystem, execution evidence, event logs, memory, dead disk',monitoring:'Real-time event streaming and automated server-side alerting',offline:'Air-gapped and standalone collection without a persistent agent',notebooks:'Interactive investigation environments built into the GUI',api:'gRPC API, pyvelociraptor, SOAR integration, and automation',reference:'CLI commands, artifact index, ACL roles, and external resources'};

/* ── Artifact catalog ── */
const ARTS = [
  {n:'Windows.System.Pslist',d:'Running processes with PID, PPID, command line',t:['windows','process'],c:'windows'},
  {n:'Windows.Network.Netstat',d:'Network connections and listening ports',t:['windows','network'],c:'windows'},
  {n:'Windows.Sys.StartupItems',d:'Persistence via startup registry keys',t:['windows','persistence'],c:'windows'},
  {n:'Windows.System.Services',d:'Installed Windows services',t:['windows','persistence'],c:'windows'},
  {n:'Windows.System.ScheduledTasks',d:'Scheduled task persistence',t:['windows','persistence'],c:'windows'},
  {n:'Windows.Forensics.Prefetch',d:'Application execution history (Prefetch files)',t:['windows','forensics'],c:'forensics'},

  <div class="h3">foreach — Iterate Over Rows</div>
  <div class="cb"><span class="cmt">-- For each suspicious process, list its network connections</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">foreach</span>(
  row={ <span class="kw">SELECT</span> Pid <span class="kw">FROM</span> suspicious },
  query={ <span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">netstat</span>() <span class="kw">WHERE</span> Pid = Pid }
)</div>

    <tr><td><code>smb</code></td><td>Remote SMB share access</td></tr>
  </table></div>
  <div class="cb"><span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="fn">glob</span>(

  accessor=<span class="str">"ntfs"</span>  <span class="cmt">-- bypass OS, see hidden and locked files</span>

</div>`;}

const PANES = {overview:paneOverview,quickstart:paneQuickstart,architecture:paneArchitecture,vql:paneVQL,artifacts:paneArtifacts,clients:paneClients,hunting:paneHunting,forensics:paneForensics,monitoring:paneMonitoring,offline:paneOffline,notebooks:paneNotebooks,api:paneAPI,reference:paneReference};

function goTo(id){
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
  document.getElementById('tbTitle').textContent = TITLES[id]||id;
  document.getElementById('tbSub').textContent = SUBS[id]||'';
  const c = document.getElementById('content');
  c.innerHTML = `<div class="pane active">${(PANES[id]||(() => '<p class="p">Coming soon.</p>'))()}</div>`;
  c.scrollTop = 0;
  // Bind tabs
  c.querySelectorAll('.tab-bar button.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      const bar = tab.closest('.tab-bar');
      bar.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.target;
      const pane = c.querySelector('.pane.active');
      pane.querySelectorAll('.sp').forEach(sp=>sp.classList.toggle('active',sp.id===target));
    });
  });
  if(id==='artifacts') setTimeout(renderArtGrid,0);
}

function renderArtGrid(cat='all'){
  const g = document.getElementById('artGrid');
  if(!g)return;
  const filtered = cat==='all' ? ARTS : ARTS.filter(a=>a.c===cat);
  g.innerHTML = filtered.map(a=>`
    <div class="art-card">
      <div class="art-name">${a.n}</div>
      <div class="art-desc">${a.d}</div>
      <div>${a.t.map(t=>`<span class="pill p-t">${t}</span>`).join('')}</div>
    </div>`).join('');
}

window.filterArts = function(cat,btn){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b===btn));
  renderArtGrid(cat);
};

window.runVQL = function(btn,id){
  const r = document.getElementById(id);
  if(r){r.classList.add('shown');btn.textContent='✓ Done';btn.classList.add('done');}
};

window.toggleAcc = function(h){
  const body = h.nextElementSibling;
  const arr = h.querySelector('.acc-arr');
  body.classList.toggle('open');
  if(arr) arr.style.transform = body.classList.contains('open') ? 'rotate(90deg)' : '';
};

/* ── Build sidebar ── */
function buildNav(){
  const sb = document.getElementById('sbNav');
  sb.innerHTML = NAV.map(item=>`
    ${item.section ? `<div class="sb-section">${item.section}</div>` : ''}
    <div class="sb-item${item.id==='overview'?' active':''}" data-id="${item.id}" onclick="goTo('${item.id}')">
      <span class="sb-icon">${item.icon}</span>
      <span class="sb-label">${item.label}</span>
    </div>`).join('');
}

/* ── Theme toggle ── */
function applyTheme(){
  document.documentElement.classList.toggle('dark',isDark);
  document.body.classList.toggle('dark',isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☽ Dark' : '☀ Light';
}

document.getElementById('themeBtn').onclick = ()=>{isDark=!isDark;applyTheme();};

/* ── Sidebar collapse ── */
document.getElementById('collapseBtn').onclick = ()=>{
  sidebarCollapsed=!sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed',sidebarCollapsed);
  document.getElementById('collapseBtn').textContent = sidebarCollapsed ? '›' : '‹';
};

/* ── Copy code blocks ── */
document.addEventListener('click',e=>{
  if(e.target.classList.contains('copy-btn')){
    const cb = e.target.closest('.cb');
    const text = cb ? cb.innerText.replace('Copy','').trim() : '';
    navigator.clipboard.writeText(text).then(()=>{
      e.target.textContent='✓';
      setTimeout(()=>e.target.textContent='Copy',1500);
    });
  }
});

/* ── Init ── */
applyTheme();
buildNav();
goTo('overview');
