<!-- TAB 1: Definitions & Theory -->
<div id="df1" class="sp active">
  <div class="banner-violet"><strong>Who is this for?</strong> If you are new to DFIR, start here. This section gives you the conceptual framework that makes everything else — the VQL queries, the artifacts, the hunts — actually meaningful. Syntax without context is useless. Context without syntax is powerless. You need both.</div>
  
  <div class="h2">What is Digital Forensics?</div>
  <div class="p">Digital forensics is the underlying methodology that gives examiners the ability to answer the <strong>who, what, why, when, where, and how</strong> questions in an investigation. It is a disciplined, repeatable, and defensible process — not just "running tools."</div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="ct ct-b">?</span> Event vs. Incident</div>
      <p class="p"><strong>An event</strong> is something that happened — planned or unplanned. A user logged in, a file was created, a process started. These happen thousands of times per day on every endpoint.</p>
      <p class="p"><strong>An incident</strong> is an event that was unauthorized, against security policy, or caused disruption. The key skill in DFIR is knowing what is <em>normal</em> so you can detect what is <em>abnormal</em>.</p>
      <p class="p" style="margin-bottom:0">Velociraptor is designed to help you enumerate the normal at scale so the abnormal stands out — through artifact collection, hunt results, and continuous monitoring.</p>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct ct-t">◈</span> Data vs. Metadata</div>
      <p class="p"><strong>Data</strong> is information in digital form that can be transmitted or processed. The content of a file, the bytes on disk.</p>
      <p class="p"><strong>Metadata</strong> is data about data. It comes in two forms:</p>
      <ul class="vl">
        <li><strong>Filesystem metadata</strong>: filename, size, Created/Modified/Accessed timestamps, owner — stored by the OS independently of the file's content</li>
        <li><strong>File metadata</strong>: embedded within the file itself — author, GPS coordinates, camera model, last-saved-by</li>
      </ul>
      <p class="p" style="margin-top:6px;margin-bottom:0">⚠️ A file's extension does NOT determine its type. The file's <strong>magic header</strong> (first bytes) does. Attackers routinely rename executables with benign extensions.</p>
    </div>
  </div>

  <div class="h2">Locard's Exchange Principle — Applied to Digital Forensics</div>
  <div class="banner-teal"><strong>The fundamental law of forensics:</strong> Anyone or anything entering a scene takes something with them and leaves something behind. This is just as true digitally as physically.</div>
  <div class="g2">
    <div class="card" style="border-left:3px solid var(--teal)">
      <div class="card-title">Physical Example</div>
      <p class="p">Walking across fresh snow leaves footprints behind and puts snow particles on your shoes. The scene is changed. The actor carries evidence away.</p>
    </div>
    <div class="card" style="border-left:3px solid var(--orange)">
      <div class="card-title">Digital Example</div>
      <p class="p">Opening a text file on Windows will produce evidence showing that Notepad ran, file access evidence showing which file was opened, when, where it resides, and which user account opened it — even if the user closes the file without saving anything.</p>
    </div>
  </div>
  <div class="banner-red"><strong>Anti-forensics also leaves traces.</strong> An attacker who deletes logs, wipes timestamps, or clears the Recycle Bin creates new evidence: the <em>absence</em> of data that should have existed. Event 1102 (audit log cleared), a gap in prefetch file timestamps, or missing MFT records are all artifacts of attempted cover-up.</div>

  <div class="h2">Hashing — The Foundation of Evidence Integrity</div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="ct ct-b">⊕</span> What Hashing Is</div>
      <p class="p">A one-way mathematical function that takes input data of any size and produces a fixed-length output (the hash). The same input always produces the same hash. A single changed bit produces a completely different hash.</p>
      <div class="tbl-wrap"><table class="vt">
        <tr><th>Algorithm</th><th>Output</th><th>DFIR Use</th></tr>
        <tr><td>MD5</td><td>128-bit / 32 hex chars</td><td>Quick integrity check, legacy</td></tr>
        <tr><td>SHA1</td><td>160-bit / 40 hex chars</td><td>Amcache records SHA1 of executables</td></tr>
        <tr><td>SHA256</td><td>256-bit / 64 hex chars</td><td>Gold standard for evidence integrity</td></tr>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct ct-o">★</span> In Velociraptor</div>
      <p class="p">Velociraptor can compute hashes on-the-fly during collection without transferring the full file:</p>
      <div class="cb" style="margin:0;font-size:11px"><span class="kw">SELECT</span> FullPath,
       hash(path=FullPath).MD5 <span class="kw">AS</span> MD5,
       hash(path=FullPath).SHA256 <span class="kw">AS</span> SHA256
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=<span class="str">"C:/Temp/*.exe"</span>)</div>
      <p class="p" style="margin-top:6px;margin-bottom:0">The hash becomes your evidence tag — submit it to VirusTotal, compare against known-good baselines, or use it to prove a file was not altered.</p>
    </div>
  </div>

  <div class="h2">Order of Volatility — Collect the Most Perishable Evidence First</div>
  <div class="p">Digital evidence disappears at different rates. RAM is lost the moment power is cut. Backups may exist for years. Collect in this order:</div>
  <div class="flow">
    <div class="step"><span class="step-n">1</span><span class="step-l">CPU Registers/Cache</span></div>
    <div class="step"><span class="step-n">2</span><span class="step-l">RAM / Memory</span></div>
    <div class="step"><span class="step-n">3</span><span class="step-l">Router / ARP Tables</span></div>
    <div class="step"><span class="step-n">4</span><span class="step-l">Temp Filesystems</span></div>
    <div class="step"><span class="step-n">5</span><span class="step-l">Disk / NTFS</span></div>
    <div class="step"><span class="step-n">6</span><span class="step-l">Remote / Cloud Logs</span></div>
    <div class="step"><span class="step-n">7</span><span class="step-l">Network Topology</span></div>
    <div class="step"><span class="step-n">8</span><span class="step-l">Offsite Backups</span></div>
  </div>
  <div class="banner-teal"><strong>Velociraptor can acquire all levels 2–6 live across thousands of endpoints simultaneously.</strong> For level 1 (RAM), Velociraptor integrates with WinPmem. For level 5 (disk), the NTFS accessor bypasses the OS to read raw structures. For level 6, cloud provider artifacts are supported through dedicated artifact collections.</div>
</div>

<!-- TAB 2: Digital Evidence -->
<div id="df2" class="sp">
  <div class="h2">Sources of Digital Evidence</div>
  <div class="p">Evidence exists across many device types. Understanding where data lives — and how Velociraptor reaches it — is foundational to any investigation.</div>
  
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Device Type</th><th>Key Evidence</th><th>Velociraptor Access</th></tr>
    <tr><td><strong>Windows Desktop/Laptop</strong></td><td>NTFS artifacts, registry, event logs, prefetch, browser history, memory</td><td><span class="badge badge-ok">Full live + dead-disk</span></td></tr>
    <tr><td><strong>Windows Server</strong></td><td>Domain controller logs, IIS/web logs, AD database (NTDS.dit), service logs</td><td><span class="badge badge-ok">Full live + dead-disk</span></td></tr>
    <tr><td><strong>Linux Server</strong></td><td>Syslog, auth.log, bash history, cron, /proc filesystem</td><td><span class="badge badge-ok">Full live</span></td></tr>
    <tr><td><strong>Virtual Machines</strong></td><td>Same as physical — plus snapshots may contain deleted data</td><td><span class="badge badge-ok">Offline image support</span></td></tr>
    <tr><td><strong>RAM (Live System)</strong></td><td>Running processes, network connections, encryption keys, injected code</td><td><span class="badge badge-warn">Via WinPmem integration</span></td></tr>
    <tr><td><strong>Network Devices</strong></td><td>Firewall/proxy logs, DHCP assignments, NetFlow records</td><td><span class="badge badge-info">Log collection artifacts</span></td></tr>
    <tr><td><strong>Cloud (Azure/AWS/GCP)</strong></td><td>Audit logs, sign-in logs, storage access, VM disk images</td><td><span class="badge badge-info">Cloud-specific artifacts</span></td></tr>
    <tr><td><strong>Mobile / iOS / Android</strong></td><td>Call records, messages, location, installed apps</td><td><span class="badge badge-warn">Requires specialist tools (Cellebrite)</span></td></tr>
  </table></div>

  <div class="h2">File Deletion — What Actually Happens</div>
  <div class="banner"><strong>Deleting a file does NOT destroy the data.</strong> Understanding this is critical to both recovering evidence and understanding why attackers who just delete files often fail to cover their tracks.</div>
  <div class="g3">
    <div class="card" style="border-top:3px solid var(--ok)">
      <div class="card-title" style="font-size:11px">Stage 1: File "Deleted"</div>
      <p class="p" style="font-size:11px">The filesystem metadata is marked as available for reuse. The clusters are marked as unallocated. The actual bytes are NOT overwritten. The full file including its original name and timestamps can typically be recovered.</p>
    </div>
    <div class="card" style="border-top:3px solid var(--warn)">
      <div class="card-title" style="font-size:11px">Stage 2: Metadata Overwritten</div>
      <p class="p" style="font-size:11px">The filesystem record for the file is reused for a new file. The content may still exist. The file can potentially be recovered via <strong>file carving</strong>, but the original name, path, and timestamps are lost.</p>
    </div>
    <div class="card" style="border-top:3px solid #c04040">
      <div class="card-title" style="font-size:11px">Stage 3: Content Overwritten</div>
      <p class="p" style="font-size:11px">The actual data bytes are overwritten by new data. Content recovery is now impossible. However, the old filesystem metadata record may still exist, proving the file once existed with its timestamps.</p>
    </div>
  </div>
  <div class="banner-teal"><strong>Velociraptor's NTFS accessor and <code>parse_mft()</code> plugin</strong> can see all three stages — it reads the raw MFT directly, bypassing the OS, and can enumerate deleted files that the operating system pretends no longer exist.</div>

  <div class="h2">Server Evidence by Type</div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Server Type</th><th>Key Evidence Produced</th><th>Key Velociraptor Artifact</th></tr>
    <tr><td>Domain Controller</td><td>User logon/logoff events, AD authentication, group membership changes</td><td>Windows.EventLogs.EvtxHunter (IDs 4624, 4625, 4720, 4732)</td></tr>
    <tr><td>Web Server (IIS)</td><td>HTTP access logs including source IPs, URIs, user-agents, upload detection</td><td>Windows.IIS.Access</td></tr>
    <tr><td>Proxy Server</td><td>URLs visited, destination IPs, bytes transferred, user context</td><td>Log collection artifacts</td></tr>
    <tr><td>DHCP Server</td><td>IP-to-MAC-to-hostname assignments with timestamps — critical for attribution</td><td>Windows.EventLogs.EvtxHunter</td></tr>
    <tr><td>Firewall</td><td>Allowed/denied connection attempts, lateral movement paths</td><td>Log collection artifacts + netstat</td></tr>
    <tr><td>Mail Server</td><td>Email metadata — sender, recipient, subject, headers (phishing investigation)</td><td>Windows.Applications.Exchange</td></tr>
  </table></div>
</div>

<!-- TAB 3: Key Principles -->
<div id="df3" class="sp">
  <div class="h2">The ACPO Principles — Foundation of Defensible DFIR</div>
  <div class="p">Originally developed by the Association of Chief Police Officers (UK), these four principles have been adopted globally as the foundational framework for defensible digital forensics — in both law enforcement and corporate IR.</div>
  
  <div class="card" style="border-left:4px solid #c04040;margin-bottom:10px">
    <div class="card-title" style="color:#c04040">Principle 1 — Do No Harm to the Evidence</div>
    <p class="p" style="margin-bottom:0">No action taken should change data that may subsequently be relied upon in a legal, regulatory, or disciplinary proceeding. Every tool you run, every file you open, every command you execute on a live system potentially modifies evidence. <strong>In Velociraptor:</strong> queries read data without modifying it. The NTFS accessor bypasses OS caching. Collections are timestamped and logged automatically.</p>
  </div>
  <div class="card" style="border-left:4px solid var(--warn);margin-bottom:10px">
    <div class="card-title" style="color:var(--warn)">Principle 2 — Competence and Transparency</div>
    <p class="p" style="margin-bottom:0">If original evidence must be accessed, the examiner must be competent to do so and must be able to explain the relevance and implications of their actions. <strong>In Velociraptor:</strong> VQL artifacts are readable, self-documenting queries that can be audited by anyone. Every collection is logged in the server audit trail.</p>
  </div>
  <div class="card" style="border-left:4px solid var(--orange);margin-bottom:10px">
    <div class="card-title" style="color:var(--orange)">Principle 3 — Reproducibility</div>
    <p class="p" style="margin-bottom:0">An audit trail of all processes applied to digital evidence must be created and preserved. An independent third party should be able to examine those processes and achieve the same result. <strong>In Velociraptor:</strong> artifacts are versioned YAML. Every hunt, collection, and result is stored with its full VQL source, parameters, and execution time.</p>
  </div>
  <div class="card" style="border-left:4px solid var(--teal);margin-bottom:10px">
    <div class="card-title" style="color:var(--teal)">Principle 4 — Overall Accountability</div>
    <p class="p" style="margin-bottom:0">The lead investigator has overall responsibility for ensuring legal and principled conduct. <strong>In Velociraptor:</strong> role-based access control (administrator, investigator, analyst, reader) enforces clear lines of authority. Every GUI action is logged with the user account that performed it.</p>
  </div>

  <div class="h2">Chain of Custody — Why It Matters</div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="ct ct-b">⛓</span> What It Is</div>
      <p class="p">A document that tracks the movement of evidence from collection through analysis through presentation. It records every person who handled the evidence, with relevant dates, times, and purpose of any transfer.</p>
      <p class="p" style="margin-bottom:0">Without a documented chain of custody, evidence can be challenged — even if it's authentic. Opposing counsel only needs to create doubt.</p>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct ct-t">◉</span> In Velociraptor</div>
      <ul class="vl">
        <li>Every collection is automatically timestamped and attributed to the user account that triggered it</li>
        <li>Hunt results include client ID, collection time, artifact version, and VQL used</li>
        <li>Offline collector ZIPs include a manifest with collection metadata</li>
        <li>Server audit log provides a complete record of all user actions</li>
        <li>Notebook exports include the full investigation history with timestamps</li>
      </ul>
    </div>
  </div>

  <div class="h2">Write Blocking — Physical vs. Software</div>
  <div class="banner"><strong>Write blockers</strong> prevent any writes to the evidence drive, ensuring the original evidence is not modified during acquisition. This is critical for legal defensibility.</div>
  <div class="g2">
    <div class="card" style="border-top:3px solid var(--ok)">
      <div class="card-title">Hardware Write Blockers</div>
      <p class="p">Physical devices that sit between the evidence drive and the acquisition workstation. Examples: WiebeTech, Tableau. Validate before use — test with a known-write block test tool.</p>
    </div>
    <div class="card" style="border-top:3px solid var(--orange)">
      <div class="card-title">Velociraptor's Approach</div>
      <p class="p">For live endpoint analysis, Velociraptor uses the NTFS accessor to open raw device handles in read-only mode — equivalent to software write-blocking. The <code>accessor="ntfs"</code> parameter reads directly from the disk without writing or modifying.</p>
    </div>
  </div>
</div>

<!-- TAB 4: DFIR Roles -->
<div id="df4" class="sp">
  <div class="p">Understanding the different roles in DFIR helps you know where you sit, what skills to develop, and who to involve in an incident. These roles often overlap in smaller teams — a single analyst may fill multiple roles.</div>
  <div class="g2">
    <div class="card" style="border-top:3px solid var(--ok)">
      <div class="card-title">SOC Analyst</div>
      <p class="p"><strong>Core mission:</strong> Monitor events and detect incidents. First to see alerts fire.</p>
      <p class="p"><strong>Key skills:</strong> Network architecture, data sources, system logging, network defense, endpoint and network monitoring.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Receives alert from SIEM, triggers targeted collection using Velociraptor to gather triage data on the alerted host within minutes.</p>
    </div>
    <div class="card" style="border-top:3px solid var(--warn)">
      <div class="card-title">First Responder</div>
      <p class="p"><strong>Core mission:</strong> Preserve evidence, acquire data, conduct initial triage. Often on-site or remote-accessing the compromised host.</p>
      <p class="p"><strong>Key skills:</strong> Data acquisition, evidence preservation, digital forensic analysis, chain of custody.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Launches triage collection (processes, network connections, autorun, event logs) on the host in under 2 minutes. Uses offline collectors for isolated environments.</p>
    </div>
    <div class="card" style="border-top:3px solid var(--orange)">
      <div class="card-title">Forensic Investigator / Analyst</div>
      <p class="p"><strong>Core mission:</strong> Skilled deep analysis of collected evidence to identify what happened, reconstruct attacker actions, and provide factual observations.</p>
      <p class="p"><strong>Key skills:</strong> NTFS forensics, memory analysis, timeline analysis, reverse engineering, subject-matter expertise.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Runs targeted artifact collections, hunts across the fleet for lateral movement indicators, conducts dead-disk analysis on seized images.</p>
    </div>
    <div class="card" style="border-top:3px solid var(--teal)">
      <div class="card-title">Threat Hunter</div>
      <p class="p"><strong>Core mission:</strong> Proactively search for attacker presence before an alert fires. Assumes breach and looks for evidence of it.</p>
      <p class="p"><strong>Key skills:</strong> Attack framework knowledge (MITRE ATT&CK), anomaly detection, hypothesis-driven investigation.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Primary platform. Hunts with YARA rules, custom VQL, Sigma detection, and behavioral artifacts across thousands of endpoints simultaneously.</p>
    </div>
    <div class="card" style="border-top:3px solid #4a8fff">
      <div class="card-title">Incident Manager</div>
      <p class="p"><strong>Core mission:</strong> Ensure resources, tools, and support are in place. Acts as buffer between the IR team and stakeholders. Monitors team health and calls in specialists.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Reviews hunt summaries and Notebook reports for executive briefings. Tracks investigation scope through the hunt manager dashboard.</p>
    </div>
    <div class="card" style="border-top:3px solid #7c3aed">
      <div class="card-title">DFIR Engineer / Tool Developer</div>
      <p class="p"><strong>Core mission:</strong> Build and maintain the infrastructure and tooling that the team relies on. Write custom artifacts, integrations, and automation.</p>
      <p class="p" style="margin-bottom:0"><strong>Velociraptor use:</strong> Authors VQL artifacts, deploys and maintains the Velociraptor server infrastructure, integrates with SIEM via the API, builds SOAR playbooks.</p>
    </div>
  </div>
</div>

<!-- TAB 5: Normal vs Evil -->
<div id="df5" class="sp">
  <div class="banner-red"><strong>The first rule of threat hunting: know what normal looks like, so evil stands out.</strong> This is the SANS "Hunt Evil" poster methodology — every legitimate Windows process has expected attributes. Deviations are your leads.</div>
  
  <div class="h2">Normal Windows Process Hierarchy</div>
  <div class="p">On a healthy Windows system, the process tree is predictable. Memorize the expected parents, paths, and instance counts. Anything that deviates is worth investigating.</div>
  
  <div class="proc-tree">System (PID 4) — Kernel, no image path, parent: none
├── smss.exe — Session Manager, C:\Windows\System32\smss.exe
│   └── <span class="proc-ok">[exits after creating sessions]</span>
├── csrss.exe (Session 0) — Win32 subsystem, orphaned (parent smss exits)
├── csrss.exe (Session 1+) — one per interactive session
├── wininit.exe — orphaned (parent smss exits)
│   ├── services.exe — Service Control Manager (ONE instance)
│   │   └── svchost.exe — service host (many instances, all from services.exe)
│   ├── lsass.exe — credential store (ONE instance, from wininit.exe)
│   └── lsaiso.exe — Credential Guard (if enabled)
└── winlogon.exe — handles interactive logons, orphaned
    ├── dwm.exe — Desktop Window Manager
    ├── fontdrvhost.exe — font driver
    └── <span class="proc-ok">userinit.exe → explorer.exe</span> (then userinit exits)
        └── explorer.exe — user shell</div>

  <div class="h2">Red Flags in the Process Tree</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Process</th><th>Expected</th><th>🚨 Suspicious</th></tr>
    <tr><td><code>lsass.exe</code></td><td>One instance, parent is wininit.exe, path C:\Windows\System32\lsass.exe, runs as SYSTEM</td><td>Multiple instances, wrong parent, wrong path (e.g. C:\Temp\lsass.exe), unexpected child processes</td></tr>
    <tr><td><code>svchost.exe</code></td><td>Many instances, ALL parent is services.exe, path C:\Windows\System32\svchost.exe</td><td>Parent is explorer.exe, cmd.exe, or unusual process; running from Temp or AppData</td></tr>
    <tr><td><code>services.exe</code></td><td>One instance, parent is wininit.exe, SYSTEM account</td><td>Multiple instances, wrong parent, non-SYSTEM account</td></tr>
    <tr><td><code>powershell.exe</code></td><td>Spawned by user or legitimate automation; interactive use expected</td><td>Parent is Word, Excel, or a web browser; encoded command (-enc); downloadstring pattern; running from Temp</td></tr>
    <tr><td><code>cmd.exe</code></td><td>User shells, scripts, legitimate automation</td><td>Child of IIS worker (w3wp.exe), Outlook, or other unexpected parent; %COMSPEC% abuse patterns</td></tr>
    <tr><td><code>explorer.exe</code></td><td>One per interactive user session</td><td>Multiple instances for same user, wrong path, spawning unusual children</td></tr>
  </table></div>

  <div class="h2">Hunt for This in Velociraptor</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Find svchost.exe NOT parented by services.exe (process injection indicator)</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'dfev1')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">LET</span> proc = <span class="kw">SELECT</span> Pid, Ppid, Name, Exe, CommandLine, Username
  <span class="kw">FROM</span> <span class="fn">pslist</span>()

<span class="kw">SELECT</span> p.Pid, p.Name, p.Exe, p.Username,
       parent.Name <span class="kw">AS</span> ParentName, parent.Exe <span class="kw">AS</span> ParentExe
<span class="kw">FROM</span> proc p
<span class="kw">JOIN</span> proc parent <span class="kw">ON</span> p.Ppid = parent.Pid
<span class="kw">WHERE</span> p.Name =~ <span class="str">"svchost.exe"</span>
  <span class="kw">AND</span> parent.Name !~ <span class="str">"services.exe"</span></div>
      <div class="vql-result" id="dfev1">
        <table class="vt">
          <tr><th>Pid</th><th>Name</th><th>Exe</th><th>Username</th><th>ParentName</th><th>ParentExe</th></tr>
          <tr><td style="color:var(--ok)">880</td><td>svchost.exe</td><td>C:\Windows\System32\svchost.exe</td><td>SYSTEM</td><td style="color:var(--ok)">services.exe</td><td>C:\Windows\System32\services.exe</td></tr>
          <tr><td style="color:#c04040"><strong>6421</strong></td><td style="color:#c04040"><strong>svchost.exe</strong></td><td style="color:#c04040"><strong>C:\Temp\svchost.exe</strong></td><td>jsmith</td><td style="color:#c04040"><strong>explorer.exe</strong></td><td>C:\Windows\explorer.exe</td></tr>
        </table>
      </div>
    </div>
  </div>

  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Office apps spawning PowerShell (phishing/maldoc indicator)</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'dfev2')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">LET</span> procs = <span class="kw">SELECT</span> Pid, Ppid, Name, CommandLine <span class="kw">FROM</span> <span class="fn">pslist</span>()

<span class="kw">SELECT</span> child.Pid, child.Name, child.CommandLine,
       parent.Name <span class="kw">AS</span> Parent
<span class="kw">FROM</span> procs child
<span class="kw">JOIN</span> procs parent <span class="kw">ON</span> child.Ppid = parent.Pid
<span class="kw">WHERE</span> child.Name <span class="kw">=~</span> <span class="str">"powershell|cmd|wscript|mshta|certutil"</span>
  <span class="kw">AND</span> parent.Name <span class="kw">=~</span> <span class="str">"winword|excel|powerpnt|outlook|msedge"</span></div>
      <div class="vql-result" id="dfev2">
        <table class="vt">
          <tr><th>Pid</th><th>Name</th><th>CommandLine</th><th>Parent</th></tr>
          <tr><td style="color:#c04040"><strong>9821</strong></td><td style="color:#c04040"><strong>powershell.exe</strong></td><td style="color:#c04040"><strong>powershell -enc JABjAD0ATgBlAHc...</strong></td><td style="color:#c04040"><strong>WINWORD.EXE</strong></td></tr>
        </table>
      </div>
    </div>
  </div>
</div>
`;}

/* ══ WINDOWS TELEMETRY ══════════════════════════════════════ */
function paneTelemetry(){return`
<div id="tel-tabs" class="tab-bar">
  <button class="tab active" data-target="tt1">Execution Evidence</button>
  <button class="tab" data-target="tt2">Persistence Artifacts</button>
  <button class="tab" data-target="tt3">Lateral Movement</button>
  <button class="tab" data-target="tt4">Anti-Forensics</button>
</div>

<!-- TAB 1: Execution Evidence -->
<div id="tt1" class="sp active">
  <div class="banner-violet"><strong>Execution artifacts answer the hardest question:</strong> "Did this malware actually run on this machine?" Each artifact below provides independent, corroborating evidence of execution — attackers rarely think to clean all of them.</div>

  <div class="telemetry-card">
    <div class="telemetry-name">Windows.Forensics.Prefetch → C:\Windows\Prefetch\*.pf</div>
    <div class="telemetry-what">What it is: Windows pre-loads code pages of frequently used applications to speed up launching. It monitors every file and directory referenced by each application and records this in a .pf file.</div>
    <div class="telemetry-why">Forensic value: <strong>Proves an executable ran at a specific time.</strong> Each .pf file records the first and last execution time, last 8 execution times (Win8+), total run count, and all files/directories the application accessed. This includes DLLs loaded, config files read, and staging directories accessed — often revealing the attacker's working directory.</div>
    <div class="telemetry-find">🔍 Hunt for: Prefetch files with suspicious names (mimikatz, cobalt, psexec, procdump) or with creation times that align with your incident timeline. Prefetch is disabled on Windows Server by default — its presence may indicate it was manually enabled or a server was used as a workstation.</div>
  </div>

  <div class="telemetry-card">
    <div class="telemetry-name">Windows.Forensics.Amcache → C:\Windows\AppCompat\Programs\Amcache.hve</div>
    <div class="telemetry-what">What it is: A registry hive that tracks installed applications, programs executed or present on disk, drivers loaded, and device information. Available Win7+.</div>
    <div class="telemetry-why">Forensic value: <strong>Records the SHA1 hash of every executable it tracks</strong> — unique among execution artifacts. This allows you to submit hashes to VirusTotal without transferring the actual binary. Also records the first time an executable was seen/run, which survives even after the binary is deleted.</div>
    <div class="telemetry-find">🔍 Hunt for: SHA1 hashes that match known malware. Executables that appeared on-disk for a brief window and were then deleted. Programs running from unusual paths (Temp, AppData, Recycle Bin).</div>
  </div>

  <div class="telemetry-card">
    <div class="telemetry-name">Windows.Forensics.ShimCache → SYSTEM Hive → AppCompatCache</div>
    <div class="telemetry-what">What it is: The Windows Application Compatibility Database tracks executables for potential compatibility challenges. Records the file path and last-modified time of executables. Present even on Server editions.</div>
    <div class="telemetry-why">Forensic value: <strong>Survives when other execution artifacts are missing.</strong> Particularly useful on Windows Servers where Prefetch is disabled. Presence in ShimCache indicates the file existed on disk. Note: on post-XP systems, the existence of an entry does NOT conclusively prove execution — it may be preemptively added by scanning. Use in conjunction with other artifacts.</div>
    <div class="telemetry-find">🔍 Hunt for: Executables in ShimCache that don't exist on disk anymore (deleted after execution). Files running from anomalous paths. Entries with timestamps that align with the incident window.</div>
  </div>

  <div class="telemetry-card">
    <div class="telemetry-name">Windows.Forensics.SRUM → C:\Windows\System32\SRU\SRUDB.dat</div>
    <div class="telemetry-what">What it is: System Resource Usage Monitor records 30–60 days of historical system performance including applications run, user account responsible, network connections made, and bytes sent/received per application per hour. Win8+.</div>
    <div class="telemetry-why">Forensic value: <strong>Historical timeline spanning weeks, not hours.</strong> Unlike most artifacts, SRUM's data extends back 30–60 days. Network data usage table shows exactly which process sent data to which external IP — this can expose data exfiltration events that occurred before the incident was detected. Survives malware deletion of the binary because the record already exists in the ESE database.</div>
    <div class="telemetry-find">🔍 Hunt for: Processes that transferred large amounts of data to external IPs during off-hours. Application Resource Usage entries for tools that should never run (PsExec, Mimikatz). Accounts running processes they should not own.</div>
  </div>

  <div class="telemetry-card">
    <div class="telemetry-name">Windows.Forensics.Bam → SYSTEM Hive → Services\bam\UserSettings\{SID}</div>
    <div class="telemetry-what">What it is: Background Activity Monitor (BAM) is maintained by the Windows power management subsystem. Available Win10+. Records the last execution time of executables per user SID.</div>
    <div class="telemetry-why">Forensic value: <strong>Last execution time per user, per executable</strong> — typically holds up to one week of data. Critically, it records full path of the executable, making it easy to spot malware running from anomalous locations. Harder for attackers to clear than event logs.</div>
    <div class="telemetry-find">🔍 Hunt for: Tools associated with ransomware or post-exploitation (vssadmin, bcdedit, wbadmin, net use) with execution timestamps that align with the incident. Executables running from user-writable directories.</div>
  </div>

  <div class="h3">Using Velociraptor to Corroborate Execution</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Cross-reference Prefetch + Amcache for a suspicious executable name</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'tel1')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="cmt">-- Step 1: Check Prefetch for execution evidence</span>
<span class="kw">SELECT</span> Name, LastRunTime, RunCount, Hash
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Prefetch</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"mimikatz|mimi|sekurlsa|lsadump"</span>

<span class="cmt">-- Step 2: Check Amcache for the same binary (gets SHA1 hash)</span>
<span class="kw">SELECT</span> Name, SHA1, FileSize, FileDescription, ProductName, LinkDate
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.Forensics.Amcache</span>()
<span class="kw">WHERE</span> Name <span class="kw">=~</span> <span class="str">"mimikatz"</span></div>
      <div class="vql-result" id="tel1">
        <table class="vt">
          <tr><th colspan="4" style="background:#1a1d2e;color:#c04040">⚠ PREFETCH — Execution Confirmed</th></tr>
          <tr><th>Name</th><th>LastRunTime</th><th>RunCount</th><th>Hash</th></tr>
          <tr><td style="color:#c04040"><strong>MIMIKATZ.EXE-B7A13E13.pf</strong></td><td style="color:#c04040">2025-03-24 09:44:11</td><td>3</td><td>B7A13E13</td></tr>
          <tr><th colspan="4" style="background:#1a1d2e;color:#c04040;margin-top:4px">⚠ AMCACHE — SHA1 for VirusTotal</th></tr>
          <tr><th>Name</th><th>SHA1</th><th>FileSize</th><th>LinkDate</th></tr>
          <tr><td style="color:#c04040"><strong>mimikatz.exe</strong></td><td style="color:#c04040">e18adf5da01f4...</td><td>1,250,304</td><td>2024-10-14</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2: Persistence Artifacts -->
<div id="tt2" class="sp">
  <div class="banner"><strong>Persistence = attacker foothold.</strong> Attackers establish persistence so they survive reboots and retain access even if the initial breach vector is patched. Every persistence mechanism leaves traces Velociraptor can find.</div>
  
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Mechanism</th><th>Location</th><th>Velociraptor Artifact</th><th>What to Hunt For</th></tr>
    <tr><td>Registry Run Keys</td><td>HKLM/HKCU\Software\Microsoft\Windows\CurrentVersion\Run</td><td>Windows.Sys.StartupItems</td><td>Executables in Temp, AppData, or with encoded commands</td></tr>
    <tr><td>Scheduled Tasks</td><td>C:\Windows\System32\Tasks\ + Event ID 4698</td><td>Windows.System.ScheduledTasks</td><td>Tasks with no author, Base64 PowerShell, or triggers at unusual times</td></tr>
    <tr><td>Windows Services</td><td>HKLM\SYSTEM\CurrentControlSet\Services + Event ID 7045</td><td>Windows.System.Services</td><td>Services with random names, running from user-writable paths, signed by unknown publishers</td></tr>
    <tr><td>Startup Folders</td><td>%APPDATA%\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</td><td>Windows.Sys.StartupItems</td><td>Any unexpected .exe, .vbs, .ps1, or .lnk file</td></tr>
    <tr><td>WMI Event Subscriptions</td><td>WMI namespace: root\subscription</td><td>Windows.Persistence.PermanentWMIEvents</td><td>EventConsumer + EventFilter + FilterToConsumerBinding = full WMI backdoor</td></tr>
    <tr><td>DLL Hijacking</td><td>Application directory — DLL before system32 in search order</td><td>Custom glob + hash verification</td><td>DLLs in application directories that don't match Microsoft signatures</td></tr>
    <tr><td>Boot/Pre-OS (Bootkit)</td><td>MBR, VBR, UEFI</td><td>Advanced — requires raw disk access</td><td>MBR that doesn't match known-good hash</td></tr>
  </table></div>

  <div class="h3">Ransomware Persistence Patterns</div>
  <div class="banner-red"><strong>Ransomware actors rarely use exotic persistence.</strong> They rely on the most reliable, least-detected methods: scheduled tasks with encoded commands, services, and registry run keys. Hunt these aggressively at the start of any ransomware investigation.</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Hunt for suspicious scheduled tasks with Base64 or download commands</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'tel2')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> Name, Command, Arguments, State, TriggersDisplay, Author, CreationDate
<span class="kw">FROM</span> <span class="fn">Artifact.Windows.System.ScheduledTasks</span>()
<span class="kw">WHERE</span> Command <span class="kw">=~</span> <span class="str">"powershell|cmd|wscript|mshta"</span>
  <span class="kw">AND</span> (Arguments <span class="kw">=~</span> <span class="str">"-enc|-encoded|downloadstring|iex|bypass|hidden"</span>
    <span class="kw">OR</span> Author = <span class="str">""</span>)</div>
      <div class="vql-result" id="tel2">
        <table class="vt">
          <tr><th>Name</th><th>Command</th><th>Arguments</th><th>Author</th></tr>
          <tr><td style="color:#c04040"><strong>WindowsUpdate_svc</strong></td><td>powershell.exe</td><td style="color:#c04040">-enc JABjAD0ATgBlAHcALQBPAGIAagBlAGMAdAA...</td><td style="color:#c04040">(blank)</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- TAB 3: Lateral Movement -->
<div id="tt3" class="sp">
  <div class="banner-red"><strong>Lateral movement is an inescapable requirement for attackers.</strong> Every adversary — even the most skilled — must move between systems to accomplish their objectives. Understanding the artifacts it leaves is critical to scoping an incident.</div>
  
  <div class="h3">Common Lateral Movement Methods + Evidence</div>
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Technique</th><th>Common Tools</th><th>Evidence Left</th><th>Key Event IDs</th></tr>
    <tr><td><strong>Remote Desktop (RDP)</strong></td><td>mstsc.exe, native RDP</td><td>Event 4624 (Type 10), 4778/4779, RDP cache bitmaps at %LOCALAPPDATA%\Microsoft\Terminal Server Client\Cache\</td><td>4624, 4625, 4778, 4779, 5156</td></tr>
    <tr><td><strong>SMB / PsExec</strong></td><td>PsExec, Impacket smbexec</td><td>PSEXESVC.exe created on target, Event 7045 (service install), Event 4624 (Type 3), PsExec key file in C:\Windows\</td><td>4624, 7045, 5140</td></tr>
    <tr><td><strong>WMI</strong></td><td>wmic.exe, Impacket wmiexec</td><td>WMI provider host (WmiPrvSE.exe) spawning unusual children, Event 4624 (Type 3)</td><td>4624, 4688</td></tr>
    <tr><td><strong>WinRM / WinRS</strong></td><td>Enter-PSSession, winrs.exe, Evil-WinRM</td><td>wsmprovhost.exe as parent of attacker commands, PowerShell remoting logs</td><td>4624 (Type 3), 4688</td></tr>
    <tr><td><strong>Pass-the-Hash</strong></td><td>Mimikatz, Impacket</td><td>Event 4624 (Type 3) with no corresponding 4648; NTLMv2 authentication without prior credential entry</td><td>4624, 4776</td></tr>
    <tr><td><strong>Pass-the-Ticket</strong></td><td>Mimikatz, Rubeus</td><td>Kerberos TGT/TGS requests from unusual source IP, Event 4768/4769 with anomalous encryption type</td><td>4768, 4769</td></tr>
  </table></div>

  <div class="h3">LSASS Credential Dumping — The Gateway to Lateral Movement</div>
  <div class="g2">
    <div class="card">
      <div class="card-title"><span class="ct ct-r">!</span> What LSASS Is</div>
      <p class="p">LSASS (Local Security Authority Subsystem Service) authenticates all users on the system and stores credentials in its virtual memory pages — including NTLM hashes and, if WDigest is enabled, cleartext passwords.</p>
      <p class="p" style="margin-bottom:0">Attackers dump LSASS memory to extract these credentials and then use them for lateral movement without needing to know any cleartext passwords.</p>
    </div>
    <div class="card">
      <div class="card-title"><span class="ct ct-o">⚒</span> Common Dump Tools</div>
      <ul class="vl">
        <li>Windows Task Manager (creates lsass.DMP)</li>
        <li>ProcDump: <code>procdump -ma lsass.exe</code></li>
        <li>Comsvcs.dll: <code>rundll32 comsvcs.dll MiniDump [PID] lsass.dmp full</code></li>
        <li>Mimikatz: <code>sekurlsa::logonpasswords</code></li>
        <li>Process Hacker, Process Explorer (GUI tools)</li>
      </ul>
    </div>
  </div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Hunt for LSASS dump files and rundll32/comsvcs abuse</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'tel3')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="cmt">-- Find lsass dump files anywhere on disk</span>
<span class="kw">SELECT</span> FullPath, Size, Mtime, Atime
<span class="kw">FROM</span> <span class="fn">glob</span>(globs=[<span class="str">"C:/**/*.dmp"</span>, <span class="str">"C:/**/*.DMP"</span>], accessor=<span class="str">"ntfs"</span>)
<span class="kw">WHERE</span> FullPath <span class="kw">=~</span> <span class="str">"lsass"</span>

<span class="cmt">-- Also: hunt event logs for comsvcs pattern</span>
<span class="kw">SELECT</span> System.TimeCreated <span class="kw">AS</span> Time, EventData.CommandLine <span class="kw">AS</span> CMD
<span class="kw">FROM</span> <span class="fn">parse_evtx</span>(filename=<span class="str">"C:/Windows/System32/winevt/Logs/Security.evtx"</span>)
<span class="kw">WHERE</span> System.EventID.Value = <span class="str">4688</span>
  <span class="kw">AND</span> EventData.CommandLine <span class="kw">=~</span> <span class="str">"comsvcs|MiniDump|procdump"</span></div>
      <div class="vql-result" id="tel3">
        <table class="vt">
          <tr><th>FullPath</th><th>Size</th><th>Mtime</th></tr>
          <tr><td style="color:#c04040"><strong>C:\Windows\Temp\lsass.dmp</strong></td><td>55,447,552</td><td style="color:#c04040">2025-03-24 09:48:32</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- TAB 4: Anti-Forensics -->
<div id="tt4" class="sp">
  <div class="banner-red"><strong>Anti-forensics leaves its own evidence.</strong> Attackers who try to erase their tracks almost always leave traces of the erasure itself. Know what they try to erase — and how to find the proof that they did it.</div>
  
  <div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
    <tr><th>Anti-Forensic Action</th><th>Tool/Command Used</th><th>Evidence It Leaves</th><th>How to Detect</th></tr>
    <tr><td>Clear Windows Event Logs</td><td>wevtutil cl, Event Viewer, PowerShell Clear-EventLog</td><td><strong>Event ID 1102</strong> (Security log cleared), Event ID 104 (System log cleared)</td><td>Hunt 1102/104 before incident window; gap in event log timestamps</td></tr>
    <tr><td>Delete VSS (Shadow Copies)</td><td>vssadmin delete shadows /all, bcdedit, wbadmin</td><td>VSS deletion logged; Prefetch for vssadmin.exe; SRUM records the tool execution</td><td>Windows.Forensics.Prefetch for vssadmin; hunt Event 524/7036</td></tr>
    <tr><td>Timestomping</td><td>Metasploit timestomp, custom tools</td><td>NTFS $STANDARD_INFO timestamps (visible to Explorer) vs $FILE_NAME timestamps (written by NTFS, harder to fake) are inconsistent</td><td>parse_mft() — compare $SI vs $FN timestamps; discrepancy = tampering</td></tr>
    <tr><td>Delete Files</td><td>del, rm, sdelete, cipher /w</td><td>MFT record (marks file as unallocated but metadata often survives), USN Journal records the deletion, Recycle Bin metadata ($I files)</td><td>parse_mft(), parse_usn(), Windows.Forensics.RecycleBin</td></tr>
    <tr><td>Disable Windows Defender / AV</td><td>Set-MpPreference, sc stop, reg delete</td><td>Event 5001/5004 (Defender disabled), WMI disable events, registry modification in HKLM\SOFTWARE\Policies\Microsoft\Windows Defender</td><td>EvtxHunter for Event 5001/5004; Windows.Sys.Services for disabled AV services</td></tr>
    <tr><td>Remove Persistence</td><td>reg delete, schtasks /delete</td><td>Event 4699 (scheduled task deleted), USN Journal records registry file modifications, ShimCache may retain the deleted binary</td><td>Hunt 4699 before incident window; compare ShimCache entries to running services</td></tr>
  </table></div>

  <div class="h3">The USN Change Journal — The Anti-Anti-Forensics Tool</div>
  <div class="banner-teal"><strong>The NTFS USN Change Journal</strong> records every file system operation — create, modify, rename, delete — in a circular log that can extend back days or weeks. Even if an attacker deletes files and clears the Recycle Bin, the USN Journal has a record of it.</div>
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
        <span class="vql-name">Parse USN Journal to find recently deleted executables</span>
      </div>
      <button class="run-btn" onclick="runVQL(this,'tel4')">▶ Run</button>
    </div>
    <div class="vql-body">
      <div class="cb" style="margin:0"><span class="kw">SELECT</span> TimeStamp, Filename, Reason, MFTId
<span class="kw">FROM</span> <span class="fn">parse_usn</span>(device=<span class="str">"\\\.\\C:"</span>)
<span class="kw">WHERE</span> Filename <span class="kw">=~</span> <span class="str">"\\.exe$|\\.dll$|\\.ps1$"</span>
  <span class="kw">AND</span> Reason <span class="kw">=~</span> <span class="str">"DELETE"</span>
  <span class="kw">AND</span> TimeStamp > <span class="str">"2025-03-24T00:00:00Z"</span>
<span class="kw">ORDER BY</span> TimeStamp <span class="kw">DESC</span></div>
      <div class="vql-result" id="tel4">
        <table class="vt">
          <tr><th>TimeStamp</th><th>Filename</th><th>Reason</th><th>MFTId</th></tr>
          <tr><td>2025-03-24 09:52:18</td><td style="color:#c04040"><strong>mimikatz.exe</strong></td><td>FILE_DELETE</td><td>142857</td></tr>
          <tr><td>2025-03-24 09:52:20</td><td style="color:#c04040"><strong>procdump64.exe</strong></td><td>FILE_DELETE</td><td>142858</td></tr>
          <tr><td>2025-03-24 09:52:21</td><td style="color:#c04040"><strong>lsass.dmp</strong></td><td>FILE_DELETE</td><td>142859</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>
`;}

/* ══ IR LIFECYCLE ════════════════════════════════════════════ */
function paneIrLifecycle(){return`
<div class="banner-violet"><strong>The PICERL model</strong> (from SANS FOR508) is the industry-standard incident response lifecycle. Understanding it helps you know what you should be doing at each phase — and where Velociraptor fits. IR is not linear; phases often run concurrently and you may loop back.</div>

<div class="phase-grid">
  <div class="phase-card" style="border-top:4px solid #4a8fff">
    <div class="phase-num" style="color:#4a8fff">1</div>
    <div class="phase-name" style="color:#4a8fff">Preparation</div>
    <div class="phase-desc">Getting the team and tooling ready BEFORE an incident occurs. Defining playbooks, deploying monitoring, establishing baselines.</div>
    <div class="phase-velo" style="background:rgba(26,171,138,.1);color:var(--teal)">Deploy Velociraptor agents fleet-wide. Configure CLIENT_EVENT monitoring. Write triage artifacts. Test offline collectors.</div>
  </div>
  <div class="phase-card" style="border-top:4px solid var(--orange)">
    <div class="phase-num" style="color:var(--orange)">2</div>
    <div class="phase-name" style="color:var(--orange)">Identification</div>
    <div class="phase-desc">Determining whether an event is an incident and establishing its scope. "Is this real? How bad is it? Which systems are affected?"</div>
    <div class="phase-velo" style="background:rgba(232,131,10,.08);color:var(--orange)">Trigger triage collection on alerted hosts. Hunt IOCs fleet-wide. Enumerate scope via process and network artifact analysis.</div>
  </div>
  <div class="phase-card" style="border-top:4px solid #c04040">
    <div class="phase-num" style="color:#c04040">3</div>
    <div class="phase-name" style="color:#c04040">Containment</div>
    <div class="phase-desc">Limiting damage while balancing investigative needs vs business impact. Isolate but preserve evidence. Stop lateral movement.</div>
    <div class="phase-velo" style="background:rgba(200,40,40,.08);color:#c04040">Host quarantine via Velociraptor client isolation. Kill malicious processes. Deploy network blocking artifacts. Continue evidence collection on isolated hosts.</div>
  </div>
  <div class="phase-card" style="border-top:4px solid var(--warn)">
    <div class="phase-num" style="color:var(--warn)">4</div>
    <div class="phase-name" style="color:var(--warn)">Eradication</div>
    <div class="phase-desc">Removing the infection, all persistence mechanisms, and attack vectors. Ensuring attackers have NO remaining foothold.</div>
    <div class="phase-velo" style="background:rgba(200,100,0,.08);color:var(--warn)">Hunt all persistence mechanisms fleet-wide. Verify eradication with artifact re-collection. Remove malicious scheduled tasks, services, registry keys.</div>
  </div>
  <div class="phase-card" style="border-top:4px solid var(--ok)">
    <div class="phase-num" style="color:var(--ok)">5</div>
    <div class="phase-name" style="color:var(--ok)">Recovery</div>
    <div class="phase-desc">Safely returning systems to production ONLY after fully verifying they are clean and hardened against re-compromise.</div>
    <div class="phase-velo" style="background:rgba(26,171,60,.08);color:var(--ok)">Post-recovery collection to verify clean state. Validate new controls (patched vulns, hardened configs). Monitor for re-infection indicators.</div>
  </div>
  <div class="phase-card" style="border-top:4px solid #7c3aed">
    <div class="phase-num" style="color:#7c3aed">6</div>
    <div class="phase-name" style="color:#7c3aed">Lessons Learned</div>
    <div class="phase-desc">Critical retrospective: what worked, what failed, what needs to change. This drives the next Preparation phase.</div>
    <div class="phase-velo" style="background:rgba(124,58,237,.08);color:#7c3aed">Export Velociraptor Notebooks as HTML reports. Review hunt coverage gaps. Write new artifacts for previously undetected TTPs.</div>
  </div>
</div>

<div class="h2">Where Velociraptor Fits — Phase by Phase</div>
<div class="tbl-wrap" style="margin-bottom:14px"><table class="vt">
  <tr><th>Phase</th><th>Key Questions</th><th>Velociraptor Actions</th><th>Key Artifacts</th></tr>
  <tr><td><strong>Preparation</strong></td><td>Are we instrumented? Can we collect quickly when needed?</td><td>Deploy agents, configure CLIENT_EVENT, build artifact library, test offline collectors</td><td>Windows.Events.ProcessCreation, Windows.Events.DNSQueries</td></tr>
  <tr><td><strong>Identification</strong></td><td>Is this real? What systems are impacted? What is the initial access vector?</td><td>Triage collection, fleet-wide IOC hunting, process/network snapshot</td><td>Windows.System.Pslist, Windows.Network.Netstat, Windows.EventLogs.EvtxHunter</td></tr>
  <tr><td><strong>Containment</strong></td><td>How do we stop spread without losing evidence?</td><td>Quarantine hosts, kill PIDs, collect memory before shutdown, deploy network block artifacts</td><td>Windows.Remediation.Quarantine, process collection with --dump</td></tr>
  <tr><td><strong>Eradication</strong></td><td>Did we find everything? Is there any remaining access?</td><td>Hunt all persistence mechanisms, validate removals, verify no lateral movement paths remain</td><td>Windows.Sys.StartupItems, Windows.System.ScheduledTasks, Windows.System.Services</td></tr>
  <tr><td><strong>Recovery</strong></td><td>Is the environment truly clean? Are new controls working?</td><td>Post-recovery artifact collection, Sigma monitoring for recurrence, baseline comparison</td><td>Windows.Sigma.Base, all persistence artifacts</td></tr>
  <tr><td><strong>Lessons Learned</strong></td><td>What blind spots did we have? What new detections do we need?</td><td>Review hunt results, write new VQL for missed TTPs, update artifact library</td><td>All — gap analysis of what was and wasn't collected</td></tr>
</table></div>

<div class="h2">Ransomware Attack Lifecycle — Where Evidence Lives</div>
<div class="banner"><strong>Ransomware is an outcome, not an attack.</strong> By the time encryption starts, the attacker has typically been in the network for days or weeks. The real investigation is reconstructing everything that happened before the encryption event.</div>

<div class="killchain">
  <div class="kc-step"><span class="kc-icon">📧</span><span class="kc-label">Initial Access</span></div>
  <div class="kc-step"><span class="kc-icon">⚡</span><span class="kc-label">Execution</span></div>
  <div class="kc-step"><span class="kc-icon">🔒</span><span class="kc-label">Persistence</span></div>
  <div class="kc-step"><span class="kc-icon">👑</span><span class="kc-label">Privilege Escalation</span></div>
  <div class="kc-step"><span class="kc-icon">🛡</span><span class="kc-label">Defense Evasion</span></div>
  <div class="kc-step"><span class="kc-icon">🔑</span><span class="kc-label">Credential Theft</span></div>
  <div class="kc-step"><span class="kc-icon">🔎</span><span class="kc-label">Discovery / Recon</span></div>
  <div class="kc-step"><span class="kc-icon">↔️</span><span class="kc-label">Lateral Movement</span></div>
  <div class="kc-step"><span class="kc-icon">📤</span><span class="kc-label">Exfiltration</span></div>
  <div class="kc-step highlight"><span class="kc-icon">💥</span><span class="kc-label">Encryption</span></div>
</div>

<div class="tbl-wrap"><table class="vt">
  <tr><th>Stage</th><th>Common Methods</th><th>Evidence in Velociraptor</th></tr>
  <tr><td>Initial Access</td><td>Phishing, RDP brute force, VPN exploitation, supply chain</td><td>Event 4625 (failed logons), 4624 Type 10 (RDP), IIS logs, Prefetch for browser/email clients</td></tr>
  <tr><td>Execution</td><td>PowerShell, cmd, WMI, MSHTA, certutil decode</td><td>Event 4688 (process creation), PowerShell script block logs (4103/4104), Prefetch</td></tr>
  <tr><td>Persistence</td><td>Scheduled tasks, services, registry run keys, WMI subscriptions</td><td>Windows.System.ScheduledTasks, Windows.System.Services, Windows.Sys.StartupItems</td></tr>
  <tr><td>Credential Theft</td><td>Mimikatz, LSASS dumping, DCSync, NTDS.dit extraction</td><td>Event 4624/4648/4776, lsass.dmp in Temp, procdump Prefetch, SRUM for rundll32 activity</td></tr>
  <tr><td>Discovery</td><td>Advanced IP Scanner, netscan, AdFind, BloodHound, nltest</td><td>Prefetch for scanner tools, SRUM network data, Event 4688 for recon commands</td></tr>
  <tr><td>Lateral Movement</td><td>PsExec, RDP, WMI, WinRM, SMB pass-the-hash</td><td>Event 4624/7045, PSEXESVC in USN Journal, RDP cache bitmaps, ShimCache on destination</td></tr>
  <tr><td>Exfiltration</td><td>Rclone, WinSCP, Mega, custom tools, cloud storage</td><td>SRUM network data per process (bytes out), Prefetch for exfil tools, DNS queries for cloud storage</td></tr>
  <tr><td>Encryption</td><td>LockBit, BlackCat/ALPHV, Cl0p, custom encryptors</td><td>vssadmin/bcdedit in BAM/Prefetch, encryptor binary in Amcache, file extension changes in USN Journal</td></tr>
</table></div>
`;}

function paneQuickstart(){return`
<div class="banner"><strong>Zero-install.</strong> Velociraptor is a single static binary. Download it, make it executable, and run. No database, no dependencies, no installer required.</div>
<div class="h2">1 — Download the binary</div>
<div class="cb"><button class="copy-btn">Copy</button><span class="cmt"># Find the latest release at:</span>
https://github.com/Velocidex/velociraptor/releases

<span class="cmt"># Linux (make executable)</span>
chmod +x velociraptor-linux-amd64

<span class="cmt"># macOS</span>
chmod +x velociraptor-darwin-amd64

<span class="cmt"># Windows — just run the .exe</span></div>
<div class="h2">2 — Launch the instant GUI</div>
<div class="cb"><button class="copy-btn">Copy</button><span class="cmt"># All-in-one: server + client + GUI in one command</span>
<span class="fn">velociraptor</span> gui

<span class="cmt"># Opens your browser at https://localhost:8889</span>
<span class="cmt"># Default credentials: admin / password</span>
<span class="cmt"># Temp data store created automatically — nothing permanent</span></div>
<div class="h2">3 — Generate a production server config</div>
<div class="cb"><button class="copy-btn">Copy</button><span class="cmt"># Interactive wizard — sets TLS, data store path, ports</span>
<span class="fn">velociraptor</span> config generate -i

<span class="cmt"># Start the frontend server (verbose logging)</span>
<span class="fn">velociraptor</span> --config server.config.yaml frontend -v

<span class="cmt"># Create the first admin user</span>
<span class="fn">velociraptor</span> --config server.config.yaml user add admin --role administrator</div>
<div class="h2">4 — Run your first VQL query</div>
<div class="vql-demo">
  <div class="vql-hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="vql-dots"><div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#febc2e"></div><div class="dot" style="background:#28c841"></div></div>
      <span class="vql-name">Notebook — Cell 1 — List running processes</span>
    </div>
    <button class="run-btn" onclick="runVQL(this,'qs1')">▶ Run</button>
  </div>
  <div class="vql-body">
    <div class="cb" style="margin:0"><span class="kw">SELECT</span> Name, Pid, CommandLine <span class="kw">FROM</span> <span class="fn">pslist</span>()</div>
    <div class="vql-result" id="qs1">
      <table class="vt"><tr><th>Name</th><th>Pid</th><th>CommandLine</th></tr>
      <tr><td>velociraptor.exe</td><td>4821</td><td>velociraptor gui</td></tr>
      <tr><td>chrome.exe</td><td>2340</td><td>C:\Program Files\Chrome\chrome.exe</td></tr>
      <tr><td>svchost.exe</td><td>880</td><td>C:\Windows\System32\svchost.exe -k netsvcs</td></tr>
      <tr><td>powershell.exe</td><td>5512</td><td>powershell.exe -ExecutionPolicy Bypass</td></tr>
      </table>
    </div>
  </div>
</div>
<div class="h2">5 — Install client as a service</div>
<div class="cb"><button class="copy-btn">Copy</button><span class="cmt"># Windows (run as Administrator)</span>
<span class="fn">velociraptor</span> --config client.config.yaml service install

<span class="cmt"># Linux (creates systemd unit)</span>

sudo systemctl enable velociraptor_client
sudo systemctl start velociraptor_client</div>`;}

      <li>Org-level tenant isolation for MSSP deployments</li>
      <li>API keys with scoped certificate-based credentials</li>

    </ul>
  </div>
</div>
<div class="card">
  <div class="card-title"><span class="ct ct-o">⬡</span> Multi-Frontend Scaling</div>
  <div class="p">For deployments beyond ~15,000 clients, Velociraptor supports multi-frontend mode. Multiple frontend nodes share a replicated data store, and a load balancer distributes client connections. Each node handles ~15K clients independently.</div>

    <span class="pill p-o">Shared replicated data store</span>

  </div>
</div>`;}

function paneVQL(){return`
<div id="vql-tabs" class="tab-bar">
  <button class="tab active" data-target="vt1">Syntax Basics</button>
  <button class="tab" data-target="vt2">Plugins</button>
  <button class="tab" data-target="vt3">Live Examples</button>
  <button class="tab" data-target="vt4">Advanced VQL</button>
</div>
<div id="vt1" class="sp active">
  <div class="banner"><strong>VQL</strong> is a SQL-like query language purpose-built for DFIR. Queries run on the endpoint (or server) and return rows of forensic data from <em>plugins</em>.</div>
  <div class="cb"><button class="copy-btn">Copy</button><span class="kw">SELECT</span> col1, col2       <span class="cmt">-- fields to return (* for all)</span>
<span class="kw">FROM</span>   <span class="fn">plugin_name</span>(arg=<span class="str">'value'</span>)  <span class="cmt">-- data source plugin</span>
<span class="kw">WHERE</span>  condition         <span class="cmt">-- filter rows</span>
<span class="kw">ORDER BY</span> col1 <span class="kw">DESC</span>     <span class="cmt">-- sort results</span>
<span class="kw">LIMIT</span>  100              <span class="cmt">-- cap row count</span></div>
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Clause / Operator</th><th>Purpose</th><th>Example</th></tr>
    <tr><td><code>SELECT</code></td><td>Choose output columns</td><td>SELECT Name, Pid</td></tr>
    <tr><td><code>FROM</code></td><td>Name the plugin or artifact</td><td>FROM pslist()</td></tr>
    <tr><td><code>WHERE</code></td><td>Filter rows</td><td>WHERE Pid &gt; 1000</td></tr>
    <tr><td><code>LET</code></td><td>Define a named sub-query or variable</td><td>LET x = SELECT ...</td></tr>
    <tr><td><code>GROUP BY</code></td><td>Aggregate rows</td><td>GROUP BY Name</td></tr>
    <tr><td><code>ORDER BY</code></td><td>Sort results</td><td>ORDER BY Mtime DESC</td></tr>
    <tr><td><code>LIMIT</code></td><td>Cap row count</td><td>LIMIT 100</td></tr>
    <tr><td><code>=~</code></td><td>Regex match (case-insensitive)</td><td>Name =~ "svc"</td></tr>
    <tr><td><code>!~</code></td><td>Regex NOT match</td><td>Name !~ "system"</td></tr>
    <tr><td><code>AS</code></td><td>Alias a column</td><td>hash(...).MD5 AS MD5</td></tr>
    <tr><td><code>foreach()</code></td><td>Iterate sub-queries over rows</td><td>SELECT * FROM foreach(...)</td></tr>
  </table></div>
</div>
<div id="vt2" class="sp">
  <div class="tbl-wrap"><table class="vt">
    <tr><th>Plugin</th><th>Category</th><th>Description</th></tr>

    <tr><td><code>stat(filename=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>File metadata: size, timestamps, permissions, owner</td></tr>
    <tr><td><code>read_file(filename=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>Read file contents as string or bytes</td></tr>
    <tr><td><code>hash(path=...)</code></td><td><span class="pill p-t">Filesystem</span></td><td>Compute MD5 / SHA1 / SHA256 of a file</td></tr>
    <tr><td><code>parse_evtx(filename=...)</code></td><td><span class="pill p-b">Event Logs</span></td><td>Parse Windows .evtx event log files</td></tr>
    <tr><td><code>parse_mft()</code></td><td><span class="pill p-b">NTFS</span></td><td>Parse NTFS MFT — full filesystem timeline including deleted</td></tr>
    <tr><td><code>parse_usn(device=...)</code></td><td><span class="pill p-b">NTFS</span></td><td>Parse USN Change Journal for file activity history</td></tr>

    <tr><td><code>environ()</code></td><td><span class="pill p-o">System</span></td><td>Environment variables for current or target process</td></tr>
    <tr><td><code>upload(file=...)</code></td><td><span class="pill p-t">Collection</span></td><td>Upload file from client to server data store</td></tr>
    <tr><td><code>http_client(url=...)</code></td><td><span class="pill p-b">Network</span></td><td>HTTP requests from VQL (webhooks, enrichment, SOAR)</td></tr>

</div>
<div id="vt3" class="sp">
  <div class="vql-demo">
    <div class="vql-hdr">
      <div style="display:flex;align-items:center;gap:10px">
